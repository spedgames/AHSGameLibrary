<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <title>Good Choices and Bad Choices</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       ROOT & RESET
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-body:    'Inter', sans-serif;
      --font-display: 'Poppins', sans-serif;

      --ink:        #1a1a2e;
      --ink-soft:   #4b5263;
      --surface:    #ffffff;
      --panel-bg:   #f7f8fc;
      --border:     #e2e5f0;
      --primary:    #4f46e5;
      --primary-h:  #4338ca;
      --primary-lt: #eef2ff;

      --good:       #16a34a;   /* green */
      --good-lt:    #dcfce7;
      --good-bd:    #86efac;
      --good-h:     #15803d;

      --bad:        #dc2626;   /* red */
      --bad-lt:     #fee2e2;
      --bad-bd:     #fca5a5;
      --bad-h:      #b91c1c;

      --correct:    #10b981;

      --radius-xl:  22px;
      --radius-lg:  14px;
      --radius-md:  10px;
      --radius-full:9999px;
      --shadow-card:0 20px 40px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.06);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: var(--font-body);
      background: linear-gradient(145deg, #dde3f8 0%, #c8d0ef 100%);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #shell {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 12px;
    }

    #card {
      background: var(--surface);
      width: 100%; max-width: 900px;
      height: 100%; max-height: 820px;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      position: relative; overflow: hidden;
    }

    /* ============================================================
       SCREENS
    ============================================================ */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 28px 28px 24px;
      opacity: 0; pointer-events: none;
      transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .screen.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

    /* ============================================================
       SHARED TYPE & BUTTONS
    ============================================================ */
    .page-title {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
      color: var(--primary); text-align: center; line-height: 1.2;
    }
    .subtitle {
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--ink-soft); text-align: center; margin-top: 4px;
    }
    .section-label {
      font-family: var(--font-display); font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--ink-soft); margin-bottom: 8px;
    }
    .btn {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      background: var(--primary); color: #fff; border: none;
      padding: 0 32px; height: 52px; border-radius: var(--radius-full);
      cursor: pointer; transition: background 0.18s, transform 0.15s;
      box-shadow: 0 4px 12px rgba(79,70,229,0.25);
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 44px; white-space: nowrap;
    }
    .btn:hover  { background: var(--primary-h); transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    /* ============================================================
       START SCREEN
    ============================================================ */
    #screen-start .config-area {
      flex: 1; width: 100%;
      display: flex; flex-direction: column; gap: 14px;
      overflow-y: auto; padding: 4px 2px; margin: 12px 0;
    }
    .config-box {
      background: var(--panel-bg); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px 18px;
    }
    .qcount-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius-md); padding: 10px 12px;
      cursor: pointer; transition: border-color 0.18s, background 0.18s;
      font-weight: 600; font-size: 0.875rem; min-height: 44px;
    }
    .chip input { accent-color: var(--primary); pointer-events: none; flex-shrink: 0; }
    .chip.selected { border-color: var(--primary); background: var(--primary-lt); }

    /* ============================================================
       GAME SCREEN
    ============================================================ */
    #screen-game { padding: 16px 20px 16px; gap: 12px; }

    /* Progress boxes */
    .progress-row {
      width: 100%; display: flex; justify-content: center; align-items: center;
      background: var(--panel-bg); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 8px 12px;
      gap: 6px; flex-wrap: wrap; flex-shrink: 0;
    }
    .progress-box {
      width: 38px; height: 38px;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 800; font-size: 0.85rem;
      color: var(--ink-soft);
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }
    .progress-box.current  { border-color: var(--primary); color: var(--primary); background: var(--primary-lt); }
    .progress-box.flash-good { background: var(--good); border-color: var(--good-h); color: #fff; }
    .progress-box.flash-bad  { background: var(--bad);  border-color: var(--bad-h);  color: #fff; }
    .progress-box.done     { background: #4b5563; border-color: #1f2937; color: #fff; transition: background 0.4s, border-color 0.4s; }

    /* Behaviour label */
    .behaviour-label {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      color: var(--ink); text-align: center;
      flex-shrink: 0; line-height: 1.2;
    }

    /* Photo frame */
    .photo-frame {
      width: 100%; flex: 1;
      border-radius: var(--radius-lg); overflow: hidden;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      background: var(--panel-bg); min-height: 0;
      position: relative;
    }
    .photo-frame img {
      width: 100%; height: 100%; object-fit: contain; display: block;
    }
    .pending-badge {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.45); color: #fff;
      font-size: 0.72rem; font-weight: 700; padding: 4px 12px;
      border-radius: var(--radius-full); white-space: nowrap;
      pointer-events: none;
    }

    /* Answer buttons */
    .answer-row {
      display: flex; gap: 14px; width: 100%; flex-shrink: 0;
    }
    .answer-btn {
      flex: 1; height: 68px;
      border: 3px solid transparent; border-radius: var(--radius-lg);
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(1rem, 3vw, 1.3rem);
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .answer-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
    .answer-btn:active { transform: translateY(0); }
    .good-btn { background: var(--good-lt); border-color: var(--good-bd); color: var(--good); }
    .good-btn:hover { background: #bbf7d0; }
    .bad-btn  { background: var(--bad-lt);  border-color: var(--bad-bd);  color: var(--bad); }
    .bad-btn:hover  { background: #fecaca; }

    /* Try-again feedback toast */
    #feedback-toast {
      position: absolute; bottom: 88px; left: 50%; transform: translateX(-50%);
      padding: 10px 24px; border-radius: var(--radius-full);
      font-family: var(--font-display); font-weight: 700; font-size: 1rem;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity 0.2s; z-index: 10;
    }
    #feedback-toast.show      { opacity: 1; }
    #feedback-toast.try-again { background: var(--bad);  color: #fff; }

    /* ============================================================
       CONSEQUENCE SCREEN
    ============================================================ */
    #screen-consequence { padding: 20px 28px; gap: 16px; }

    /* Timer bar */
    .cons-timer-wrap {
      width: 100%; height: 6px;
      background: var(--border); border-radius: var(--radius-full);
      overflow: hidden; flex-shrink: 0;
    }
    .cons-timer-bar {
      height: 100%; border-radius: var(--radius-full);
      width: 100%;
      transition: width 10s linear;
    }
    .cons-timer-bar.good-bar { background: var(--good); }
    .cons-timer-bar.bad-bar  { background: var(--bad); }

    /* Verdict badge */
    .verdict-badge {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 10px 28px; border-radius: var(--radius-full);
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
    }
    .verdict-badge.good-badge { background: var(--good-lt); color: var(--good); border: 2.5px solid var(--good-bd); }
    .verdict-badge.bad-badge  { background: var(--bad-lt);  color: var(--bad);  border: 2.5px solid var(--bad-bd); }

    /* Consequence photo */
    .cons-photo {
      width: 100%; flex: 1; min-height: 0;
      border-radius: var(--radius-lg); overflow: hidden;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      background: var(--panel-bg);
    }
    .cons-photo img {
      width: 100%; height: 100%; object-fit: contain; display: block;
    }

    /* Consequence text box */
    .cons-text-box {
      width: 100%; flex-shrink: 0;
      border-radius: var(--radius-lg); padding: 16px 20px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .cons-text-box.good-box { background: var(--good-lt); border: 2px solid var(--good-bd); }
    .cons-text-box.bad-box  { background: var(--bad-lt);  border: 2px solid var(--bad-bd); }

    .cons-line1 {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(0.95rem, 2.2vw, 1.1rem); line-height: 1.3;
    }
    .cons-line1.good-text { color: #14532d; }  /* darker green */
    .cons-line1.bad-text  { color: #7f1d1d; }  /* darker red */

    .cons-line2 {
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      color: var(--ink-soft); line-height: 1.5;
    }

    /* Countdown + next button row */
    .cons-action-row {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; flex-shrink: 0;
    }
    .cons-countdown {
      font-family: var(--font-display); font-weight: 700;
      font-size: 0.9rem; color: var(--ink-soft);
    }
    .cons-countdown span { color: var(--primary); font-weight: 800; }

    /* ============================================================
       END SCREEN
    ============================================================ */
    #screen-end { justify-content: center; gap: 20px; }
    .end-trophy { font-size: 5rem; line-height: 1; }
    .end-title  {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(1.8rem, 5vw, 2.6rem); color: var(--correct);
    }
    .score-summary {
      display: flex; gap: 20px; align-items: center; justify-content: center;
    }
    .score-pill {
      font-family: var(--font-display); font-weight: 800;
      font-size: 1.1rem; padding: 10px 24px; border-radius: var(--radius-full);
    }
    .score-pill.good-pill  { background: var(--good-lt); color: var(--good); }
    .score-pill.total-pill { background: var(--primary-lt); color: var(--primary); }
    .end-feedback { font-size: 1rem; color: var(--ink-soft); text-align: center; }

    /* ============================================================
       ANIMATIONS
    ============================================================ */
    @keyframes shake {
      0%,100%{ transform:translateX(0); }
      20%,60%{ transform:translateX(-8px); }
      40%,80%{ transform:translateX(8px); }
    }
    .shake { animation: shake 0.4s ease; }

    @keyframes pop-in {
      0%  { transform:scale(0.92); opacity:0; }
      100%{ transform:scale(1);    opacity:1; }
    }
    .pop-in { animation: pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    /* ============================================================
       DRAG AND DROP MODE
    ============================================================ */
    .dnd-area {
      display: none;
      flex-direction: column;
      width: 100%; gap: 10px; flex-shrink: 0;
    }
    .dnd-area.active { display: flex; }

    /* Drop target — the blank slot the player drops an answer into */
    .drop-blank {
      width: 100%; height: 58px;
      border: 3px dashed var(--border);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 700;
      font-size: 1rem; color: var(--ink-soft);
      background: var(--panel-bg);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .drop-blank.drag-over {
      border-color: var(--primary);
      background: var(--primary-lt);
      color: var(--primary);
      transform: scale(1.02);
    }

    /* Draggable answer chips — Good and Bad side by side */
    .drag-chips-row {
      display: flex; gap: 12px; width: 100%;
    }
    .drag-chip {
      flex: 1; height: 58px;
      border: 3px solid transparent;
      border-radius: var(--radius-lg);
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      cursor: grab; user-select: none; touch-action: none;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .drag-chip:active, .drag-chip.dragging {
      cursor: grabbing;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      transform: scale(1.05);
      z-index: 99;
    }
    .drag-chip.used { opacity: 0.35; pointer-events: none; }
    .good-chip { background: var(--good-lt); border-color: var(--good-bd); color: var(--good); }
    .bad-chip  { background: var(--bad-lt);  border-color: var(--bad-bd);  color: var(--bad); }

  </style>
</head>
<body>
<div id="shell">
<div id="card">

  <!-- ========== START SCREEN ========== -->
  <div id="screen-start" class="screen active">
    <div style="text-align:center">
      <h1 class="page-title">👍 Good Choices and Bad Choices</h1>
      <p class="subtitle">Is this a good choice or a bad choice?</p>
    </div>

    <div class="config-area">
      <div class="config-box">
        <p class="section-label">Answer Mode</p>
        <div class="qcount-grid" style="grid-template-columns:1fr 1fr;">
          <label class="chip selected" id="mode-tap-chip">
            <input type="radio" name="answerMode" value="tap" checked>
            <span>👆 Tap to Answer</span>
          </label>
          <label class="chip" id="mode-drag-chip">
            <input type="radio" name="answerMode" value="drag">
            <span>✋ Drag and Drop</span>
          </label>
        </div>
      </div>

      <div class="config-box">
        <p class="section-label">Number of Questions</p>
        <div class="qcount-grid" id="qcount-chips">
          <label class="chip"><input type="radio" name="qCount" value="3"><span>3</span></label>
          <label class="chip"><input type="radio" name="qCount" value="5"><span>5</span></label>
          <label class="chip"><input type="radio" name="qCount" value="8"><span>8</span></label>
          <label class="chip selected"><input type="radio" name="qCount" value="10" checked><span>10</span></label>
        </div>
      </div>
    </div>

    <button class="btn" id="btn-start">Start Game ▶</button>
  </div>

  <!-- ========== GAME SCREEN ========== -->
  <div id="screen-game" class="screen">
    <div class="progress-row" id="progress-boxes"></div>

    <p class="behaviour-label" id="behaviour-label">Biting others</p>

    <div class="photo-frame">
      <img id="question-img" src="" alt="behaviour photo"
           referrerpolicy="no-referrer-when-downgrade"
           onerror="this.style.display='none'">
      <div class="pending-badge" id="pending-badge" style="display:none">📷 Image coming soon</div>
    </div>

    <div class="answer-row" id="answer-row">
      <button class="answer-btn good-btn" id="btn-good">👍 Good choice</button>
      <button class="answer-btn bad-btn"  id="btn-bad" >👎 Bad choice</button>
    </div>

    <!-- Drag and drop mode elements -->
    <div class="dnd-area" id="dnd-area">
      <!-- Blank drop target -->
      <div class="drop-blank" id="drop-blank">Drop your answer here ↓</div>
      <!-- Draggable answer chips -->
      <div class="drag-chips-row">
        <div class="drag-chip good-chip" id="drag-good" draggable="true">👍 Good choice</div>
        <div class="drag-chip bad-chip"  id="drag-bad"  draggable="true">👎 Bad choice</div>
      </div>
    </div>

    <div id="feedback-toast"></div>
  </div>

  <!-- ========== CONSEQUENCE SCREEN ========== -->
  <div id="screen-consequence" class="screen">

    <div class="cons-timer-wrap">
      <div class="cons-timer-bar" id="cons-bar"></div>
    </div>

    <div class="verdict-badge" id="verdict-badge">👍 That's a good choice!</div>

    <div class="cons-photo">
      <img id="consequence-img" src="" alt="consequence photo"
           referrerpolicy="no-referrer-when-downgrade"
           onerror="this.style.display='none'">
    </div>

    <div class="cons-text-box" id="cons-text-box">
      <p class="cons-line1" id="cons-line1"></p>
      <p class="cons-line2" id="cons-line2"></p>
    </div>

    <div class="cons-action-row">
      <p class="cons-countdown">Next question in <span id="cons-count">10</span>s…</p>
      <button class="btn" id="btn-next" style="height:42px;padding:0 20px;font-size:0.9rem;">Next →</button>
    </div>

  </div>

  <!-- ========== END SCREEN ========== -->
  <div id="screen-end" class="screen">
    <div class="end-trophy">🏆</div>
    <h2 class="end-title">Finished!</h2>
    <div class="score-summary">
      <div class="score-pill good-pill">✓ <span id="end-correct">0</span> correct</div>
      <div class="score-pill total-pill">out of <span id="end-total">0</span></div>
    </div>
    <p class="end-feedback" id="end-feedback">Great choices!</p>
    <button class="btn" id="btn-play-again">Play Again</button>
  </div>

</div><!-- #card -->
</div><!-- #shell -->

<script>
/* ============================================================
   QUESTIONS DATA
   Each entry:
     behaviour    — label shown on question screen
     type         — 'good' or 'bad'
     questionImg  — photo shown on question screen
     consequenceImg — photo shown on consequence screen
     line1        — first line of consequence text ("That's right! ...")
     line2        — second line explaining the consequence
============================================================ */
const QUESTIONS = [
  {
    behaviour:      "Biting others",
    type:           "bad",
    questionImg:    "https://images.pexels.com/photos/6222769/pexels-photo-6222769.jpeg?auto=compress&cs=tinysrgb&w=600",
    consequenceImg: "https://images.pexels.com/photos/6222767/pexels-photo-6222767.jpeg?auto=compress&cs=tinysrgb&w=600",
    line1:          "That's right! Biting others is a bad choice.",
    line2:          "Biting makes friends and teachers hurt and they will feel sad and scared.",
    fixed: false,
  },
  {

let answerMode = 'tap'; // 'tap' or 'drag'
let deck          = [];
let deckIndex     = 0;
let correctCount  = 0;
let answersLocked = false;
let consTimer     = null;

const $ = id => document.getElementById(id);

function showScreen(key) {
  ['screen-start','screen-game','screen-consequence','screen-end'].forEach(id => {
    const s = document.getElementById(id);
    if (s) s.classList.remove('active');
  });
  const target = document.getElementById('screen-' + key);
  if (target) target.classList.add('active');
}

document.addEventListener('DOMContentLoaded', () => showScreen('start'));

/* ============================================================
   START SCREEN
============================================================ */
document.querySelectorAll('#qcount-chips .chip').forEach(chip => {
  const rb = chip.querySelector('input[type="radio"]');
  chip.addEventListener('click', () => {
    document.querySelectorAll('#qcount-chips .chip').forEach(c => c.classList.remove('selected'));
    rb.checked = true;
    chip.classList.add('selected');
    questionCount = parseInt(rb.value);
  });
});

// Mode chip toggles
document.querySelectorAll('input[name="answerMode"]').forEach(rb => {
  rb.parentElement.addEventListener('click', () => {
    document.querySelectorAll('input[name="answerMode"]').forEach(r => r.parentElement.classList.remove('selected'));
    rb.checked = true;
    rb.parentElement.classList.add('selected');
    answerMode = rb.value;
  });
});

$('btn-start').addEventListener('click', () => {
  if (QUESTIONS.length === 0) {
    alert('No questions have been added yet!');
    return;
  }
  // Separate fixed (always-last) from shuffleable questions
  // Also skip any pending questions that have no real image yet
  const shuffleable = QUESTIONS.filter(q => !q.fixed);
  const fixedLast   = QUESTIONS.filter(q => q.fixed);

  // Shuffle the non-fixed ones and trim to questionCount-1 (leaving room for fixed)
  const shuffled = [...shuffleable].sort(() => Math.random() - 0.5);
  const sliceCount = Math.max(0, questionCount - fixedLast.length);
  deck = [...shuffled.slice(0, sliceCount), ...fixedLast];
  deckIndex    = 0;
  correctCount = 0;

  // Build progress boxes
  const container = $('progress-boxes');
  container.innerHTML = '';
  deck.forEach((_, i) => {
    const box = document.createElement('div');
    box.className = 'progress-box' + (i === 0 ? ' current' : '');
    box.textContent = i + 1;
    container.appendChild(box);
  });

  loadQuestion();
  showScreen('game');
});

/* ============================================================
   LOAD QUESTION
============================================================ */
function loadQuestion() {
  if (deckIndex >= deck.length) { showEndScreen(); return; }

  const q = deck[deckIndex];
  answersLocked = false;

  // Progress boxes
  document.querySelectorAll('.progress-box').forEach((box, i) => {
    box.classList.remove('current', 'flash-good', 'flash-bad');
    if (i < deckIndex)        box.classList.add('done');
    else if (i === deckIndex) { box.classList.remove('done'); box.classList.add('current'); }
    else                       box.classList.remove('done');
  });

  // Behaviour label
  $('behaviour-label').textContent = q.behaviour;

  // Show pending badge if image not yet provided
  $('pending-badge').style.display = q.pending ? 'block' : 'none';

  // Show correct answer UI based on mode
  if (answerMode === 'drag') {
    $('answer-row').style.display = 'none';
    $('dnd-area').classList.add('active');
    // Reset chips — make both draggable again
    $('drag-good').classList.remove('dragging', 'used');
    $('drag-bad').classList.remove('dragging', 'used');
    // Reset drop blank
    $('drop-blank').textContent = 'Drop your answer here ↓';
    $('drop-blank').classList.remove('drag-over');
    $('drop-blank').style.borderColor = '';
    $('drop-blank').style.background  = '';
    $('drop-blank').style.color        = '';
  } else {
    $('answer-row').style.display = 'flex';
    $('dnd-area').classList.remove('active');
  }

  // Question image
  const img = $('question-img');
  img.style.display = 'block';
  img.classList.remove('pop-in');
  void img.offsetWidth;
  img.src = q.questionImg;
  img.classList.add('pop-in');

  hideToast();
}

/* ============================================================
   ANSWER HANDLING
============================================================ */
$('btn-good').addEventListener('click', () => handleAnswer('good'));
$('btn-bad').addEventListener('click',  () => handleAnswer('bad'));

function handleAnswer(choice) {
  if (answersLocked) return;

  const q         = deck[deckIndex];
  const isCorrect = (choice === q.type);

  if (isCorrect) {
    answersLocked = true;
    correctCount++;

    // Flash progress box with colour, then grey out
    const box        = document.querySelectorAll('.progress-box')[deckIndex];
    const flashClass = q.type === 'good' ? 'flash-good' : 'flash-bad';
    box.classList.remove('current');
    box.classList.add(flashClass);
    setTimeout(() => box.classList.add('done'), 500);

    // Go straight to consequence screen
    setTimeout(() => showConsequence(q), 300);

  } else {
    // Wrong — shake the button, show try-again toast
    const wrongBtn = choice === 'good' ? $('btn-good') : $('btn-bad');
    wrongBtn.classList.add('shake');
    wrongBtn.addEventListener('animationend', () => wrongBtn.classList.remove('shake'), { once: true });
    showToast('Try again! 💪');
    setTimeout(hideToast, 1200);
  }
}

/* ============================================================
   CONSEQUENCE SCREEN
============================================================ */
function showConsequence(q) {
  const isGood = q.type === 'good';

  // Verdict badge
  const badge = $('verdict-badge');
  badge.textContent = isGood ? '👍 That\'s a good choice!' : '👎 That\'s a bad choice!';
  badge.className   = `verdict-badge ${isGood ? 'good-badge' : 'bad-badge'}`;

  // Consequence photo
  const cImg = $('consequence-img');
  cImg.style.display = 'block';
  cImg.src = q.consequenceImg;

  // Text box
  const box = $('cons-text-box');
  box.className = `cons-text-box ${isGood ? 'good-box' : 'bad-box'}`;

  const line1 = $('cons-line1');
  line1.textContent = q.line1;
  line1.className   = `cons-line1 ${isGood ? 'good-text' : 'bad-text'}`;

  $('cons-line2').textContent = q.line2;

  // Timer bar
  const bar = $('cons-bar');
  bar.className = `cons-timer-bar ${isGood ? 'good-bar' : 'bad-bar'}`;
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.getBoundingClientRect(); // force reflow
  bar.style.transition = 'width 10s linear';
  bar.style.width = '0%';

  // Countdown
  let t = 10;
  $('cons-count').textContent = t;
  if (consTimer) clearInterval(consTimer);
  consTimer = setInterval(() => {
    t--;
    $('cons-count').textContent = t;
    if (t <= 0) { clearInterval(consTimer); advanceQuestion(); }
  }, 1000);

  showScreen('consequence');
}

function advanceQuestion() {
  clearInterval(consTimer);
  deckIndex++;
  if (deckIndex >= deck.length) { showEndScreen(); return; }
  loadQuestion();
  showScreen('game');
}

$('btn-next').addEventListener('click', advanceQuestion);

/* ============================================================
   TOAST
============================================================ */
function showToast(msg) {
  const t = $('feedback-toast');
  t.textContent = msg;
  t.className = 'show try-again';
}
function hideToast() {
  $('feedback-toast').className = '';
}


/* ============================================================
   DRAG AND DROP LOGIC — chips → blank drop target
   Works with mouse drag and touch/finger on tablets & mobile
============================================================ */
(function() {
  const blank    = $('drop-blank');
  const chipGood = $('drag-good');
  const chipBad  = $('drag-bad');

  let activeChip = null; // which chip is currently being dragged

  // ---- Shared drop handler ----
  function onDrop(choice) {
    if (answersLocked) return;
    if (!activeChip) return;

    const q      = deck[deckIndex];
    const isGood = (choice === 'good');

    // Style the blank to reflect what was dropped
    blank.textContent   = isGood ? '👍 Good choice' : '👎 Bad choice';
    blank.style.background  = isGood ? 'var(--good-lt)' : 'var(--bad-lt)';
    blank.style.borderColor = isGood ? 'var(--good-bd)' : 'var(--bad-bd)';
    blank.style.color       = isGood ? 'var(--good)'    : 'var(--bad)';
    blank.classList.remove('drag-over');

    // Mark chip as used so it can't be dragged again
    activeChip.classList.remove('dragging');
    activeChip.classList.add('used');
    activeChip = null;

    handleAnswer(choice);
  }

  // ---- MOUSE drag events on chips ----
  [chipGood, chipBad].forEach(chip => {
    chip.addEventListener('dragstart', e => {
      if (answersLocked) { e.preventDefault(); return; }
      activeChip = chip;
      chip.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', chip === chipGood ? 'good' : 'bad');
    });
    chip.addEventListener('dragend', () => {
      chip.classList.remove('dragging');
    });
  });

  // ---- MOUSE drop events on blank ----
  blank.addEventListener('dragover', e => {
    e.preventDefault();
    blank.classList.add('drag-over');
  });
  blank.addEventListener('dragleave', () => blank.classList.remove('drag-over'));
  blank.addEventListener('drop', e => {
    e.preventDefault();
    const choice = e.dataTransfer.getData('text/plain');
    if (choice === 'good' || choice === 'bad') onDrop(choice);
  });

  // ---- TOUCH drag on chips ----
  let touchChoice = null;

  [chipGood, chipBad].forEach(chip => {
    chip.addEventListener('touchstart', e => {
      if (answersLocked || chip.classList.contains('used')) return;
      activeChip  = chip;
      touchChoice = chip === chipGood ? 'good' : 'bad';
      chip.classList.add('dragging');
    }, { passive: true });

    chip.addEventListener('touchmove', e => {
      if (!activeChip) return;
      e.preventDefault();
      const touch = e.touches[0];
      const el    = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.closest('#drop-blank')) {
        blank.classList.add('drag-over');
      } else {
        blank.classList.remove('drag-over');
      }
    }, { passive: false });

    chip.addEventListener('touchend', e => {
      if (!activeChip) return;
      const touch = e.changedTouches[0];
      const el    = document.elementFromPoint(touch.clientX, touch.clientY);
      blank.classList.remove('drag-over');
      if (el && el.closest('#drop-blank') && touchChoice) {
        onDrop(touchChoice);
      } else {
        // Dropped outside — reset chip appearance
        activeChip && activeChip.classList.remove('dragging');
        activeChip  = null;
        touchChoice = null;
      }
    });
  });
})();

/* ============================================================
   END SCREEN
============================================================ */
function showEndScreen() {
  $('end-correct').textContent = correctCount;
  $('end-total').textContent   = deck.length;
  const pct = deck.length ? correctCount / deck.length : 0;
  $('end-feedback').textContent =
    pct === 1   ? 'Perfect! You know all your good and bad choices! 🌟' :
    pct >= 0.7  ? 'Great work — you really understand good choices!' :
    pct >= 0.4  ? 'Good effort! Keep practising!' :
                  'Keep going — every try helps you learn! 💪';
  showScreen('end');
}

$('btn-play-again').addEventListener('click', () => showScreen('start'));
</script>
</body>
</html>
