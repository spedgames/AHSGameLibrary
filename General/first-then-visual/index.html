<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>First-Then Visual Schedule</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --success-color: #48bb78;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Lock viewport scrolling */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        header {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 50px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        /* Settings Gear & Dropdown */
        .settings-container {
            position: relative;
        }

        .gear-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .gear-btn:hover {
            background: #edf2f7;
        }

        .settings-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
            min-width: 200px;
        }

        .settings-menu.show {
            display: block;
        }

        .settings-option {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #4a5568;
            cursor: pointer;
            user-select: none;
        }

        /* Nested Timers Submenu */
        .nested-timers {
            display: none;
            margin-left: 24px;
            margin-top: 8px;
            margin-bottom: 4px;
            flex-direction: column;
            gap: 8px;
            border-left: 2px solid var(--border-color);
            padding-left: 10px;
        }

        .nested-timers.show {
            display: flex;
        }

        .settings-option:last-child {
            margin-bottom: 0;
        }

        /* Main Workspace & Dynamic Scaling Container */
        .board-scaler {
            display: flex;
            align-items: center;
            justify-content: center;
            width: auto;
            height: auto;
            transform-origin: center top;
        }

        /* Original Schedule Board Proportions Retained */
        .board {
            display: flex;
            align-items: center; 
            justify-content: center;
            gap: 12px;
        }

        .column-wrapper {
            display: flex;
            align-items: center; 
            gap: 12px;
        }

        .column {
            background: var(--card-bg);
            border: 4px solid #4a5568;
            border-radius: 12px;
            width: 260px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px; 
            position: relative;
        }

        .column-header {
            font-size: 32px; 
            font-weight: bold;
            color: #1a202c;
            margin-bottom: 15px;
            text-transform: capitalize;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
            text-align: center;
        }

        .column-header:hover {
            color: var(--success-color);
        }

        /* Connecting Arrows */
        .flow-arrow {
            font-size: 32px;
            color: #4a5568;
            font-weight: bold;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Image Placeholder Area */
        .picto-container {
            width: 180px; 
            height: 180px; 
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #f8fafc;
            overflow: hidden;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .picto-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .search-trigger-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
        }

        .label-input {
            width: 90%;
            border: none;
            border-bottom: 2px solid var(--border-color);
            text-align: center;
            font-size: 20px; 
            font-weight: 600;
            color: #2d3748;
            padding: 5px;
            outline: none;
        }

        .label-input:focus {
            border-bottom-color: var(--primary-color);
        }

        /* Giant Check Mark Overlay */
        .check-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
        }

        .check-overlay::after {
            content: '';
            position: absolute;
            top: 42%;
            left: 50%;
            width: 35px;
            height: 70px;
            border: solid var(--success-color);
            border-width: 0 14px 14px 0;
            transform: translate(-50%, -50%) rotate(45deg);
            border-radius: 2px;
        }

        /* Completed Column States */
        .column.is-completed .check-overlay {
            display: block;
        }
        .column.is-completed .picto-container,
        .column.is-completed .label-input,
        .column.is-completed .timer-section {
            opacity: 0.25;
        }

        /* Timer UI Block */
        .timer-section {
            width: 100%;
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-top: 15px;
            display: none; 
        }

        .timer-display {
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
            margin-bottom: 6px;
            color: #2d3748;
        }

        .timer-inputs input {
            width: 45px;
            font-size: 16px;
            text-align: center;
            padding: 4px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .timer-btn {
            margin-top: 8px;
            padding: 5px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .start-btn { background: var(--success-color); color: white; }
        .stop-btn { background: #f56565; color: white; }

        /* Modal for ARASAAC Search */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
        }

        .search-box button {
            padding: 8px 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .result-item {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 5px;
            cursor: pointer;
            text-align: center;
        }

        .result-item img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        /* Portrait Mode Blocker Overlay */
        .orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a202c;
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        @media (orientation: portrait) and (max-width: 1024px) {
            .orientation-warning {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <div class="orientation-warning">
        <span style="font-size: 40px; margin-bottom: 10px;">🔄</span>
        <h2>Please turn your phone to landscape mode</h2>
        <p>This schedule board is optimized to display beautifully horizontally.</p>
    </div>

    <header>
        <div class="settings-container">
            <button class="gear-btn" id="gearBtn">⚙️</button>
            <div class="settings-menu" id="settingsMenu">
                <label class="settings-option">
                    <input type="checkbox" id="toggleTimersMaster"> Include Timers
                </label>
                
                <div class="nested-timers" id="nestedTimersMenu">
                    <label class="settings-option" id="opt-first"><input type="checkbox" class="timer-col-toggle" data-col="first"> First</label>
                    <label class="settings-option" id="opt-then"><input type="checkbox" class="timer-col-toggle" data-col="then"> Then</label>
                    <label class="settings-option" id="opt-next" style="display: none;"><input type="checkbox" class="timer-col-toggle" data-col="next"> Next</label>
                    <label class="settings-option" id="opt-last" style="display: none;"><input type="checkbox" class="timer-col-toggle" data-col="last"> Last</label>
                </div>

                <label class="settings-option">
                    <input type="checkbox" id="toggleNext"> Include "Next"
                </label>
                <label class="settings-option">
                    <input type="checkbox" id="toggleLast"> Include "Last"
                </label>
            </div>
        </div>
    </header>

    <div class="board-scaler" id="boardScaler">
        <main class="board" id="board">
            <div class="column-wrapper" id="wrap-first">
                <div class="column" id="col-first">
                    <div class="check-overlay"></div>
                    <div class="column-header" onclick="toggleComplete('col-first')">First</div>
                    <div class="picto-container" onclick="openSearch('first')">
                        <button class="search-trigger-btn">Search Pictogram</button>
                    </div>
                    <input type="text" class="label-input" placeholder="Type label...">
                    
                    <div class="timer-section" id="timer-sec-first">
                        <div class="timer-display" id="display-first">00:00</div>
                        <div class="timer-inputs" id="inputs-first">
                            <input type="number" class="min-in" min="0" max="59" placeholder="Min" value="0"> :
                            <input type="number" class="sec-in" min="0" max="59" placeholder="Sec" value="0">
                        </div>
                        <button class="timer-btn start-btn" onclick="runTimerEngine('first')">Start Timer</button>
                    </div>
                </div>
                <div class="flow-arrow">➔</div>
            </div>

            <div class="column-wrapper" id="wrap-then">
                <div class="column" id="col-then">
                    <div class="check-overlay"></div>
                    <div class="column-header" onclick="toggleComplete('col-then')">Then</div>
                    <div class="picto-container" onclick="openSearch('then')">
                        <button class="search-trigger-btn">Search Pictogram</button>
                    </div>
                    <input type="text" class="label-input" placeholder="Type label...">
                    
                    <div class="timer-section" id="timer-sec-then">
                        <div class="timer-display" id="display-then">00:00</div>
                        <div class="timer-inputs" id="inputs-then">
                            <input type="number" class="min-in" min="0" max="59" placeholder="Min" value="0"> :
                            <input type="number" class="sec-in" min="0" max="59" placeholder="Sec" value="0">
                        </div>
                        <button class="timer-btn start-btn" onclick="runTimerEngine('then')">Start Timer</button>
                    </div>
                </div>
            </div>

            <div class="column-wrapper" id="wrap-next" style="display: none;">
                <div class="flow-arrow">➔</div>
                <div class="column" id="col-next">
                    <div class="check-overlay"></div>
                    <div class="column-header" onclick="toggleComplete('col-next')">Next</div>
                    <div class="picto-container" onclick="openSearch('next')">
                        <button class="search-trigger-btn">Search Pictogram</button>
                    </div>
                    <input type="text" class="label-input" placeholder="Type label...">
                    
                    <div class="timer-section" id="timer-sec-next">
                        <div class="timer-display" id="display-next">00:00</div>
                        <div class="timer-inputs" id="inputs-next">
                            <input type="number" class="min-in" min="0" max="59" placeholder="Min" value="0"> :
                            <input type="number" class="sec-in" min="0" max="59" placeholder="Sec" value="0">
                        </div>
                        <button class="timer-btn start-btn" onclick="runTimerEngine('next')">Start Timer</button>
                    </div>
                </div>
            </div>

            <div class="column-wrapper" id="wrap-last" style="display: none;">
                <div class="flow-arrow">➔</div>
                <div class="column" id="col-last">
                    <div class="check-overlay"></div>
                    <div class="column-header" onclick="toggleComplete('col-last')">Last</div>
                    <div class="picto-container" onclick="openSearch('last')">
                        <button class="search-trigger-btn">Search Pictogram</button>
                    </div>
                    <input type="text" class="label-input" placeholder="Type label...">
                    
                    <div class="timer-section" id="timer-sec-last">
                        <div class="timer-display" id="display-last">00:00</div>
                        <div class="timer-inputs" id="inputs-last">
                            <input type="number" class="min-in" min="0" max="59" placeholder="Min" value="0"> :
                            <input type="number" class="sec-in" min="0" max="59" placeholder="Sec" value="0">
                        </div>
                        <button class="timer-btn start-btn" onclick="runTimerEngine('last')">Start Timer</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="searchModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0; font-size:18px;">Search Pictograms</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search..." onkeypress="handleKeyPress(event)">
                <button onclick="searchPictograms()">Search</button>
            </div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </div>

    <script>
        let currentTargetColumn = '';
        const activeTimers = {}; 
        let audioCtx = null;
        
        // Matrix Transform Scaler Engine for Mobile Landscape Compatibility
        function resizeBoard() {
            const scaler = document.getElementById('boardScaler');
            const board = document.getElementById('board');
            
            scaler.style.transform = 'none';
            
            if (window.innerWidth <= 1024 && window.innerHeight < window.innerWidth) {
                const availableHeight = window.innerHeight - 90; 
                const availableWidth = window.innerWidth - 40;
                
                const boardHeight = board.offsetHeight;
                const boardWidth = board.offsetWidth;
                
                const scaleY = availableHeight / boardHeight;
                const scaleX = availableWidth / boardWidth;
                const finalScale = Math.min(scaleX, scaleY, 1); 
                
                scaler.style.transform = `scale(${finalScale})`;
            }
        }
        
        window.addEventListener('resize', resizeBoard);
        window.addEventListener('load', resizeBoard);

        function playAlertSound(id) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let count = 0;
            const alertInterval = setInterval(() => {
                if (count >= 4 || !activeTimers[id]?.running) { 
                    clearInterval(alertInterval);
                    return;
                }
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
                count++;
            }, 500);
        }

        // Toggle Finish Check Mark
        function toggleComplete(columnId) {
            const col = document.getElementById(columnId);
            col.classList.toggle('is-completed');
            
            const internalId = columnId.replace('col-', '');
            if(col.classList.contains('is-completed') && activeTimers[internalId]?.running) {
                killTimer(internalId);
            }
        }

        // Settings Menu Interactions
        const gearBtn = document.getElementById('gearBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const nestedTimersMenu = document.getElementById('nestedTimersMenu');
        const masterTimerCheckbox = document.getElementById('toggleTimersMaster');

        gearBtn.addEventListener('click', (e) => { settingsMenu.classList.toggle('show'); e.stopPropagation(); });
        document.addEventListener('click', () => settingsMenu.classList.remove('show'));
        settingsMenu.addEventListener('click', (e) => e.stopPropagation());

        masterTimerCheckbox.addEventListener('change', (e) => {
            if(e.target.checked) {
                nestedTimersMenu.classList.add('show');
            } else {
                nestedTimersMenu.classList.remove('show');
                document.querySelectorAll('.timer-col-toggle').forEach(checkbox => {
                    checkbox.checked = false;
                    const colId = checkbox.getAttribute('data-col');
                    document.getElementById(`timer-sec-${colId}`).style.display = 'none';
                    killTimer(colId);
                });
            }
            setTimeout(resizeBoard, 50);
        });

        document.querySelectorAll('.timer-col-toggle').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const colId = e.target.getAttribute('data-col');
                const panel = document.getElementById(`timer-sec-${colId}`);
                if(e.target.checked) {
                    panel.style.display = 'block';
                } else {
                    panel.style.display = 'none';
                    killTimer(colId);
                }
                setTimeout(resizeBoard, 50);
            });
        });

        // Column View Toggles with Dynamic Sub-Option Management
        document.getElementById('toggleNext').addEventListener('change', (e) => {
            const isChecked = e.target.checked;
            document.getElementById('wrap-next').style.display = isChecked ? 'flex' : 'none';
            
            const subOption = document.getElementById('opt-next');
            subOption.style.display = isChecked ? 'flex' : 'none';
            
            if(!isChecked) {
                const chk = subOption.querySelector('input');
                if(chk.checked) {
                    chk.checked = false;
                    document.getElementById('timer-sec-next').style.display = 'none';
                    killTimer('next');
                }
            }
            setTimeout(resizeBoard, 50);
        });

        document.getElementById('toggleLast').addEventListener('change', (e) => {
            const isChecked = e.target.checked;
            document.getElementById('wrap-last').style.display = isChecked ? 'flex' : 'none';
            
            const subOption = document.getElementById('opt-last');
            subOption.style.display = isChecked ? 'flex' : 'none';
            
            if(!isChecked) {
                const chk = subOption.querySelector('input');
                if(chk.checked) {
                    chk.checked = false;
                    document.getElementById('timer-sec-last').style.display = 'none';
                    killTimer('last');
                }
            }
            setTimeout(resizeBoard, 50);
        });

        // Universal Column Timer Engine
        function runTimerEngine(id) {
            if(document.getElementById(`col-${id}`).classList.contains('is-completed')) return;

            const wrap = document.getElementById(`col-${id}`);
            const btn = wrap.querySelector('.timer-btn');
            const inputs = document.getElementById(`inputs-${id}`);

            if (activeTimers[id]?.running) {
                killTimer(id);
            } else {
                const min = parseInt(inputs.querySelector('.min-in').value) || 0;
                const sec = parseInt(inputs.querySelector('.sec-in').value) || 0;
                let timeLeft = (min * 60) + sec;

                if (timeLeft <= 0) return;

                inputs.style.display = 'none';
                btn.textContent = 'Turn Off';
                btn.className = 'timer-btn stop-btn';

                activeTimers[id] = {
                    running: true,
                    seconds: timeLeft,
                    interval: setInterval(() => {
                        activeTimers[id].seconds--;
                        renderTimerText(id, activeTimers[id].seconds);

                        if (activeTimers[id].seconds <= 0) {
                            clearInterval(activeTimers[id].interval);
                            playAlertSound(id);
                        }
                    }, 1000)
                };
                renderTimerText(id, timeLeft);
            }
        }

        function renderTimerText(id, totalSec) {
            const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
            const s = (totalSec % 60).toString().padStart(2, '0');
            document.getElementById(`display-${id}`).textContent = `${m}:${s}`;
        }

        function killTimer(id) {
            if(activeTimers[id]) {
                clearInterval(activeTimers[id].interval);
                activeTimers[id].running = false;
            }
            const display = document.getElementById(`display-${id}`);
            if(display) display.textContent = '00:00';
            
            const inputs = document.getElementById(`inputs-${id}`);
            if(inputs) inputs.style.display = 'block';
            
            const wrap = document.getElementById(`col-${id}`);
            if (wrap) {
                const btn = wrap.querySelector('.timer-btn');
                if(btn) {
                    btn.textContent = 'Start Timer';
                    btn.className = 'timer-btn start-btn';
                }
            }
        }

        // ARASAAC API Search Integration
        function openSearch(columnId) {
            if(document.getElementById(`col-${columnId}`).classList.contains('is-completed')) return;
            currentTargetColumn = columnId;
            document.getElementById('searchModal').style.display = 'flex';
            document.getElementById('searchInput').value = '';
            document.getElementById('resultsGrid').innerHTML = '';
            document.getElementById('searchInput').focus();
        }

        function closeModal() { document.getElementById('searchModal').style.display = 'none'; }
        function handleKeyPress(e) { if (e.key === 'Enter') searchPictograms(); }

        async function searchPictograms() {
            const query = document.getElementById('searchInput').value.trim();
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '<p style="grid-column: span 3; text-align:center;">Searching...</p>';
            if (!query) return;

            try {
                const response = await fetch(`https://api.arasaac.org/api/pictograms/en/search/${encodeURIComponent(query)}`);
                const data = await response.json();
                grid.innerHTML = '';

                if (data.length === 0) {
                    grid.innerHTML = '<p style="grid-column: span 3; text-align:center;">No pictograms found.</p>';
                    return;
                }

                data.forEach(item => {
                    const id = item._id;
                    const name = item.keywords && item.keywords[0] ? item.keywords[0].keyword : query;
                    const imgUrl = `https://api.arasaac.org/api/pictograms/${id}`;

                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `<img src="${imgUrl}" alt="${name}"><span style="font-size:12px; color:#4a5568; display:block; text-transform:capitalize;">${name}</span>`;
                    div.onclick = () => {
                        const column = document.getElementById(`col-${currentTargetColumn}`);
                        column.querySelector('.picto-container').innerHTML = `<img src="${imgUrl}" alt="chosen">`;
                        const input = column.querySelector('.label-input');
                        if(!input.value.trim()) input.value = name;
                        closeModal();
                        setTimeout(resizeBoard, 50);
                    };
                    grid.appendChild(div);
                });
            } catch (error) {
                grid.innerHTML = '<p style="grid-column: span 3; text-align:center; color:#f56565;">Error.</p>';
            }
        }
    </script>
</body>
</html>
