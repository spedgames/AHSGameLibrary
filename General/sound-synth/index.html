<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Synthesizer | Neon Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0b1e;
            --glass: rgba(255, 255, 255, 0.1);
            --btn-gap: 15px;
            --btn-size: 1fr;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark); color: white;
            font-family: 'Poppins', sans-serif; overflow: hidden;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.4s ease; z-index: 10;
        }

        #main-game {
            justify-content: flex-start;
            overflow: hidden;
        }

        .hidden { display: none !important; opacity: 0; }

        /* --- UI Styling --- */
        #start-screen { background: radial-gradient(circle at center, #1a1b3a 0%, #0a0b1e 100%); text-align: center; padding: 20px; }
        h1 { font-size: 3.5rem; margin-bottom: 10px; background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5)); }
        
        .btn {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: all 0.2s ease;
        }
        .btn-primary { background: var(--neon-purple); border: none; }
        .btn-accent { background: var(--neon-blue); color: var(--bg-dark); border: none; }
        .btn:active { transform: scale(0.95); }

        /* --- Sound Grid --- */
        .sound-grid {
            display: grid; grid-template-columns: repeat(5, var(--btn-size));
            gap: var(--btn-gap); width: 100%; max-width: 900px; margin: auto;
            justify-content: center;
        }

        .sound-btn {
            aspect-ratio: 1/1; background: var(--glass);
            border: 2px solid var(--neon-blue); border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.1s; position: relative;
        }
        .sound-btn span { font-size: 0.8rem; font-weight: 600; margin-top: 5px; opacity: 0.7; pointer-events: none; }
        .sound-btn.playing { background: var(--neon-blue); box-shadow: 0 0 30px var(--neon-blue); }

        /* --- Mixer Mode --- */
        #mixer-view { width: 100%; flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 20px; padding-top: 0; }
        .tracks-area { flex: 1; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .track-row { height: 80px; background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; align-items: center; padding: 0 15px; gap: 15px; }
        
        .track-timeline { flex: 1; height: 60px; background: rgba(0,0,0,0.5); border-radius: 5px; position: relative; overflow: hidden; border: 1px dashed rgba(255,255,255,0.1); }
        .waveform-block { position: absolute; height: 100%; background: var(--neon-purple); border-radius: 4px; border: 1px solid white; opacity: 0.8; }

        .rec-active { color: #ff0000 !important; animation: pulse 1s infinite; border-color: #ff0000 !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .setting-item { margin-bottom: 20px; }
        .setting-item label { display: block; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen">
        <h1>Sound Synth</h1>
        <p style="color: #a0a0c0; margin-bottom: 40px; max-width: 500px;">Play with neon sounds or create multi-layered tracks. Record and save your mix to your device.</p>
        <div style="display: flex; gap: 20px;">
            <button class="btn btn-primary" onclick="initApp('buttons')">🎹 Sound Buttons</button>
            <button class="btn btn-accent" onclick="initApp('mixer')">🎚️ Sound Mixer</button>
        </div>
    </div>

    <div id="main-game" class="screen hidden">
        <div style="width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
            <div id="mode-display" style="font-size: 1.5rem; font-weight: 800;"></div>
            <div style="display: flex; gap: 10px;">
                <button id="play-mix-btn" class="btn btn-accent hidden" onclick="playAllTracks()">▶️ Play All</button>
                <button id="save-btn" class="btn" onclick="saveToDevice()">💾 Save</button>
                <button class="btn" onclick="toggleSettings(true)">⚙️</button>
                <button class="btn" onclick="goHome()">🏠 Home</button>
            </div>
        </div>

        <div id="buttons-view" class="sound-grid"></div>

        <div id="mixer-view" class="hidden">
            <div class="mixer-container" style="display:flex; gap:20px; flex:1; min-height:0; width:100%; overflow:hidden;">
                <div id="mixer-grid" class="sound-grid" style="grid-template-columns: repeat(2, 1fr); max-width: 280px; margin: 0; align-content: start; overflow-y: auto;"></div>
                <div class="tracks-area" id="tracks-container"></div>
            </div>
            <button class="btn" style="margin: 20px auto;" onclick="addTrack()">➕ Add More Layers</button>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div style="background: #1a1b3a; padding: 40px; border-radius: 30px; width: 350px; border: 1px solid var(--neon-blue);">
            <h3 style="margin-top: 0;">Settings</h3>
            
            <div class="setting-item">
                <label>Button Spacing</label>
                <input type="range" min="5" max="50" value="15" style="width: 100%;" oninput="updateSpacing(this.value)">
            </div>

            <div id="btn-size-setting" class="setting-item hidden">
                <label>Button Size</label>
                <input type="range" min="50" max="200" value="100" style="width: 100%;" oninput="updateSize(this.value)">
            </div>

            <div class="setting-item" style="display: flex; align-items: center; justify-content: space-between;">
                <label style="margin-bottom: 0;">Full Screen Mode</label>
                <input type="checkbox" id="fs-toggle" style="width: 20px; height: 20px;" onchange="toggleFullScreen(this.checked)">
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="toggleSettings(false)">Close</button>
        </div>
    </div>

    <script>
        let audioCtx, mainGain, recorder, chunks = [];
        let preloadedBuffers = [];
        let tracks = []; 
        let activeLayerId = null;
        let currentAppMode = '';

        const soundData = [
            { name: 'KICK', f: 60, d: 0.3, t: 'sine' }, { name: 'SNARE', f: 200, d: 0.2, t: 'white' },
            { name: 'HAT', f: 8000, d: 0.05, t: 'white' }, { name: 'LEAD', f: 440, d: 0.4, t: 'sawtooth' },
            { name: 'SQUARE', f: 880, d: 0.3, t: 'square' }, { name: 'BASS', f: 50, d: 0.7, t: 'sine' },
            { name: 'LASER', f: 1200, d: 0.2, t: 'sine', r: true }, { name: 'BELL', f: 1100, d: 1.0, t: 'triangle' },
            { name: 'POP', f: 900, d: 0.1, t: 'sine' }, { name: 'GLITCH', f: 150, d: 0.05, t: 'square' }
        ];

        async function preload() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mainGain = audioCtx.createGain();
            mainGain.connect(audioCtx.destination);
            
            const dest = audioCtx.createMediaStreamDestination();
            mainGain.connect(dest);
            recorder = new MediaRecorder(dest.stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = exportAudio;

            for (const s of soundData) {
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * s.d, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    if (s.t === 'white') {
                        data[i] = Math.random() * 2 - 1;
                    } else {
                        let f = s.f;
                        if (s.r) f = s.f * Math.pow(0.001, i / data.length);
                        const t = i / audioCtx.sampleRate;
                        data[i] = s.t === 'sine' ? Math.sin(2 * Math.PI * f * t) :
                                  s.t === 'sawtooth' ? 2 * (t * f - Math.floor(0.5 + t * f)) :
                                  s.t === 'square' ? Math.sign(Math.sin(2 * Math.PI * f * t)) :
                                  Math.asin(Math.sin(2 * Math.PI * f * t)) * (2 / Math.PI);
                    }
                    data[i] *= Math.exp(-i / (data.length / 3));
                }
                preloadedBuffers.push(buffer);
            }
        }

        function playSound(idx, delay = 0) {
            if (!audioCtx) return;
            const source = audioCtx.createBufferSource();
            source.buffer = preloadedBuffers[idx];
            source.connect(mainGain);
            source.start(audioCtx.currentTime + delay);

            if (activeLayerId) {
                const track = tracks.find(t => t.id === activeLayerId);
                if (track && track.isRecording) {
                    track.data.push({ idx, time: (Date.now() - track.startTime) / 1000 });
                }
            }
        }

        function initApp(mode) {
            currentAppMode = mode;
            preload().then(() => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('main-game').classList.remove('hidden');
                
                const grid = document.getElementById('buttons-view');
                const mGrid = document.getElementById('mixer-grid');
                grid.innerHTML = ''; mGrid.innerHTML = '';

                soundData.forEach((s, i) => {
                    const setupBtn = (container) => {
                        const b = document.createElement('div');
                        b.className = 'sound-btn';
                        b.innerHTML = `<div>${i+1}</div><span>${s.name}</span>`;
                        const trigger = (e) => {
                            e.preventDefault();
                            playSound(i);
                            b.classList.add('playing');
                            setTimeout(() => b.classList.remove('playing'), 100);
                        };
                        b.addEventListener('touchstart', trigger, {passive: false});
                        b.addEventListener('mousedown', trigger);
                        container.appendChild(b);
                    };
                    setupBtn(grid);
                    setupBtn(mGrid);
                });

                if (mode === 'buttons') {
                    document.getElementById('mode-display').innerText = '🎹 Sound Buttons';
                    document.getElementById('btn-size-setting').classList.remove('hidden');
                    document.getElementById('mixer-view').classList.add('hidden');
                    document.getElementById('buttons-view').classList.remove('hidden');
                    document.getElementById('play-mix-btn').classList.add('hidden');
                    document.getElementById('save-btn').classList.add('hidden');
                } else {
                    document.getElementById('mode-display').innerText = '🎚️ Sound Mixer';
                    document.getElementById('btn-size-setting').classList.add('hidden');
                    document.getElementById('buttons-view').classList.add('hidden');
                    document.getElementById('mixer-view').classList.remove('hidden');
                    document.getElementById('play-mix-btn').classList.remove('hidden');
                    document.getElementById('save-btn').classList.remove('hidden');
                    if(tracks.length === 0) for(let i=0; i<3; i++) addTrack();
                }
            });
        }

        function goHome() {
            document.getElementById('main-game').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            // Clean up intervals if any
            tracks.forEach(t => clearInterval(t.interval));
        }

        function toggleFullScreen(enable) {
            if (enable) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) { /* Safari iPad */
                    document.documentElement.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        function addTrack() {
            const trackId = 'layer-' + Date.now() + Math.random();
            const trackObj = { id: trackId, data: [], isRecording: false, startTime: 0, interval: null };
            tracks.push(trackObj);

            const row = document.createElement('div');
            row.className = 'track-row';
            row.id = trackId;
            row.innerHTML = `
                <input type="text" value="Layer ${tracks.length}" style="background:none; border:none; color:white; width:70px; font-weight:600;">
                <button class="btn rec-btn" style="padding:10px;" onclick="toggleLayerRecord('${trackId}')">🔴 REC</button>
                <button class="btn" style="padding:10px;" onclick="playLayer('${trackId}')">▶️</button>
                <div class="track-timeline" id="tl-${trackId}"></div>
            `;
            document.getElementById('tracks-container').appendChild(row);
        }

        function toggleLayerRecord(id) {
            const track = tracks.find(t => t.id === id);
            const row = document.getElementById(id);
            const btn = row.querySelector('.rec-btn');
            const timeline = document.getElementById(`tl-${id}`);

            if (!track.isRecording) {
                if (activeLayerId && activeLayerId !== id) toggleLayerRecord(activeLayerId);
                
                track.isRecording = true;
                track.startTime = Date.now();
                track.data = []; 
                activeLayerId = id;
                btn.classList.add('rec-active');
                timeline.innerHTML = '';
                
                const block = document.createElement('div');
                block.className = 'waveform-block';
                block.style.width = '0%';
                timeline.appendChild(block);

                track.interval = setInterval(() => {
                    const dur = (Date.now() - track.startTime) / 1000;
                    block.style.width = Math.min(dur * 10, 100) + '%';
                }, 50);
            } else {
                track.isRecording = false;
                if (activeLayerId === id) activeLayerId = null;
                btn.classList.remove('rec-active');
                clearInterval(track.interval);
            }
        }

        function playLayer(id) {
            const track = tracks.find(t => t.id === id);
            if (!track || track.data.length === 0) return;
            track.data.forEach(note => {
                setTimeout(() => playSound(note.idx), note.time * 1000);
            });
        }

        function playAllTracks() {
            tracks.forEach(t => playLayer(t.id));
        }

        function saveToDevice() {
            if (recorder.state === "inactive") {
                chunks = [];
                recorder.start();
                playAllTracks();
                const saveBtn = document.getElementById('save-btn');
                saveBtn.innerText = '⏹️ Stop';
                saveBtn.classList.add('rec-active');
            } else {
                recorder.stop();
                const saveBtn = document.getElementById('save-btn');
                saveBtn.innerText = '💾 Save';
                saveBtn.classList.remove('rec-active');
            }
        }

        function exportAudio() {
            const blob = new Blob(chunks, { type: 'audio/ogg' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'synth-mix.ogg'; a.click();
        }

        function toggleSettings(show) { document.getElementById('settings-modal').classList.toggle('hidden', !show); }
        function updateSpacing(v) { document.documentElement.style.setProperty('--btn-gap', v + 'px'); }
        function updateSize(v) { 
            const percent = v / 100;
            document.documentElement.style.setProperty('--btn-size', `${percent}fr`);
        }
    </script>
</body>
</html>
