<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Phonics Word Game</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ===== CSS VARIABLES ===== */
  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --primary: #5b6ef5;
    --primary-dark: #3d52e8;
    --secondary: #ff7eb3;
    --accent: #ffcc44;
    --accent2: #44d9a2;
    --text: #1a1d2e;
    --text-light: #6b7280;
    --shadow: 0 4px 24px rgba(91,110,245,0.13);
    --shadow-sm: 0 2px 8px rgba(91,110,245,0.10);
    --radius: 20px;
    --radius-sm: 12px;
    --transition: 0.2s cubic-bezier(.4,0,.2,1);
    --correct: #44d9a2;
    --wrong: #ff6b6b;
  }

  /* ===== BASE STYLES ===== */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    flex-direction: column;
    gap: 20px;
    animation: fadeIn 0.3s ease;
  }

  .screen.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== TYPOGRAPHY & HEADERS ===== */
  h1 {
    font-size: 1.8rem;
    font-weight: 800;
    text-align: center;
    color: var(--primary);
    line-height: 1.2;
  }

  h2 {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  /* ===== UTILITIES / CONTROLS ===== */
  .btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 14px 24px;
    font-size: 1rem;
    font-weight: 600;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px; /* Accessible hit target */
    box-shadow: var(--shadow-sm);
  }

  .btn:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(1px);
  }

  .btn-secondary {
    background: #eef2ff;
    color: var(--primary);
    box-shadow: none;
  }

  .btn-secondary:hover {
    background: #e0e7ff;
  }

  /* ===== SELECTION TILES ===== */
  .grid-2x2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .tile {
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    font-weight: 600;
    font-size: 0.95rem;
    min-height: 48px;
  }

  .tile:hover {
    border-color: var(--primary);
    background: #f1f5f9;
  }

  .tile.selected {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  /* ===== GAME SCREEN COMPONENTS ===== */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text-light);
  }

  .progress-container {
    background: #e2e8f0;
    height: 8px;
    border-radius: 4px;
    width: 100%;
    overflow: hidden;
  }

  .progress-bar {
    background: var(--accent2);
    height: 100%;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* Audio Target Area */
  .audio-trigger-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    background: #f8fafc;
    border-radius: var(--radius);
    border: 2px dashed #cbd5e1;
    gap: 12px;
  }

  .audio-btn {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: var(--primary);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 16px rgba(91,110,245,0.3);
    transition: var(--transition);
  }

  .audio-btn img {
    width: 44px;
    height: 44px;
    filter: invert(1);
  }

  .audio-btn:hover {
    background: var(--primary-dark);
    transform: scale(1.05);
  }

  /* Tactile pulse indicator to signal interactive waiting state */
  .audio-btn.pulse-ready {
    animation: critical-pulse 1.4s infinite cubic-bezier(0.4, 0, 0.6, 1);
  }

  @keyframes critical-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(91, 110, 245, 0.5); transform: scale(1); }
    50% { box-shadow: 0 0 0 12px rgba(91, 110, 245, 0); transform: scale(1.04); }
  }

  .audio-hint {
    font-size: 0.85rem;
    color: var(--primary);
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  /* Interaction Modes UI */
  .options-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .option-btn {
    background: white;
    border: 2px solid #e2e8f0;
    padding: 16px;
    font-size: 1.2rem;
    font-weight: 700;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    min-height: 54px;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: #f8fafc;
  }

  .option-btn.correct {
    background: var(--correct) !important;
    border-color: var(--correct) !important;
    color: white;
  }

  .option-btn.wrong {
    background: var(--wrong) !important;
    border-color: var(--wrong) !important;
    color: white;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Spell Mode Input UI */
  .spell-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .spell-input {
    width: 100%;
    padding: 14px;
    font-size: 1.3rem;
    font-weight: 700;
    text-align: center;
    border: 2px solid #e2e8f0;
    border-radius: var(--radius-sm);
    outline: none;
    transition: var(--transition);
    text-transform: lowercase;
  }

  .spell-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(91,110,245,0.15);
  }

  .feedback-box {
    min-height: 40px;
    text-align: center;
    font-weight: 700;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
  }

  .feedback-box.correct {
    color: var(--correct);
  }

  .feedback-box.wrong {
    color: var(--wrong);
  }

  /* ===== RESULTS SCREEN ===== */
  .results-card {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px 0;
  }

  .trophy {
    font-size: 3.5rem;
    animation: bounce 1s infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
  }

  .score-display {
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--primary);
  }

  /* ===== SETTINGS RIGGER SUB-UI ===== */
  .settings-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 8px;
  }

  .label-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .segmented-control {
    display: flex;
    background: #f1f5f9;
    padding: 4px;
    border-radius: var(--radius-sm);
    gap: 4px;
  }

  .segment-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 8px;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    border-radius: 8px;
    transition: var(--transition);
    min-height: 38px;
  }

  .segment-btn.selected {
    background: white;
    color: var(--primary);
    box-shadow: var(--shadow-sm);
  }
</style>
</head>
<body>

<div class="container">

  <div id="start-screen" class="screen active">
    <h1>Phonics Explorer</h1>
    
    <div class="settings-row">
      <span class="label-title">Game Mode</span>
      <div class="segmented-control" id="mode-selector">
        <button class="segment-btn selected" data-value="choose">Multiple Choice</button>
        <button class="segment-btn" data-value="spell">Spelling Rule</button>
      </div>
    </div>

    <div class="settings-row">
      <span class="label-title">Audio Speed</span>
      <div class="segmented-control" id="speed-selector">
        <button class="segment-btn" data-value="0.6">Slow</button>
        <button class="segment-btn selected" data-value="0.85">Normal</button>
      </div>
    </div>

    <div class="settings-row">
      <span class="label-title">Select Word Lists</span>
      <div class="grid-2x2" id="categories-grid"></div>
    </div>

    <button class="btn" id="start-game-btn" style="margin-top: 10px;">Start Playground</button>
  </div>

  <div id="game-screen" class="screen">
    <div class="game-header">
      <span id="current-round-indicator">Round 1/5</span>
      <span id="current-score-indicator">Points: 0</span>
    </div>
    
    <div class="progress-container">
      <div class="progress-bar" id="game-progress-bar"></div>
    </div>

    <div class="audio-trigger-zone">
      <button class="audio-btn" id="audio-btn" aria-label="Play sound file token">
        <img src="https://api.arasaac.org/api/pictograms/2381" id="audio-img" alt="Sound Wave Icon">
      </button>
      <div class="audio-hint" id="audio-hint-text">👆 Tap to hear word!</div>
    </div>

    <div id="choose-mode-ui" class="options-container"></div>

    <div id="spell-mode-ui" class="spell-container" style="display: none;">
      <input type="text" class="spell-input" id="word-spelling-input" placeholder="Type what you hear..." autocomplete="off" autocapitalize="none">
      <button class="btn" id="spell-check-btn">Check Answer</button>
    </div>

    <div class="feedback-box" id="runtime-feedback"></div>
  </div>

  <div id="results-screen" class="screen">
    <div class="results-card">
      <div class="trophy">🏆</div>
      <h1>Activity Completed!</h1>
      <p style="color: var(--text-light);">Excellent processing and focus during the evaluation.</p>
      <div class="score-display" id="final-score-text">0/0</div>
    </div>
    
    <button class="btn" id="play-again-btn">Play Pool Again</button>
    <button class="btn btn-secondary" id="change-settings-btn">Change Configurations</button>
  </div>

</div>

<script>
// --- PHONICS COMPREHENSIVE CURRICULUM ASSETS ---
const PHONICS_CURRICULUM = {
  "Short Vowels (CVC)": [
    "cat", "mat", "sat", "rat", "bat", "map", "tap", "cap", "nap", "van",
    "hen", "pen", "ten", "bed", "red", "net", "wet", "pet", "leg", "peg",
    "pig", "big", "wig", "dig", "win", "pin", "fin", "sit", "hit", "lip",
    "dog", "log", "jog", "hot", "pot", "not", "top", "hop", "mop", "fox",
    "sun", "run", "fun", "nut", "cut", "hut", "tub", "rub", "bug", "jug"
  ],
  "Long Vowels (Silent E)": [
    "cake", "make", "bake", "lake", "rake", "game", "name", "same", "cave", "wave",
    "five", "nine", "line", "pine", "fine", "time", "lime", "kite", "bite", "ride",
    "bone", "cone", "zone", "home", "hope", "rope", "note", "vote", "rose", "nose",
    "tube", "cube", "june", "tune", "rude", "mule", "huge", "dune", "fuse", "flute"
  ],
  "Consonant Blends": [
    "frog", "free", "from", "flag", "flat", "fly", "plum", "play", "plan", "clip",
    "clap", "club", "glad", "glass", "glen", "crab", "cry", "crop", "drop", "drum",
    "dress", "tree", "trip", "trap", "stop", "step", "spot", "spin", "snip", "snap",
    "skip", "skin", "swim", "swam", "twin", "twig", "black", "blue", "blink", "blank"
  ],
  "Digraphs (SH, CH, TH)": [
    "ship", "shop", "shut", "fish", "dish", "wish", "rush", "bash", "chop", "chin",
    "chat", "much", "such", "rich", "thin", "thick", "path", "math", "with", "moth",
    "whip", "when", "gosh", "sing", "song", "ring", "wing", "king", "long", "bang"
  ]
};

// --- CLIENT STATE ENGINE REGISTER ---
let state = {
  mode: "choose", // choose | spell
  speed: 0.85,    // 0.60 | 0.85
  selectedCategories: [],
  wordPool: [],
  currentWord: "",
  roundIndex: 0,
  maxRounds: 5,
  score: 0,
  lockInput: false,
  hasHeardAudio: false // Tracking to unlock interaction safety if needed
};

// --- INTERFACE BUILDERS ---
function initApp() {
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = '';
  
  Object.keys(PHONICS_CURRICULUM).forEach((category, index) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    if (index === 0) {
      tile.className = 'tile selected';
      state.selectedCategories.push(category);
    }
    tile.textContent = category;
    tile.addEventListener('click', () => toggleCategoryTile(tile, category));
    grid.appendChild(tile);
  });

  setupConfigSelectors();
}

function toggleCategoryTile(tile, category) {
  if (tile.classList.contains('selected')) {
    if (state.selectedCategories.length > 1) {
      tile.classList.remove('selected');
      state.selectedCategories = state.selectedCategories.filter(c => c !== category);
    }
  } else {
    tile.classList.add('selected');
    state.selectedCategories.push(category);
  }
}

function setupConfigSelectors() {
  // Mode Controller Row
  document.getElementById('mode-selector').addEventListener('click', (e) => {
    const btn = e.target.closest('.segment-btn');
    if (!btn) return;
    document.querySelectorAll('#mode-selector .segment-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.mode = btn.getAttribute('data-value');
  });

  // Speed Controller Row
  document.getElementById('speed-selector').addEventListener('click', (e) => {
    const btn = e.target.closest('.segment-btn');
    if (!btn) return;
    document.querySelectorAll('#speed-selector .segment-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.speed = parseFloat(btn.getAttribute('data-value'));
  });

  document.getElementById('start-game-btn').addEventListener('click', startGame);
}

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
}

// --- CORE PLAY ENGINE SEQUENCER ---
function startGame() {
  // Extract configuration words arrays
  let combinedList = [];
  state.selectedCategories.forEach(cat => {
    combinedList = combinedList.concat(PHONICS_CURRICULUM[cat]);
  });

  if (combinedList.length === 0) return;

  // Generate randomized task subset
  state.wordPool = [...combinedList].sort(() => 0.5 - Math.random());
  state.maxRounds = Math.min(5, state.wordPool.length);
  state.roundIndex = 0;
  state.score = 0;

  // Reset screen visibility view ports
  document.getElementById('current-score-indicator').textContent = `Points: 0`;
  showScreen('game-screen');
  nextRound();
}

function nextRound() {
  if (state.roundIndex >= state.maxRounds) {
    endGame();
    return;
  }

  state.lockInput = false;
  state.hasHeardAudio = false;
  state.currentWord = state.wordPool[state.roundIndex];
  
  // Set UI Headers
  document.getElementById('current-round-indicator').textContent = `Round ${state.roundIndex + 1}/${state.maxRounds}`;
  const progressPercent = (state.roundIndex / state.maxRounds) * 100;
  document.getElementById('game-progress-bar').style.width = `${progressPercent}%`;
  document.getElementById('runtime-feedback').className = 'feedback-box';
  document.getElementById('runtime-feedback').textContent = '';

  // Trigger ready state animation on audio target button
  const audioBtn = document.getElementById('audio-btn');
  audioBtn.classList.add('pulse-ready');
  document.getElementById('audio-hint-text').textContent = "👆 Tap to hear word!";

  // Setup interaction views
  if (state.mode === 'choose') {
    document.getElementById('choose-mode-ui').style.display = 'grid';
    document.getElementById('spell-mode-ui').style.display = 'none';
    buildChoiceOptions();
  } else {
    document.getElementById('choose-mode-ui').style.display = 'none';
    document.getElementById('spell-mode-ui').style.display = 'flex';
    const input = document.getElementById('word-spelling-input');
    input.value = '';
    input.disabled = false;
    document.getElementById('spell-check-btn').disabled = false;
    setTimeout(() => input.focus(), 150);
  }
}

function buildChoiceOptions() {
  const container = document.getElementById('choose-mode-ui');
  container.innerHTML = '';

  // Draw random collection items from the active config items mapping
  let combinedList = [];
  state.selectedCategories.forEach(cat => {
    combinedList = combinedList.concat(PHONICS_CURRICULUM[cat]);
  });
  
  let distractors = combinedList.filter(w => w !== state.currentWord);
  distractors = [...new Set(distractors)].sort(() => 0.5 - Math.random()).slice(0, 3);

  let options = [state.currentWord, ...distractors];
  while (options.length < 4) {
    options.push("word");
  }
  options = options.sort(() => 0.5 - Math.random());

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.addEventListener('click', () => verifyChoiceAnswer(btn, opt));
    container.appendChild(btn);
  });
}

// --- VERIFICATION STRATEGIES ---
function verifyChoiceAnswer(selectedBtn, pickedValue) {
  if (state.lockInput) return;
  state.lockInput = true;

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  if (pickedValue === state.currentWord) {
    selectedBtn.classList.add('correct');
    triggerSuccessAudioFeedback();
  } else {
    selectedBtn.classList.add('wrong');
    buttons.forEach(b => {
      if (b.textContent === state.currentWord) b.classList.add('correct');
    });
    triggerFailureAudioFeedback();
  }
}

function checkSpelling() {
  if (state.lockInput) return;
  
  const input = document.getElementById('word-spelling-input');
  const userText = input.value.trim().toLowerCase();
  if (!userText) return;

  state.lockInput = true;
  input.disabled = true;
  document.getElementById('spell-check-btn').disabled = true;

  const feedback = document.getElementById('runtime-feedback');

  if (userText === state.currentWord.toLowerCase()) {
    feedback.className = 'feedback-box correct';
    feedback.textContent = '🎉 Awesome Job!';
    triggerSuccessAudioFeedback();
  } else {
    feedback.className = 'feedback-box wrong';
    feedback.textContent = `Correction: ${state.currentWord.toUpperCase()}`;
    triggerFailureAudioFeedback();
  }
}

function triggerSuccessAudioFeedback() {
  state.score++;
  document.getElementById('current-score-indicator').textContent = `Points: ${state.score}`;
  // Play subtle sound using Synthesis or step next immediately
  setTimeout(() => finalizeRoundStep(), 1500);
}

function triggerFailureAudioFeedback() {
  setTimeout(() => finalizeRoundStep(), 2400);
}

function finalizeRoundStep() {
  state.roundIndex++;
  nextRound();
}

function endGame() {
  document.getElementById('game-progress-bar').style.width = '100%';
  showScreen('results-screen');
  document.getElementById('final-score-text').textContent = `${state.score} / ${state.maxRounds}`;
}

// --- ACCESSIBLE TTS SYNTHESIS AUDIO DRIVER ENGINE ---
let availableVoices = [];
function loadVoices() {
  if (!('speechSynthesis' in window)) return;
  availableVoices = window.speechSynthesis.getVoices();
}

function speak(text, rateValue) {
  if (!('speechSynthesis' in window)) return;
  
  // Cancel active speech streams to prevent overlapping queues
  window.speechSynthesis.cancel();
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = rateValue || 0.85;
  utterance.pitch = 1.0;

  if (availableVoices.length === 0) loadVoices();
  
  // Target a natural English voice variant
  const primaryVoice = availableVoices.find(v => v.lang.startsWith('en') && !v.name.includes('Google'))
                    || availableVoices.find(v => v.lang.startsWith('en'))
                    || null;
                    
  if (primaryVoice) utterance.voice = primaryVoice;
  
  window.speechSynthesis.speak(utterance);
}

// --- GLOBAL EVENT LISTENERS BINDINGS ---
document.getElementById('audio-btn').addEventListener('click', () => {
  // Remove waiting pulse signal upon manual touch activation
  document.getElementById('audio-btn').classList.remove('pulse-ready');
  document.getElementById('audio-hint-text').textContent = "Listen";
  state.hasHeardAudio = true;
  speak(state.currentWord, state.speed);
});

document.getElementById('spell-check-btn').addEventListener('click', checkSpelling);

document.getElementById('word-spelling-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    checkSpelling();
  }
});

// Results buttons
document.getElementById('play-again-btn').addEventListener('click', () => {
  startGame();
});
document.getElementById('change-settings-btn').addEventListener('click', () => {
  showScreen('start-screen');
});

// Keyboard support (desktop support layout fallbacks)
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    const gameScreen = document.getElementById('game-screen');
    if (gameScreen.classList.contains('active') && state.currentWord) {
      document.getElementById('audio-btn').classList.remove('pulse-ready');
      document.getElementById('audio-hint-text').textContent = "Listen";
      speak(state.currentWord, state.speed);
    }
  }
  // Number keys 1-4 selection target options shortcut
  if (['1','2','3','4'].includes(e.key) && document.getElementById('choose-mode-ui').style.display !== 'none') {
    const btns = document.querySelectorAll('.option-btn');
    const idx = parseInt(e.key) - 1;
    if (btns[idx] && !btns[idx].disabled) btns[idx].click();
  }
});

// Handle ARASAAC image load error — fallback icon
document.getElementById('audio-img').addEventListener('error', function() {
  this.style.display = 'none';
