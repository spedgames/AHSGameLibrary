<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Story Detective</title>
<style>
  :root{
    --bg:#FFF8EE;
    --panel:#FFFFFF;
    --ink:#3A3A3A;
    --soft:#7A7A7A;
    --blue:#4F8FE8;
    --blue-dark:#3568B0;
    --green:#5FB87A;
    --green-dark:#3E9259;
    --yellow:#F5C84C;
    --red:#E8665A;
    --purple:#9B7FE0;
    --radius:22px;
    --shadow:0 6px 18px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{
    touch-action:manipulation; /* avoid double-tap zoom delay on iPad/mobile */
    height:100%;
    height:100dvh;
    overflow:hidden; /* the game frame manages its own fit; page itself never scrolls */
  }
  body{
    font-family:'Comic Sans MS','Segoe UI Rounded','Trebuchet MS',sans-serif;
    background:var(--bg);
    color:var(--ink);
    height:100%;
    height:100dvh; /* avoids iOS Safari address-bar resize jump */
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    overscroll-behavior-y:none; /* avoid iPad rubber-band scroll yanking the page */
    overflow:hidden;
  }
  .screen{
    width:100%;
    max-width:720px;
    height:100%;
    max-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px 16px 28px;
    overflow-y:auto; /* safety fallback: scrolls internally rather than breaking the frame if content ever needs more room */
    -webkit-overflow-scrolling:touch;
  }
  /* On tall/large desktop or tablet viewports, keep the game a comfortable
     card-sized frame in the middle of the screen instead of stretching
     into an oversized layout. */
  @media (min-width:760px) and (min-height:640px){
    body{ padding:24px; }
    .screen{
      height:min(100%, 880px);
      max-height:min(100%, 880px);
      border-radius:28px;
      box-shadow:0 20px 50px rgba(0,0,0,0.10);
      background:var(--panel);
    }
  }
  .hidden{display:none !important;}

  /* ---------- Top bar ---------- */
  .topbar{
    width:100%;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    gap:8px;
  }
  .topbar-left{
    display:flex;
    gap:8px;
  }
  .iconbtn{
    background:var(--panel);
    border:none;
    border-radius:16px;
    width:48px;
    height:48px;
    font-size:22px;
    box-shadow:var(--shadow);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    touch-action:manipulation;
  }
  .iconbtn:active{transform:scale(0.93);}
  .iconbtn[disabled]{
    opacity:0.35;
    cursor:default;
  }
  .iconbtn[disabled]:active{transform:none;}

  /* ---------- Headings ---------- */
  h1{
    font-size:1.8rem;
    margin:4px 0 2px;
    text-align:center;
  }
  .subtitle{
    color:var(--soft);
    text-align:center;
    font-size:1.05rem;
    margin-bottom:18px;
  }
  .big-emoji{
    font-size:4.2rem;
    margin-bottom:6px;
    display:inline-block;
    animation: floatBob 3.2s ease-in-out infinite;
  }
  @keyframes floatBob{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-10px) rotate(-4deg); }
  }

  /* Soft drifting background shapes for a livelier, non-distracting feel */
  .bg-float{
    position:fixed;
    font-size:2.4rem;
    opacity:0.16;
    pointer-events:none;
    z-index:0;
    animation: driftUpDown 6s ease-in-out infinite;
  }
  @keyframes driftUpDown{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-18px) rotate(8deg); }
  }

  /* ---------- Home screen story cards ---------- */
  .story-list{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-top:8px;
    position:relative;
    z-index:1;
  }
  .story-card{
    background:var(--panel);
    border:none;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:18px 18px;
    display:flex;
    align-items:center;
    gap:16px;
    cursor:pointer;
    text-align:left;
    width:100%;
    opacity:0;
    transform:translateY(16px);
    animation: cardRiseIn 0.55s ease forwards;
    touch-action:manipulation;
  }
  @keyframes cardRiseIn{
    to{ opacity:1; transform:translateY(0); }
  }
  .story-card:active{transform:scale(0.97);}
  .story-card .emoji{
    font-size:3rem;
    flex-shrink:0;
    display:inline-block;
    transition: transform 0.2s ease;
  }
  .story-card:hover .emoji{
    transform: scale(1.15) rotate(-6deg);
  }
  .story-card .title{font-size:1.25rem;font-weight:bold;}
  .story-card .desc{color:var(--soft);font-size:0.95rem;margin-top:2px;}

  /* ---------- Story screen ---------- */
  .progress-row{
    display:flex;
    flex-shrink:0;
    gap:8px;
    margin:6px 0 14px;
  }
  .dot{
    width:14px;height:14px;border-radius:50%;
    background:#E2DCCB;
    transition:background .25s;
  }
  .dot.done{background:var(--green);}
  .dot.current{background:var(--yellow);}

  .narration-card{
    background:var(--panel);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:16px 20px;
    width:100%;
    flex-shrink:0;
    margin-bottom:14px;
    display:flex;
    align-items:flex-start;
    gap:12px;
  }
  .narration-card .listen-btn{
    background:var(--blue);
    border:none;
    color:white;
    border-radius:50%;
    width:48px;height:48px;
    font-size:22px;
    flex-shrink:0;
    cursor:pointer;
    box-shadow:0 3px 8px rgba(79,143,232,0.4);
    touch-action:manipulation;
  }
  .narration-card .listen-btn:active{transform:scale(0.92);}
  .narration-text{
    font-size:1.15rem;
    line-height:1.5;
  }
  .narration-text b{color:var(--blue-dark);}

  .question-card{
    background:#FFF1D6;
    border:3px solid var(--yellow);
    border-radius:var(--radius);
    padding:14px 18px;
    width:100%;
    flex-shrink:0;
    margin-bottom:16px;
    font-size:1.2rem;
    font-weight:bold;
    text-align:center;
  }

  /* ---------- Scene (hotspot area) ---------- */
  .scene-wrap{
    position:relative;
    width:100%;
    flex:1 1 0;
    min-height:120px; /* keeps the scene visible even on very short viewports */
    background:var(--panel);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
    margin-bottom:14px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .scene-wrap svg{
    width:100%;
    height:100%;
    display:block;
    /* SVG's own viewBox + default preserveAspectRatio (xMidYMid meet)
       keeps the illustration correctly proportioned and centered no
       matter how the flexible container above is sized. */
  }
  .hotspot{
    cursor:pointer;
    transition: transform .15s;
    touch-action:manipulation;
  }
  .hotspot:hover{ filter:brightness(1.05); }
  .hotspot.correct-flash{
    animation: pulseGreen 0.6s ease;
  }
  .hotspot.wrong-flash{
    animation: shakeRed 0.5s ease;
  }
  @keyframes pulseGreen{
    0%{filter:none;}
    40%{filter:drop-shadow(0 0 14px rgba(95,184,122,0.9));}
    100%{filter:none;}
  }
  @keyframes shakeRed{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  .feedback-banner{
    width:100%;
    flex-shrink:0;
    text-align:center;
    font-size:1.3rem;
    font-weight:bold;
    border-radius:18px;
    padding:14px;
    margin-bottom:12px;
  }
  .feedback-banner.correct{
    background:#E3F6E8;
    color:var(--green-dark);
    border:3px solid var(--green);
  }
  .feedback-banner.try{
    background:#FBE9E7;
    color:#B5453B;
    border:3px solid var(--red);
  }

  /* ---------- Celebration / complete screen ---------- */
  .confetti-emoji{
    font-size:5rem;
    margin-bottom:6px;
    animation: bounceIn 0.7s ease;
  }
  @keyframes bounceIn{
    0%{ transform:scale(0) rotate(-10deg); opacity:0; }
    60%{ transform:scale(1.25) rotate(8deg); opacity:1; }
    80%{ transform:scale(0.92) rotate(-4deg); }
    100%{ transform:scale(1) rotate(0deg); }
  }
  .star-row{
    font-size:2.6rem;
    margin:10px 0 18px;
    letter-spacing:6px;
  }
  .star-row span{
    display:inline-block;
    opacity:0;
    transform:scale(0);
    animation: starPop 0.5s ease forwards;
  }
  @keyframes starPop{
    0%{ opacity:0; transform:scale(0) rotate(-30deg); }
    60%{ opacity:1; transform:scale(1.3) rotate(10deg); }
    100%{ opacity:1; transform:scale(1) rotate(0deg); }
  }
  .confetti-piece{
    position:fixed;
    top:-40px;
    font-size:1.8rem;
    pointer-events:none;
    z-index:60;
    animation-name: confettiFall;
    animation-timing-function: ease-in;
    animation-fill-mode: forwards;
  }
  @keyframes confettiFall{
    0%{ transform: translateY(0) rotate(0deg); opacity:1; }
    100%{ transform: translateY(110vh) rotate(360deg); opacity:0.9; }
  }
  .summary-card{
    background:var(--panel);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px;
    width:100%;
    text-align:center;
    font-size:1.15rem;
    margin-bottom:20px;
    animation: fadeUp 0.6s ease 0.3s both;
  }
  @keyframes fadeUp{
    0%{ opacity:0; transform:translateY(14px); }
    100%{ opacity:1; transform:translateY(0); }
  }
  .action-btn{
    background:var(--blue);
    color:white;
    border:none;
    border-radius:18px;
    font-size:1.15rem;
    font-weight:bold;
    padding:14px 26px;
    margin:6px;
    box-shadow:0 4px 10px rgba(79,143,232,0.4);
    cursor:pointer;
    touch-action:manipulation;
  }
  .action-btn.secondary{
    background:var(--purple);
    box-shadow:0 4px 10px rgba(155,127,224,0.4);
  }
  .action-btn:active{transform:scale(0.96);}

  /* ---------- Sparkle reward pop ---------- */
  .sparkle-pop{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:5rem;
    pointer-events:none;
    z-index:50;
    animation: popFade 0.9s ease forwards;
  }
  @keyframes popFade{
    0%{opacity:0; transform:translate(-50%,-50%) scale(0.3);}
    25%{opacity:1; transform:translate(-50%,-50%) scale(1.15);}
    70%{opacity:1; transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0; transform:translate(-50%,-50%) scale(0.9);}
  }

  /* ---------- Responsive tweaks: small phones ---------- */
  @media (max-width: 380px){
    .screen{ padding:14px 10px 20px; }
    h1{ font-size:1.5rem; }
    .subtitle{ font-size:0.95rem; }
    .big-emoji{ font-size:3.4rem; }
    .narration-text{ font-size:1.05rem; }
    .question-card{ font-size:1.05rem; padding:12px 14px; }
    .story-card .title{ font-size:1.1rem; }
    .story-card .emoji{ font-size:2.5rem; }
    .iconbtn{ width:44px; height:44px; font-size:20px; }
  }

  /* ---------- Responsive tweaks: short / landscape screens (e.g. iPad landscape, phone landscape) ---------- */
  @media (max-height: 480px){
    .screen{ padding:10px 16px 14px; }
    .big-emoji{ font-size:2.6rem; margin-bottom:0; }
    h1{ font-size:1.4rem; margin:2px 0; }
    .subtitle{ margin-bottom:10px; }
    .narration-card{ padding:10px 14px; margin-bottom:8px; }
    .question-card{ padding:8px 14px; margin-bottom:8px; }
    .narration-text{ font-size:1rem; }
    .question-card{ font-size:1.05rem; }
  }
  /* Prevent accidental pull-to-refresh / overscroll bounce on iPad Safari */
  body{ overflow-x:hidden; }
</style>
</head>
<body>

<!-- ============ HOME SCREEN ============ -->
<div class="screen" id="screen-home">
  <div class="bg-float" style="top:8%; left:6%; animation-delay:0s;">📚</div>
  <div class="bg-float" style="top:14%; left:80%; animation-delay:1.5s;">✏️</div>
  <div class="bg-float" style="top:70%; left:10%; animation-delay:0.8s;">🌟</div>
  <div class="bg-float" style="top:78%; left:84%; animation-delay:2.2s;">🔎</div>

  <div class="big-emoji">🔍📖</div>

  <div class="subtitle">Tap to find the matching detail in each picture!</div>

  <div class="story-list" id="story-list"></div>

    <div class="narration-text" id="narration-text"></div>
  </div>

  <div class="question-card" id="question-card"></div>

  <div class="feedback-banner hidden" id="feedback-banner"></div>

  <div class="scene-wrap" id="scene-wrap"></div>
</div>

<!-- ============ STORY COMPLETE SCREEN ============ -->
<div class="screen hidden" id="screen-complete">
  <div class="confetti-emoji">🎉</div>
  <h1 id="complete-title">Great Job!</h1>

</div>

<script>
/* ============================================================
   STORY DETECTIVE — app logic
   ============================================================ */

const screenHome = document.getElementById('screen-home');
const screenStory = document.getElementById('screen-story');
const screenComplete = document.getElementById('screen-complete');

const storyListEl = document.getElementById('story-list');
const progressRowEl = document.getElementById('progress-row');
const narrationTextEl = document.getElementById('narration-text');

const sceneWrapEl = document.getElementById('scene-wrap');

const btnSoundToggle = document.getElementById('btn-sound-toggle');

const completeTitleEl = document.getElementById('complete-title');

const btnGoHome = document.getElementById('btn-go-home');

let currentStory = null;
let currentQIndex = 0;
let correctSet = new Set(); // indices of questions answered correctly
let attemptedWrongThisQ = false;
let answeredThisQ = false;
let soundOn = true; // master sound toggle: gates auto-narration + sound effects

/* ---------------- HOME SCREEN ---------------- */
function renderHome(){
  storyListEl.innerHTML = '';
  STORIES.forEach((story, i) => {
    const card = document.createElement('button');
    card.className = 'story-card';
    card.style.animationDelay = (i * 0.12) + 's';
    card.innerHTML = `
      <div class="emoji">${story.emoji}</div>
      <div>
        <div class="title">${story.title}</div>
        <div class="desc">${story.desc}</div>
      </div>
    `;
    card.addEventListener('click', () => startStory(story));
    storyListEl.appendChild(card);
  });
}

function showScreen(el){
  [screenHome, screenStory, screenComplete].forEach(s => s.classList.add('hidden'));
  el.classList.remove('hidden');
}

/* ---------------- START / NAVIGATE STORY ---------------- */
function startStory(story){
  currentStory = story;
  currentQIndex = 0;
  correctSet = new Set();
  showScreen(screenStory);
  renderQuestion();
}

function renderProgressDots(){
  progressRowEl.innerHTML = '';
  currentStory.questions.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i < currentQIndex ? ' done' : (i === currentQIndex ? ' current' : ''));
    progressRowEl.appendChild(dot);
  });
}

function renderQuestion(){
  answeredThisQ = false;
  attemptedWrongThisQ = false;
  feedbackBannerEl.classList.add('hidden');
  feedbackBannerEl.className = 'feedback-banner hidden';

  renderProgressDots();

  const q = currentStory.questions[currentQIndex];
  narrationTextEl.innerHTML = q.text;
  questionCardEl.textContent = q.prompt;

  renderScene(q);

  // Auto-read narration aloud (only when sound is turned on)
  speakAuto(stripHtml(q.text) + ' ' + q.prompt);
}

/* ---------------- BUILD SCENE (consistent layout, 3 big tappable choices) ---------------- */
function renderCustomIcon(name, cx, cy){
  // Simple, bold, instantly-recognizable hand-drawn icons for items
  // that don't have a clear matching emoji.
  if(name === 'shovel'){
    return `
      <g transform="translate(${cx},${cy})">
        <!-- handle -->
        <rect x="-6" y="-48" width="12" height="55" rx="6" fill="#A8763E"/>
        <!-- grip -->
        <ellipse cx="0" cy="-50" rx="14" ry="9" fill="#7A5326"/>
        <!-- blade -->
        <path d="M -22 5 L 22 5 L 14 38 Q 0 50 -14 38 Z" fill="#9AA5AD" stroke="#6E777E" stroke-width="3"/>
      </g>
    `;
  }
  if(name === 'wateringcan'){
    return `
      <g transform="translate(${cx},${cy}) scale(0.95)">
        <!-- main body: rounded can shape -->
        <path d="M -22 -8 Q -24 30 0 32 Q 24 30 22 -8 Q 22 -22 0 -22 Q -22 -22 -22 -8 Z"
              fill="#5FA8E0" stroke="#3568B0" stroke-width="3"/>
        <!-- top opening -->
        <ellipse cx="0" cy="-22" rx="13" ry="6" fill="#3568B0"/>
        <!-- arched carry handle over the top -->
        <path d="M -14 -24 Q 0 -48 14 -24" fill="none" stroke="#3568B0" stroke-width="6" stroke-linecap="round"/>
        <!-- long spout going up-right, classic watering-can silhouette -->
        <path d="M 20 -6 L 50 -34" stroke="#3568B0" stroke-width="9" stroke-linecap="round"/>
        <!-- sprinkler head (rose) at end of spout -->
        <circle cx="53" cy="-37" r="8" fill="#5FA8E0" stroke="#3568B0" stroke-width="3"/>
        <!-- water droplets falling from the rose -->
        <circle cx="48" cy="-22" r="3" fill="#9ED3F2"/>
        <circle cx="58" cy="-20" r="3" fill="#9ED3F2"/>
        <circle cx="53" cy="-14" r="3" fill="#9ED3F2"/>
      </g>
    `;
  }
  if(name === 'puddle'){
    return `
      <g transform="translate(${cx},${cy})">
        <!-- flat irregular puddle shape, viewed from above, sitting on the ground -->
        <path d="M -40 6 Q -44 -8 -22 -10 Q -8 -22 12 -12 Q 36 -14 40 2 Q 44 14 22 16 Q 0 22 -20 14 Q -38 16 -40 6 Z"
              fill="#6FC1F5" stroke="#3568B0" stroke-width="3" opacity="0.9"/>
        <!-- ripple highlights to read clearly as water on the ground, not a drop -->
        <ellipse cx="-6" cy="0" rx="16" ry="7" fill="#BCE3FB" opacity="0.8"/>
        <ellipse cx="14" cy="6" rx="9" ry="4" fill="#E8F6FE" opacity="0.7"/>
      </g>
    `;
  }
  return '';
}

function renderScene(q){
  const svgNS = "http://www.w3.org/2000/svg";
  const width = 660, height = 330;

  let svg = `<svg viewBox="0 0 ${width} ${height}" xmlns="${svgNS}">`;
  // soft background
  svg += `<rect x="0" y="0" width="${width}" height="${height}" fill="#FBF4E6"/>`;
  // gentle ground line for visual grounding
  svg += `<rect x="0" y="${height-40}" width="${width}" height="40" fill="#F0E6CC"/>`;

  q.hotspots.forEach(h => {
    const r = 78;
    const innerContent = h.customSvg
      ? renderCustomIcon(h.customSvg, h.cx, h.cy)
      : `<text x="${h.cx}" y="${h.cy + 28}" font-size="72" text-anchor="middle" dominant-baseline="middle">${h.label}</text>`;
    svg += `
      <g class="hotspot" data-hot="${h.id}" data-correct="${h.correct}" tabindex="0" role="button" aria-label="${h.id}">
        <circle cx="${h.cx}" cy="${h.cy}" r="${r}" fill="${h.color}" opacity="0.18"/>
        <circle cx="${h.cx}" cy="${h.cy}" r="${r-10}" fill="#FFFFFF" stroke="${h.color}" stroke-width="5"/>
        ${innerContent}
      </g>
    `;
  });

  svg += `</svg>`;
  sceneWrapEl.innerHTML = svg;

  // attach listeners
  sceneWrapEl.querySelectorAll('.hotspot').forEach(g => {
    g.addEventListener('click', onHotspotClick);
    g.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){ onHotspotClick({currentTarget:g}); }
    });
  });
}

function onHotspotClick(e){
  if(answeredThisQ) return; // lock after correct answer found
  const g = e.currentTarget;
  const isCorrect = g.getAttribute('data-correct') === 'true';

  if(isCorrect){
    answeredThisQ = true;
    g.classList.add('correct-flash');
    showFeedback(true);
    correctSet.add(currentQIndex);
    popSparkle(g);
    playCorrectSound();
    // Auto-advance after a short pause so the student sees/hears the feedback
    setTimeout(goToNextQuestion, 1400);
  } else {
    g.classList.add('wrong-flash');
    setTimeout(()=>g.classList.remove('wrong-flash'), 500);
    attemptedWrongThisQ = true;
    showFeedback(false);
    playIncorrectSound();
  }
}

function goToNextQuestion(){
  currentQIndex++;
  if(currentQIndex >= currentStory.questions.length){
    finishStory();
  } else {
    renderQuestion();
  }
}

function showFeedback(correct){
  feedbackBannerEl.classList.remove('hidden');
  if(correct){
    feedbackBannerEl.className = 'feedback-banner correct';
    feedbackBannerEl.textContent = pickPraise();
  } else {
    feedbackBannerEl.className = 'feedback-banner try';
    feedbackBannerEl.textContent = "Try again!";
  }
}

function pickPraise(){
  const options = ["Great find! ⭐", "Yes! That's it! 🎉", "Nice job! 👏", "You found it! 🌟"];
  return options[Math.floor(Math.random()*options.length)];
}

/* ---------------- SPARKLE POP ---------------- */
function popSparkle(targetEl){
  const pop = document.createElement('div');
  pop.className = 'sparkle-pop';
  pop.textContent = '✨';
  document.body.appendChild(pop);
  setTimeout(()=>pop.remove(), 900);
}

/* ---------------- FINISH STORY ---------------- */
function finishStory(){
  showScreen(screenComplete);
  const total = currentStory.questions.length;
  completeTitleEl.textContent = `Great Job!`;
  const starCount = correctSet.size === total ? 3 : (correctSet.size >= Math.ceil(total/2) ? 2 : 1);

  // Build stars with staggered pop-in animation
  starRowEl.innerHTML = '';
  for(let i=0;i<3;i++){
    const span = document.createElement('span');
    span.textContent = i < starCount ? '⭐' : '☆';
    span.style.animationDelay = (0.15 + i*0.18) + 's';
    starRowEl.appendChild(span);
  }

  summaryCardEl.innerHTML = `You found <b>${correctSet.size} of ${total}</b> story details in<br><b>${currentStory.title}</b> ${currentStory.emoji}`;

  launchConfetti();
  playFanfareSound();
  speakAuto(`Great job! You finished ${currentStory.title}.`);
}

/* Falling confetti burst across the screen */
function launchConfetti(){
  const pieces = ['🎉','✨','🎊','⭐','🌟'];
  const count = 22;
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.textContent = pieces[Math.floor(Math.random()*pieces.length)];
    el.style.left = Math.random()*100 + 'vw';
    const duration = 1.8 + Math.random()*1.4;
    const delay = Math.random()*0.6;
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = delay + 's';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), (duration+delay)*1000 + 200);
  }
}

btnPlayAgain.addEventListener('click', () => startStory(currentStory));
btnGoHome.addEventListener('click', () => { showScreen(screenHome); });
btnHome.addEventListener('click', () => { showScreen(screenHome); });

/* ---------------- LISTEN / SOUND TOGGLE ---------------- */
function currentNarrationFull(){
  const q = currentStory.questions[currentQIndex];
  return stripHtml(q.text) + ' ' + q.prompt;
}
// The listen button next to the narration always works, even with sound
// switched off, so a player can still choose to hear a sentence read.
btnListen.addEventListener('click', () => speak(currentNarrationFull()));

/* ---------------- SOUND ON/OFF TOGGLE ---------------- */
function updateSoundToggleUI(){
  btnSoundToggle.textContent = soundOn ? '🔊' : '🔇';
  btnSoundToggle.setAttribute('aria-label', soundOn ? 'Sound on' : 'Sound off');
  btnSoundToggle.setAttribute('aria-pressed', soundOn ? 'true' : 'false');
}
btnSoundToggle.addEventListener('click', () => {
  soundOn = !soundOn;
  if(!soundOn){
    try{ window.speechSynthesis.cancel(); }catch(err){ /* ignore */ }
  }
  updateSoundToggleUI();
});
updateSoundToggleUI();

/* ---------------- SOUND EFFECTS (Web Audio, no external files) ---------------- */
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(err){ return null; }
  }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
  return audioCtx;
}

function playTone(freq, startTime, duration, ctx, type='sine', peakGain=0.25){
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(peakGain, startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

/* Cheerful little ascending major-chord chime for a correct answer */
function playCorrectSound(){
  if(!soundOn) return;
  const ctx = getAudioCtx();
  if(!ctx) return;
  const now = ctx.currentTime;
  const notes = [523.25, 659.25, 784.0]; // C5, E5, G5
  notes.forEach((freq, i) => {
    playTone(freq, now + i * 0.09, 0.35, ctx, 'sine', 0.22);
  });
}

/* Clear but gentle descending "blip-blip" for an incorrect answer.
   Distinct enough from the correct chime to be unmistakable,
   but still soft (no harsh buzzer/error tone). */
function playIncorrectSound(){
  if(!soundOn) return;
  const ctx = getAudioCtx();
  if(!ctx) return;
  const now = ctx.currentTime;
  playTone(392, now, 0.22, ctx, 'triangle', 0.20);
  playTone(294, now + 0.18, 0.28, ctx, 'triangle', 0.20);
}

/* Triumphant little fanfare for finishing a whole story */
function playFanfareSound(){
  if(!soundOn) return;
  const ctx = getAudioCtx();
  if(!ctx) return;
  const now = ctx.currentTime;
  const melody = [523.25, 523.25, 659.25, 784.0, 1046.5]; // C5 C5 E5 G5 C6
  const timings = [0, 0.16, 0.32, 0.48, 0.66];
  melody.forEach((freq, i) => {
    playTone(freq, now + timings[i], 0.4, ctx, 'triangle', 0.24);
  });
}

/* ---------------- SPEECH SYNTH ---------------- */
function speak(text){
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.92;
    utter.pitch = 1.05;
    window.speechSynthesis.speak(utter);
  }catch(err){ /* fail silently */ }
}

// Used for automatic narration (on question load / story completion).
// Manual taps on the listen button always call speak() directly instead,
// so a player can still hear a sentence read even with sound switched off.
function speakAuto(text){
  if(!soundOn) return;
  speak(text);
}

function stripHtml(html){
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

/* ---------------- INIT ---------------- */
renderHome();
showScreen(screenHome);

// iOS/iPadOS requires AudioContext + SpeechSynthesis to be touched
// inside a real user-gesture before they'll produce sound. This
// primes both on the very first tap anywhere in the app.
function unlockAudioOnce(){
  const ctx = getAudioCtx();
  if(ctx && ctx.state === 'suspended'){ ctx.resume(); }
  try{
    if('speechSynthesis' in window){
      // a near-silent warm-up utterance unlocks speech on iOS
      const warm = new SpeechSynthesisUtterance(' ');
      warm.volume = 0;
      window.speechSynthesis.speak(warm);
    }
  }catch(err){ /* ignore */ }
  document.removeEventListener('touchend', unlockAudioOnce);
  document.removeEventListener('click', unlockAudioOnce);
}
document.addEventListener('touchend', unlockAudioOnce, { once:true, passive:true });
document.addEventListener('click', unlockAudioOnce, { once:true });

</script>
