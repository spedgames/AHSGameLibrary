<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Builder Safari</title>
<style>
  :root{
    --bg1:#E8F6FF;
    --bg2:#D6EEFF;
    --panel:#FFFFFF;
    --ink:#2E3A45;
    --accent:#4FB8E8;
    --accent-dark:#2E97C9;
    --green:#7FD8A0;
    --green-dark:#4FBE7D;
    --orange:#FFB36B;
    --orange-dark:#F08C3A;
    --pink:#FFB3C6;
    --purple:#C9A8FF;
    --yellow:#FFE07D;
    --shadow:rgba(0,0,0,0.12);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:'Segoe UI Rounded',-apple-system,'Helvetica Neue',Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--ink);
    overflow:hidden;
    touch-action:manipulation;
  }
  #app{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;width:100vw;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .screen{
    width:100%;max-width:900px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:16px;min-height:100vh;box-sizing:border-box;
  }
  .hidden{display:none !important;}

  /* ---------- Title screen ---------- */
  .title-card{
    background:var(--panel);border-radius:32px;
    padding:32px 28px 24px;box-shadow:0 10px 0 var(--shadow);
    text-align:center;width:100%;max-width:560px;
  }
  .logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;}
  h1{font-size:clamp(26px,6vw,40px);margin:0;color:var(--accent-dark);text-shadow:2px 2px 0 #fff,3px 3px 0 var(--shadow);}
  .subtitle{font-size:clamp(15px,2.6vw,19px);color:#5b6b78;margin:6px 0 22px;font-weight:600;}
  .mode-grid{display:flex;flex-direction:column;gap:14px;}
  .mode-btn{
    border:none;border-radius:22px;padding:16px 18px;
    font-size:clamp(18px,3.6vw,22px);font-weight:800;color:#fff;cursor:pointer;
    box-shadow:0 6px 0 var(--shadow);transition:transform .08s ease;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .mode-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--shadow);}
  .mode-btn .desc{font-size:0.58em;font-weight:600;opacity:.92;display:block;margin-top:2px;}
  .mode-btn .label-wrap{text-align:left;}
  #modeEasy{background:linear-gradient(180deg,var(--green),var(--green-dark));}
  #modeMedium{background:linear-gradient(180deg,var(--accent),var(--accent-dark));}
  #modeHard{background:linear-gradient(180deg,var(--purple),#A07AE8);}
  .emoji-badge{font-size:1.4em;flex:0 0 auto;}
  .footer-note{margin-top:14px;font-size:12px;color:#9aa9b5;text-align:center;}

  /* ---------- Game screen ---------- */
  #gameScreen{justify-content:flex-start;padding-top:14px;}
  .topbar{width:100%;max-width:760px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .pill{background:var(--panel);border-radius:999px;padding:8px 16px;font-weight:800;font-size:clamp(14px,2.6vw,18px);box-shadow:0 4px 0 var(--shadow);color:var(--accent-dark);}
  .icon-btn{background:var(--panel);border:none;border-radius:50%;width:48px;height:48px;font-size:22px;box-shadow:0 4px 0 var(--shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .icon-btn:active{transform:translateY(3px);}

  .stage{
    width:100%;max-width:760px;background:var(--panel);border-radius:30px;
    box-shadow:0 10px 0 var(--shadow);padding:22px 18px 26px;
    display:flex;flex-direction:column;align-items:center;gap:16px;
  }

  /* step indicator pills */
  .step-indicator{display:flex;gap:8px;}
  .step-pill{
    padding:6px 14px;border-radius:999px;font-size:13px;font-weight:800;
    background:#EEF3F6;color:#9aa9b5;
  }
  .step-pill.active{background:var(--accent);color:#fff;}
  .step-pill.done{background:var(--green-dark);color:#fff;}

  .emoji-display{font-size:clamp(60px,14vw,90px);line-height:1;}

  .listen-btn{
    background:linear-gradient(180deg,var(--yellow),#F4C24A);border:none;border-radius:50%;
    width:74px;height:74px;font-size:32px;box-shadow:0 6px 0 var(--shadow);cursor:pointer;
    display:flex;align-items:center;justify-content:center;animation:pulseGlow 2.6s ease-in-out infinite;
  }
  .listen-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--shadow);}
  @keyframes pulseGlow{
    0%,100%{box-shadow:0 6px 0 var(--shadow), 0 0 0 0 rgba(244,194,74,0.5);}
    50%{box-shadow:0 6px 0 var(--shadow), 0 0 0 14px rgba(244,194,74,0);}
  }

  .instruction{font-size:clamp(16px,3.2vw,20px);font-weight:800;color:var(--accent-dark);text-align:center;}

  /* ---------- SPELL step ---------- */
  .spell-wrap{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;}
  .blanks-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .blank-slot{
    width:50px;height:58px;border-bottom:5px solid var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:32px;font-weight:800;color:var(--accent-dark);
  }
  .blank-slot.filled{border-bottom:5px solid var(--green-dark);animation:popIn .3s ease;}
  @keyframes popIn{0%{transform:scale(0.5);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
  .tiles-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;max-width:420px;}
  .letter-tile{
    width:54px;height:54px;border-radius:14px;border:none;
    font-size:26px;font-weight:800;color:#fff;
    background:linear-gradient(180deg,var(--accent),var(--accent-dark));
    box-shadow:0 5px 0 var(--shadow);cursor:pointer;
  }
  .letter-tile:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
  .letter-tile.used{visibility:hidden;}
  .letter-tile.shake{animation:tileShake .4s ease;}
  @keyframes tileShake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  /* ---------- CHOOSE step ---------- */
  .choices{display:grid;gap:14px;width:100%;justify-content:center;}
  .choices.cols2{grid-template-columns:repeat(2,minmax(120px,1fr));}
  .choices.cols3{grid-template-columns:repeat(3,minmax(100px,1fr));}
  .choices.cols4{grid-template-columns:repeat(2,minmax(110px,1fr));}
  @media (min-width:520px){ .choices.cols4{grid-template-columns:repeat(4,minmax(100px,1fr));} }
  .choice-btn{
    border:none;border-radius:20px;padding:18px 10px;
    font-size:clamp(20px,4.6vw,28px);font-weight:800;color:#fff;cursor:pointer;
    min-height:72px;box-shadow:0 6px 0 var(--shadow);transition:transform .08s ease, filter .15s ease;
  }
  .choice-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--shadow);}
  .c0{background:linear-gradient(180deg,#FF9F45,#E8843A);}
  .c1{background:linear-gradient(180deg,#8FCBFF,#5DA9E8);}
  .c2{background:linear-gradient(180deg,#7FD8A0,#4FBE7D);}
  .c3{background:linear-gradient(180deg,#FFB3C6,#F082A0);}
  .choice-btn.correct-flash{animation:correctPop .55s ease;filter:brightness(1.15);}
  .choice-btn.wrong-flash{animation:wrongShake .45s ease;}
  @keyframes correctPop{0%{transform:scale(1);}40%{transform:scale(1.12);}100%{transform:scale(1);}}
  @keyframes wrongShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
  .choice-btn.dim{opacity:0.35;pointer-events:none;}

  .progress-row{display:flex;gap:8px;margin-top:6px;}
  .dot{width:14px;height:14px;border-radius:50%;background:#E3EDF2;}
  .dot.filled{background:var(--accent);}

  #celebrate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:50;}
  .confetti-piece{position:absolute;width:12px;height:12px;border-radius:3px;opacity:0.95;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:0.3;}}

  #finishScreen{text-align:center;}
  .finish-card{background:var(--panel);border-radius:32px;padding:36px 26px;box-shadow:0 10px 0 var(--shadow);max-width:520px;}
  .finish-emoji{font-size:64px;margin-bottom:6px;}
  .finish-stat{font-size:clamp(20px,4vw,28px);font-weight:800;color:var(--accent-dark);margin:14px 0;}
  .big-btn{
    border:none;border-radius:22px;padding:16px 30px;font-size:clamp(18px,3.6vw,22px);font-weight:800;color:#fff;
    background:linear-gradient(180deg,var(--accent),var(--accent-dark));box-shadow:0 6px 0 var(--shadow);cursor:pointer;margin-top:10px;
  }
  .big-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--shadow);}
  .secondary-btn{border:none;background:#EAF2F6;color:#5b6b78;border-radius:22px;padding:14px 26px;font-size:clamp(15px,3vw,18px);font-weight:700;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>
<div id="app">

  <!-- TITLE SCREEN -->
  <div class="screen" id="titleScreen">
    <div class="title-card">
      <div class="logo-row">
        <span style="font-size:40px;">🦒</span>
        <h1>Word Builder Safari</h1>
      </div>
      <div class="subtitle">Spell it. Read it!</div>
      <div class="mode-grid">
        <button class="mode-btn" id="modeEasy">
          <span class="label-wrap">Easy<span class="desc">Things • 2 choices</span></span>
          <span class="emoji-badge">🐢</span>
        </button>
        <button class="mode-btn" id="modeMedium">
          <span class="label-wrap">Medium<span class="desc">Things &amp; Actions • Spell + Read</span></span>
          <span class="emoji-badge">🦁</span>
        </button>
        <button class="mode-btn" id="modeHard">
          <span class="label-wrap">Hard<span class="desc">Actions • Spell + Listen &amp; Read</span></span>
          <span class="emoji-badge">🐆</span>
        </button>
      </div>
      <div class="footer-note">Tap a difficulty level to begin</div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen hidden" id="gameScreen">
    <div class="topbar">
      <button class="icon-btn" id="homeBtn" aria-label="Home">🏠</button>
      <div class="pill" id="scorePill">⭐ 0 / 8</div>
      <button class="icon-btn" id="muteBtn" aria-label="Mute sound effects">🔊</button>
    </div>
    <div class="stage">
      <div class="step-indicator" id="stepIndicator"></div>

      <div class="emoji-display" id="emojiDisplay">🐱</div>
      <button class="listen-btn" id="listenBtn" aria-label="Repeat word">🔊</button>

      <div class="instruction" id="instructionText">Tap the letters to spell the word</div>

      <!-- SPELL STEP -->
      <div id="spellStep" class="spell-wrap hidden">
        <div class="blanks-row" id="blanksRow"></div>
        <div class="tiles-row" id="tilesRow"></div>
      </div>

      <!-- CHOOSE STEP -->
      <div id="chooseStep" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;">
        <div class="choices cols2" id="choicesWrap"></div>
      </div>

      <div class="progress-row" id="progressRow"></div>
    </div>
  </div>

  <!-- FINISH SCREEN -->
  <div class="screen hidden" id="finishScreen">
    <div class="finish-card">
      <div class="finish-emoji">🦒🎉</div>
      <h1 style="font-size:clamp(24px,5vw,34px);">Amazing Word Building!</h1>
      <div class="finish-stat" id="finishStat">8 / 8 words!</div>
      <div>
        <button class="big-btn" id="playAgainBtn">Play Again</button><br>
        <button class="secondary-btn" id="homeBtn2">Choose Level</button>
      </div>
    </div>
  </div>

  <div id="celebrate"></div>
</div>

<script>
/* =========================================================
   WORD BUILDER SAFARI
   Variant of Sight Word Safari teaching concrete nouns/verbs
   through two layered interactions per word:
     1) SPELL  - tap letter tiles in order to build the word
     2) READ   - multiple-choice word recognition
   Single offline HTML file. Follows AHS Game Library
   audio/visual conventions.
   ========================================================= */

/* ---------- Word banks (concrete, picturable nouns & verbs) ---------- */
const NOUNS = ["cat","dog","ball","cup","sun","car","bed","fish","book","bird"];
const VERBS = ["run","eat","sit","jump","drink","sleep","walk","swim","read","hop"];
const LONG_NOUNS_FOR_HARD = ["book","fish","bird"]; // a few nouns mixed into Hard for variety

const EMOJI = {
  cat:"🐱", dog:"🐶", ball:"⚽", cup:"☕", sun:"☀️", car:"🚗", bed:"🛏️", fish:"🐠", book:"📖", bird:"🐦",
  run:"🏃", eat:"🍽️", sit:"🪑", jump:"🤸", drink:"🥤", sleep:"😴", walk:"🚶", swim:"🏊", read:"📖", hop:"🐇"
};

let roundsTotal = 8;
let roundIndex = 0;
let score = 0;
let currentMode = "easy";
let wordQueue = [];
let roundToken = 0;
let pendingTimers = [];

// per-round mutable sub-state (reset every round)
let stepList = [];
let stepIndex = 0;
let spellTarget = "";
let spellProgress = "";   // letters confirmed so far
let currentRoundTarget = "";

/* ---------- Audio (Web Audio API) ---------- */
let audioCtx = null;
let sfxMuted = false;
function getCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function toggleSfxMute(){
  sfxMuted = !sfxMuted;
  const btn = document.getElementById("muteBtn");
  btn.textContent = sfxMuted ? "🔇" : "🔊";
  btn.setAttribute("aria-label", sfxMuted ? "Unmute sound effects" : "Mute sound effects");
}
function playTone(freq, start, dur, type, gainVal){
  if(sfxMuted) return;
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || "sine";
  osc.frequency.value = freq;
  gain.gain.value = gainVal || 0.18;
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(ctx.currentTime + start);
  gain.gain.setValueAtTime(gainVal || 0.18, ctx.currentTime + start);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
  osc.stop(ctx.currentTime + start + dur + 0.02);
}
function playCorrectSound(){
  playTone(523.25,0,0.14,"sine",0.2); playTone(659.25,0.1,0.14,"sine",0.2); playTone(783.99,0.2,0.22,"sine",0.22);
}
function playWrongSound(){ playTone(180,0,0.18,"sine",0.18); playTone(140,0.08,0.22,"sine",0.16); }
function playTickSound(){ playTone(880,0,0.08,"square",0.10); }
function playLevelUpFanfare(){
  [523.25,587.33,659.25,783.99,880].forEach((f,i)=>playTone(f,i*0.11,0.18,"triangle",0.18));
}

/* ---------- Speech synthesis ---------- */
function speak(text, rate){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = rate || 0.85;
  utter.pitch = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => /en/i.test(v.lang) && /female|en-US|en-GB/i.test(v.name));
  if(preferred) utter.voice = preferred;
  window.speechSynthesis.speak(utter);
}
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

/* ---------- Helpers ---------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function pickN(arr, n, exclude){
  const pool = arr.filter(w => w !== exclude);
  return shuffle(pool).slice(0, n);
}
function vibrate(ms){ if(navigator.vibrate) navigator.vibrate(ms); }
function safeTimeout(fn, ms){ const id = setTimeout(fn, ms); pendingTimers.push(id); return id; }
function clearPendingTimers(){ pendingTimers.forEach(id => clearTimeout(id)); pendingTimers = []; }

/* ---------- Mode config ---------- */
function getModeConfig(mode){
  if(mode === "easy"){
    return { words: NOUNS, distractorPool: NOUNS.concat(VERBS), steps: ["choose"], numChoices: 2, hideWordOnChoose: false };
  }
  if(mode === "medium"){
    return { words: shuffle(NOUNS.concat(VERBS)), distractorPool: NOUNS.concat(VERBS), steps: ["spell","choose"], numChoices: 3, hideWordOnChoose: false };
  }
  return { words: VERBS.concat(LONG_NOUNS_FOR_HARD), distractorPool: NOUNS.concat(VERBS), steps: ["spell","choose"], numChoices: 4, hideWordOnChoose: true };
}

const STEP_LABELS = { spell:"🔤 Spell", choose:"👀 Read" };

/* ---------- Game flow ---------- */
function startMode(mode){
  clearPendingTimers();
  roundToken++;
  currentMode = mode;
  roundIndex = 0;
  score = 0;
  const cfg = getModeConfig(mode);
  wordQueue = shuffle(cfg.words);
  document.getElementById("titleScreen").classList.add("hidden");
  document.getElementById("finishScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");
  buildProgressDots();
  nextRound();
}

function buildProgressDots(){
  const row = document.getElementById("progressRow");
  row.innerHTML = "";
  for(let i=0;i<roundsTotal;i++){
    const d = document.createElement("div");
    d.className = "dot"; d.id = "dot"+i;
    row.appendChild(d);
  }
}
function updateProgressDots(){
  for(let i=0;i<roundsTotal;i++){
    const d = document.getElementById("dot"+i);
    if(d) d.classList.toggle("filled", i < roundIndex);
  }
}

function nextRound(){
  if(roundIndex >= roundsTotal){ finishGame(); return; }
  roundToken++;
  const myToken = roundToken;
  const cfg = getModeConfig(currentMode);

  if(wordQueue.length === 0) wordQueue = shuffle(cfg.words);
  const target = wordQueue.pop();

  // build this round's complete state atomically
  const round = { target, cfg, myToken, steps: cfg.steps.slice(), stepIdx: 0 };
  stepList = round.steps;
  stepIndex = 0;
  spellTarget = target;
  spellProgress = "";
  currentRoundTarget = target;

  document.getElementById("scorePill").textContent = "⭐ " + score + " / " + roundsTotal;
  updateProgressDots();
  document.getElementById("emojiDisplay").textContent = EMOJI[target] || "❓";

  renderStepIndicator();
  runStep(round);

  safeTimeout(() => { if(myToken === roundToken) speak(target); }, 350);
}

function renderStepIndicator(){
  const wrap = document.getElementById("stepIndicator");
  wrap.innerHTML = "";
  if(stepList.length <= 1) return; // no need to show a single-step indicator
  stepList.forEach((s, i) => {
    const pill = document.createElement("div");
    pill.className = "step-pill" + (i === stepIndex ? " active" : i < stepIndex ? " done" : "");
    pill.textContent = STEP_LABELS[s];
    pill.id = "stepPill"+i;
    wrap.appendChild(pill);
  });
}

function showOnlyStep(stepName){
  document.getElementById("spellStep").classList.toggle("hidden", stepName !== "spell");
  document.getElementById("chooseStep").classList.toggle("hidden", stepName !== "choose");
}

function runStep(round){
  const stepName = stepList[stepIndex];
  renderStepIndicator();
  showOnlyStep(stepName);
  if(stepName === "spell") setupSpellStep(round);
  else if(stepName === "choose") setupChooseStep(round);
}

function advanceStep(round){
  stepIndex++;
  if(stepIndex >= stepList.length){
    roundIndex++;
    score++; // each fully-completed word earns a star
    document.getElementById("scorePill").textContent = "⭐ " + score + " / " + roundsTotal;
    playLevelUpFanfare();
    launchConfetti();
    safeTimeout(() => { if(round.myToken === roundToken) nextRound(); }, 1100);
  } else {
    runStep(round);
  }
}

/* ---------- SPELL step: tap letter tiles in order ---------- */
function setupSpellStep(round){
  const target = round.target;
  document.getElementById("instructionText").textContent = "Tap the letters to spell the word";
  spellTarget = target;
  spellProgress = "";

  const blanksRow = document.getElementById("blanksRow");
  blanksRow.innerHTML = "";
  target.split("").forEach((ch, i) => {
    const slot = document.createElement("div");
    slot.className = "blank-slot";
    slot.id = "blankSlot"+i;
    blanksRow.appendChild(slot);
  });

  const tilesRow = document.getElementById("tilesRow");
  tilesRow.innerHTML = "";
  const letters = shuffle(target.split(""));
  letters.forEach((ch, i) => {
    const tile = document.createElement("button");
    tile.className = "letter-tile";
    tile.textContent = ch.toUpperCase();
    tile.id = "tile"+i;
    tile.addEventListener("click", () => handleLetterTap(ch, tile, round));
    tilesRow.appendChild(tile);
  });
}

function handleLetterTap(letter, tileEl, round){
  if(round.myToken !== roundToken) return;
  const nextIndex = spellProgress.length;
  const expected = spellTarget[nextIndex];
  if(letter === expected){
    spellProgress += letter;
    const slot = document.getElementById("blankSlot"+nextIndex);
    if(slot){ slot.textContent = letter.toUpperCase(); slot.classList.add("filled"); }
    tileEl.classList.add("used");
    playTickSound();
    vibrate(20);
    if(spellProgress.length === spellTarget.length){
      playCorrectSound();
      speak(spellTarget);
      safeTimeout(() => { if(round.myToken === roundToken) advanceStep(round); }, 900);
    }
  } else {
    playWrongSound();
    vibrate([20,20,20]);
    tileEl.classList.add("shake");
    safeTimeout(() => tileEl.classList.remove("shake"), 400);
  }
}

/* ---------- CHOOSE step: multiple-choice word recognition ---------- */
function setupChooseStep(round){
  const target = round.target;
  const cfg = round.cfg;
  document.getElementById("instructionText").textContent = cfg.hideWordOnChoose
    ? "Listen, then tap the word you hear"
    : "Tap the matching word";

  const distractors = pickN(cfg.distractorPool, cfg.numChoices - 1, target);
  const choices = shuffle([target, ...distractors]);

  const wrap = document.getElementById("choicesWrap");
  wrap.className = "choices " + (cfg.numChoices === 2 ? "cols2" : cfg.numChoices === 3 ? "cols3" : "cols4");
  wrap.innerHTML = "";
  let answered = false;
  choices.forEach((word, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn c" + i;
    btn.textContent = word;
    btn.addEventListener("click", () => {
      if(round.myToken !== roundToken || answered) return;
      answered = true;
      const allBtns = wrap.querySelectorAll(".choice-btn");
      allBtns.forEach(b => b.style.pointerEvents = "none");
      if(word === target){
        playCorrectSound();
        vibrate(40);
        btn.classList.add("correct-flash");
        allBtns.forEach(b => { if(b !== btn) b.classList.add("dim"); });
        speak(word + "! You red it!", 0.95); // "red" spelling is intentional so speech synthesis says the past-tense "read" (rhymes with "red") instead of the present-tense "reed"
        safeTimeout(() => { if(round.myToken === roundToken) advanceStep(round); }, 1000);
      } else {
        playWrongSound();
        vibrate([30,30,30]);
        btn.classList.add("wrong-flash");
        btn.classList.add("dim");
        speak("Try again");
        safeTimeout(() => {
          if(round.myToken !== roundToken) return;
          btn.classList.remove("wrong-flash");
          answered = false;
          allBtns.forEach(b => { if(!b.classList.contains("dim")) b.style.pointerEvents = "auto"; });
        }, 500);
      }
    });
    wrap.appendChild(btn);
  });

  safeTimeout(() => { if(round.myToken === roundToken && cfg.hideWordOnChoose) speak(target); }, 200);
}

function launchConfetti(){
  const colors = ["#4FB8E8","#FFB36B","#7FD8A0","#FFB3C6","#C9A8FF","#FFE07D"];
  const container = document.getElementById("celebrate");
  for(let i=0;i<22;i++){
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = Math.random()*100 + "vw";
    piece.style.top = "-20px";
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = (1.4 + Math.random()*1.2) + "s";
    piece.style.transform = "rotate(" + Math.floor(Math.random()*360) + "deg)";
    container.appendChild(piece);
    safeTimeout(() => piece.remove(), 2800);
  }
}

function finishGame(){
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("finishScreen").classList.remove("hidden");
  document.getElementById("finishStat").textContent = score + " / " + roundsTotal + " words!";
  playLevelUpFanfare();
  launchConfetti();
  speak("Wonderful word building! You built " + score + " out of " + roundsTotal + " words!", 0.95);
}

function goHome(){
  clearPendingTimers();
  roundToken++;
  window.speechSynthesis && window.speechSynthesis.cancel();
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("finishScreen").classList.add("hidden");
  document.getElementById("titleScreen").classList.remove("hidden");
}

/* ---------- Event wiring ---------- */
document.getElementById("modeEasy").addEventListener("click", () => startMode("easy"));
document.getElementById("modeMedium").addEventListener("click", () => startMode("medium"));
document.getElementById("modeHard").addEventListener("click", () => startMode("hard"));
document.getElementById("homeBtn").addEventListener("click", goHome);
document.getElementById("homeBtn2").addEventListener("click", goHome);
document.getElementById("playAgainBtn").addEventListener("click", () => startMode(currentMode));
document.getElementById("listenBtn").addEventListener("click", () => speak(currentRoundTarget));
document.getElementById("muteBtn").addEventListener("click", toggleSfxMute);

// unlock audio context + speech on first interaction (iOS/Safari requirement)
document.body.addEventListener("click", function unlock(){
  getCtx();
  if('speechSynthesis' in window){
    const warm = new SpeechSynthesisUtterance(" ");
    warm.volume = 0;
    window.speechSynthesis.speak(warm);
  }
  document.body.removeEventListener("click", unlock);
}, { once:true });

// prevent double-tap zoom on iOS
document.addEventListener("dblclick", e => e.preventDefault());
let lastTouchEnd = 0;
document.addEventListener("touchend", e => {
  const now = Date.now();
  if(now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive:false });
</script>
