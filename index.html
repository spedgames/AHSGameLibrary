<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learning Game Galaxy</title>
    <!-- Friendly Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-pink: #ffc2d1;
            --soft-blue: #bde0fe;
            --soft-purple: #e2afff;
            --soft-yellow: #fff4ad;
            --text-main: #5d5d5d;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fafafc;
            background-image: radial-gradient(#e5e5f7 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            color: var(--text-main);
            padding-top: 70px;
        }

        /* NAVIGATION BAR - CUTESY STYLE */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            padding: 12px 0;
            border-bottom: 3px solid var(--soft-blue);
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            padding: 8px 18px;
            margin: 0 4px;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        nav a.active {
            background: var(--soft-pink);
            color: white;
        }

        /* HEADER */
        header { text-align: center; padding: 30px 10px; }
        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 3rem;
            color: #ff85a1;
            margin: 0;
        }

        /* GRID */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        .section-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            color: #72efdd;
            margin-top: 30px;
            border-bottom: 3px dashed #72efdd;
            display: inline-block;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        /* GAME CARD - ROUNDED & SOFT */
        .game-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            border: 4px solid white;
        }

        .game-card:active { transform: scale(0.96); }

        .snapshot {
            width: 100%;
            height: 160px;
            background-size: cover;
            background-position: center;
            background-color: var(--soft-blue);
        }

        .card-content { padding: 20px; text-align: center; }
        .card-title { font-family: 'Fredoka', sans-serif; font-size: 1.4rem; color: #ff85a1; margin: 0 0 8px 0; }
        .card-desc { font-size: 0.85rem; color: #888; margin-bottom: 15px; }

        .play-btn {
            display: inline-block;
            background: #72efdd;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(114, 239, 221, 0.4);
        }

        /* FULLSCREEN MODAL & HOVER CLOSE BUTTON */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2000;
        }

        /* The floating/hovering Close Button */
        .close-hover-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            background: rgba(255, 133, 161, 0.8);
            color: white;
            border: 3px solid white;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 2001;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            background: white; 
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            nav a { padding: 6px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<nav id="navbar">
    <a href="#" class="active" onclick="showCategory('Home')">Home</a>
    <a href="#" onclick="showCategory('Literacy')">Literacy</a>
    <a href="#" onclick="showCategory('Numeracy')">Numeracy</a>
    <a href="#" onclick="showCategory('SEL')">SEL</a>
    <a href="#" onclick="showCategory('Daily Living')">Daily</a>
    <a href="#" onclick="showCategory('General')">General</a>
</nav>

<div class="container">
    <header>
        <h1>Game Galaxy</h1>
    </header>
    <div id="main-content"></div>
</div>

<div id="modal">
    <button class="close-hover-btn" onclick="closeGame()">✖</button>
    <!-- Notice the 'allow' section below - this helps assets load -->
    <iframe id="game-frame" src="" allow="autoplay; fullscreen; clipboard-read; clipboard-write; encrypted-media; picture-in-picture"></iframe>
</div>

<script>
    let allGames = [];

    async function init() {
        const response = await fetch('games.json');
        allGames = await response.json();
        showCategory('Home');
    }

    function createCard(game) {
        return `
            <div class="game-card">
                <div class="snapshot" style="background-image: url('https://codepen.io/spedgames/pen/${game.id}/image/large.png')"></div>
                <div class="card-content">
                    <h3 class="card-title">${game.title}</h3>
                    <p class="card-desc">${game.description}</p>
                    <a class="play-btn" onclick="playGame('${game.id}')">PLAY!</a>
                </div>
            </div>
        `;
    }

    function showCategory(cat) {
        document.querySelectorAll('nav a').forEach(a => {
            a.classList.toggle('active', a.innerText === cat || (cat === 'Home' && a.innerText === 'Home'));
        });

        const content = document.getElementById('main-content');
        content.innerHTML = '';

        if (cat === 'Home') {
            const newGames = allGames.filter(g => g.isNew);
            const popularGames = allGames.filter(g => g.isPopular);

            content.innerHTML = `
                <h2 class="section-title">New Stars!</h2>
                <div class="game-grid">${newGames.map(createCard).join('')}</div>
                <h2 class="section-title">Class Favorites</h2>
                <div class="game-grid">${popularGames.map(createCard).join('')}</div>
            `;
        } else {
            const filtered = allGames.filter(g => g.category === cat);
            content.innerHTML = `
                <h2 class="section-title">${cat}</h2>
                <div class="game-grid">${filtered.length ? filtered.map(createCard).join('') : '<p>Coming soon!</p>'}</div>
            `;
        }
        window.scrollTo(0,0);
    }

    function playGame(id) {
        const frame = document.getElementById('game-frame');
        // We use /full/ to ensure it works for free accounts
        frame.src = `https://codepen.io/spedgames/full/${id}`;
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('game-frame').src = '';
        document.body.style.overflow = 'auto';
    }

    init();
</script>
</body>
</html>
