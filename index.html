<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHS Game Library 🎮</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --placeholder-gray: #e2e8f0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            color: var(--text-dark);
            padding-top: 70px;
            -webkit-font-smoothing: antialiased;
        }

        /* NAVIGATION - Swipeable on Mobile */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        nav::-webkit-scrollbar { display: none; }

        nav a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            padding: 8px 16px;
            margin: 0 4px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }
        nav a.active { background: var(--primary); color: white; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }
        
        .controls-row { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px; 
            max-width: 700px; 
            margin: 20px auto; 
        }
        .search-container { flex-grow: 1; }
        #game-search { 
            width: 100%; 
            padding: 12px 20px; 
            border-radius: 12px; 
            border: 2px solid #e2e8f0; 
            font-family: 'Poppins', sans-serif; 
            outline: none;
            box-sizing: border-box;
        }
        .view-switcher { display: flex; background: #e2e8f0; padding: 4px; border-radius: 10px; }
        .view-btn { background: none; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--text-light); }
        .view-btn.active { background: white; color: var(--primary); }

        /* GRID LOGIC */
        .game-grid { display: grid; gap: 24px; margin-top: 20px; }
        .view-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .view-compact { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }

        .game-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #f1f5f9; 
            transition: transform 0.2s;
        }
        .game-card:hover { transform: translateY(-3px); }

        .snapshot { width: 100%; height: 180px; background-size: cover; background-position: center; cursor: pointer; }
        .card-content { padding: 16px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .creator-info { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .creator-avatar { width: 24px; height: 24px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; }
        .creator-name { font-size: 0.75rem; color: var(--text-light); font-weight: 500; }

        .card-title { font-size: 1.1rem; font-weight: 700; margin: 0 0 8px 0; }
        .card-desc { font-size: 0.85rem; color: var(--text-light); margin-bottom: 16px; flex-grow: 1; line-height: 1.5; }

        .play-btn { 
            background: var(--primary); 
            color: white; 
            padding: 10px; 
            border-radius: 10px; 
            font-weight: 600; 
            border: none; 
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        /* MODAL & DETAIL VIEW */
        #detail-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); z-index: 3000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .detail-container { max-width: 850px; margin: 20px auto; background: white; border-radius: 24px; overflow: hidden; position: relative; }
        .close-detail-x { position: absolute; top: 15px; right: 15px; background: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        
        .detail-hero { width: 100%; height: 300px; background-size: cover; background-position: center; }
        .detail-body { padding: 30px; display: grid; grid-template-columns: 1fr 200px; gap: 30px; }
        
        /* RESTORED COMPATIBILITY UI */
        .compat-section { margin-bottom: 20px; }
        .compat-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-light); letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
        .compat-badge { display: inline-block; padding: 4px 12px; background: #eff6ff; border: 1px solid #dbeafe; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: var(--primary); margin-right: 6px; margin-bottom: 6px; }

        .qr-area { text-align: center; border-left: 1px solid #f1f5f9; padding-left: 30px; }
        .qr-code { width: 150px; height: 150px; border-radius: 10px; margin-bottom: 10px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 4000; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: #1e293b; color: white; border-radius: 50%; width: 44px; height: 44px; border: none; cursor: pointer; z-index: 4001; }
        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 650px) {
            nav { justify-content: flex-start; padding-left: 10px; }
            .detail-body { grid-template-columns: 1fr; }
            .qr-area { border-left: none; padding-left: 0; border-top: 1px solid #f1f5f9; padding-top: 20px; }
            .view-compact .game-card { flex-direction: row; height: 130px; }
            .view-compact .snapshot { width: 120px; height: 100%; }
            .view-compact .card-content { padding: 12px; justify-content: center; }
            .view-compact .card-desc, .view-compact .creator-info { display: none; }
            .view-compact .card-title { font-size: 0.95rem; margin-bottom: 6px; }
        }
    </style>
</head>
<body>

<nav id="navbar">
    <a href="#" class="active" onclick="showCategory('Home')">Home</a>
    <a href="#" onclick="showCategory('Literacy')">Literacy</a>
    <a href="#" onclick="showCategory('Numeracy')">Numeracy</a>
    <a href="#" onclick="showCategory('SEL')">SEL</a>
    <a href="#" onclick="showCategory('Daily Living')">Daily Living</a>
    <a href="#" onclick="showCategory('General')">General</a>
</nav>

<div class="container">
    <div class="controls-row">
        <div class="search-container">
            <input type="text" id="game-search" placeholder="Search for a game..." onkeyup="handleSearch()">
        </div>
        <div class="view-switcher">
            <button class="view-btn active" id="btn-grid" onclick="updateView('grid')">Grid</button>
            <button class="view-btn" id="btn-compact" onclick="updateView('compact')">Compact</button>
        </div>
    </div>
    <div id="main-content"></div>
</div>

<!-- Info Modal with Restored Compatibility UI -->
<div id="detail-view" onclick="handleBackdropClick(event)">
    <div class="detail-container">
        <button class="close-detail-x" onclick="closeDetails()">✕</button>
        <div id="detail-img" class="detail-hero"></div>
        <div class="detail-body">
            <div>
                <h2 id="detail-title" style="margin-top:0; margin-bottom:10px;"></h2>
                <div id="detail-creator-row" class="creator-info" style="margin-bottom:20px;"></div>
                
                <div class="compat-section">
                    <span class="compat-label">Device Compatibility</span>
                    <div id="detail-compat"></div>
                </div>

                <p id="detail-desc" style="line-height:1.6; color:var(--text-light); margin-bottom: 25px;"></p>
                <button id="detail-play-btn" class="play-btn" style="width: 100%; padding: 15px; font-size:1rem;">Play Game</button>
            </div>
            <div class="qr-area">
                <p style="font-size: 0.8rem; font-weight: 600; margin-bottom: 10px;">Open on Tablet</p>
                <img id="detail-qr" src="" class="qr-code">
                <p id="detail-id-label" style="font-size: 0.7rem; color: var(--text-light);"></p>
            </div>
        </div>
    </div>
</div>

<div id="modal">
    <button class="close-btn" onclick="closeGame()">✕</button>
    <iframe id="game-frame" src=""></iframe>
</div>

<script>
    let allGames = [];
    let currentCategory = 'Home';
    let currentView = 'grid';

    const avatarSvg = `<div class="creator-avatar"><svg width="12" height="12" viewBox="0 0 24 24" fill="#94a3b8"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>`;

    function getDeviceType() {
        const ua = navigator.userAgent;
        if (/Mobile|iP(hone|od)|Android.*Mobi/.test(ua)) return "mobile";
        if (/Macintosh/i.test(ua) && navigator.maxTouchPoints > 1 || /Tablet|iPad/i.test(ua)) return "tablet";
        return "desktop";
    }

    async function init() {
        const response = await fetch('games.json?v=' + Date.now());
        allGames = await response.json();
        renderContent();
    }

    function updateView(v) {
        currentView = v;
        document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${v}`));
        renderContent();
    }

    function createCard(game) {
        return `
            <div class="game-card">
                <div class="snapshot" onclick="openDetails('${game.id}')" style="background-image: url('https://codepen.io/spedgames/pen/${game.id}/image/large.png')"></div>
                <div class="card-content">
                    <div class="creator-info">${avatarSvg}<span class="creator-name">Created by ${game.creatorName || 'Instructor'}</span></div>
                    <h3 class="card-title">${game.title}</h3>
                    <p class="card-desc">${game.description}</p>
                    <button class="play-btn" onclick="validateAndPlay('${game.id}')">Play Game</button>
                </div>
            </div>
        `;
    }

    function renderContent(filtered = null) {
        const content = document.getElementById('main-content');
        const list = filtered || (currentCategory === 'Home' ? allGames : allGames.filter(g => g.category === currentCategory));
        content.innerHTML = `<div class="game-grid view-${currentView}">${list.map(createCard).join('')}</div>`;
    }

    function validateAndPlay(id) {
        const game = allGames.find(g => g.id === id);
        const device = getDeviceType();
        const isCompatible = game.compatibility ? game.compatibility.includes(device) : true;

        if (!isCompatible) {
            if (confirm(`This game is optimized for ${game.compatibility.join('/')}. Continue anyway?`)) playGame(id);
        } else {
            playGame(id);
        }
    }

    function showCategory(cat) { 
        currentCategory = cat; 
        document.querySelectorAll('nav a').forEach(a => a.classList.toggle('active', a.innerText === cat));
        renderContent();
    }

    function handleSearch() {
        const q = document.getElementById('game-search').value.toLowerCase();
        const results = allGames.filter(g => g.title.toLowerCase().includes(q) || g.description.toLowerCase().includes(q));
        renderContent(results);
    }

    function openDetails(id) {
        const g = allGames.find(game => game.id === id);
        const fullUrl = `https://codepen.io/spedgames/full/${id}`;
        
        document.getElementById('detail-title').innerText = g.title;
        document.getElementById('detail-desc').innerText = g.description;
        document.getElementById('detail-img').style.backgroundImage = `url('https://codepen.io/spedgames/pen/${id}/image/large.png')`;
        document.getElementById('detail-creator-row').innerHTML = `${avatarSvg}<span class="creator-name">Created by <b>${g.creatorName || 'Instructor'}</b></span>`;
        document.getElementById('detail-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(fullUrl)}`;
        document.getElementById('detail-id-label').innerText = `ID: ${id}`;
        
        // Render Restored Badges
        const compDiv = document.getElementById('detail-compat');
        compDiv.innerHTML = g.compatibility ? g.compatibility.map(c => `<span class="compat-badge">${c}</span>`).join('') : '<span class="compat-badge">Universal</span>';

        document.getElementById('detail-play-btn').onclick = () => validateAndPlay(id);
        document.getElementById('detail-view').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeDetails() { document.getElementById('detail-view').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function handleBackdropClick(e) { if (e.target.id === 'detail-view') closeDetails(); }
    
    function playGame(id) { 
        document.getElementById('game-frame').src = `https://codepen.io/spedgames/full/${id}`; 
        document.getElementById('modal').style.display = 'block'; 
        document.body.style.overflow = 'hidden';
    }
    
    function closeGame() { 
        document.getElementById('modal').style.display = 'none'; 
        document.getElementById('game-frame').src = ''; 
        if (document.getElementById('detail-view').style.display !== 'block') document.body.style.overflow = 'auto';
    }

    init();
</script>
</body>
</html>
