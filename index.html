<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AHS Game Library 🎮</title>
    <!-- Professional, Clean Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb; /* Modern Blue */
            --primary-hover: #1d4ed8;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            color: var(--text-dark);
            padding-top: 70px; /* Reduced from 80px */
            -webkit-font-smoothing: antialiased;
        }

        /* MODERN NAVIGATION */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            padding: 12px 0; /* Tightened padding */
            border-bottom: 1px solid #e2e8f0;
        }

        nav a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            padding: 6px 14px;
            margin: 0 4px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        nav a:hover { color: var(--primary); }

        nav a.active {
            background: var(--primary);
            color: white;
        }

        /* CONTAINER & TITLES */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }
        
        .page-header {
            text-align: center;
            padding: 20px 0 10px 0; /* Drastically reduced vertical space */
        }

        .main-title {
            font-size: 2.2rem; /* Slightly refined size */
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .section-header {
            margin-top: 30px; /* Reduced margin */
            padding-bottom: 8px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; /* Tighter gap */
            margin-top: 20px;
        }

        /* PROFESSIONAL GAME CARD */
        .game-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
            border: 1px solid #f1f5f9;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 20px -5px rgba(0, 0, 0, 0.1);
        }

        .snapshot {
            width: 100%;
            height: 170px;
            background-size: cover;
            background-position: center;
            background-color: #cbd5e1;
        }

        .card-content { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .card-title { 
            font-size: 1.2rem; 
            font-weight: 700; 
            color: var(--text-dark); 
            margin: 0 0 6px 0; 
        }
        
        .card-desc { 
            font-size: 0.85rem; 
            color: var(--text-light); 
            line-height: 1.4;
            margin-bottom: 15px; 
            flex-grow: 1;
        }

        .play-btn {
            display: block;
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .play-btn:hover { background: var(--primary-hover); }

        /* FULLSCREEN OVERLAY & FLOATING CLOSE */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2000;
        }

        .close-hover-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(30, 41, 59, 0.7); 
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 2001;
            backdrop-filter: blur(4px);
        }

        .close-hover-btn:hover { background: rgba(30, 41, 59, 1); }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            background: white; 
        }

        @media (max-width: 640px) {
            nav { padding: 8px 0; }
            nav a { padding: 5px 10px; font-size: 0.75rem; margin: 0 2px; }
            .section-title { font-size: 1.15rem; }
            .main-title { font-size: 1.7rem; }
            .page-header { padding: 15px 0 5px 0; }
        }
    </style>
</head>
<body>

<nav id="navbar">
    <a href="#" class="active" onclick="showCategory('Home')">Home</a>
    <a href="#" onclick="showCategory('Literacy')">Literacy</a>
    <a href="#" onclick="showCategory('Numeracy')">Numeracy</a>
    <a href="#" onclick="showCategory('SEL')">SEL</a>
    <a href="#" onclick="showCategory('Daily Living')">Daily Living</a>
    <a href="#" onclick="showCategory('General')">General</a>
</nav>

<div class="container">
    <div class="page-header">
        <h1 class="main-title">AHS Game Library 🎮</h1>
    </div>
    <div id="main-content"></div>
</div>

<div id="modal">
    <button class="close-hover-btn" onclick="closeGame()" title="Close Game">✕</button>
    <iframe id="game-frame" src="" allow="autoplay; fullscreen; clipboard-read; clipboard-write; encrypted-media; picture-in-picture"></iframe>
</div>

<script>
    let allGames = [];

    async function init() {
        try {
            const response = await fetch('games.json');
            allGames = await response.json();
            showCategory('Home');
        } catch (e) {
            console.error("Error loading games.json", e);
        }
    }

    function createCard(game) {
        return `
            <div class="game-card">
                <div class="snapshot" style="background-image: url('https://codepen.io/spedgames/pen/${game.id}/image/large.png')"></div>
                <div class="card-content">
                    <h3 class="card-title">${game.title}</h3>
                    <p class="card-desc">${game.description}</p>
                    <a class="play-btn" onclick="playGame('${game.id}')">Launch Game</a>
                </div>
            </div>
        `;
    }

    function showCategory(cat) {
        document.querySelectorAll('nav a').forEach(a => {
            const isHome = (cat === 'Home' && a.innerText === 'Home');
            const isCat = (a.innerText === cat);
            a.classList.toggle('active', isHome || isCat);
        });

        const content = document.getElementById('main-content');
        content.innerHTML = '';

        if (cat === 'Home') {
            const newGames = allGames.filter(g => g.isNew);
            const popularGames = allGames.filter(g => g.isPopular);

            content.innerHTML = `
                <div class="section-header"><h2 class="section-title">New Releases</h2></div>
                <div class="game-grid">${newGames.map(createCard).join('')}</div>
                <div class="section-header" style="margin-top: 40px;"><h2 class="section-title">Most Popular</h2></div>
                <div class="game-grid">${popularGames.map(createCard).join('')}</div>
            `;
        } else {
            const filtered = allGames.filter(g => g.category === cat);
            content.innerHTML = `
                <div class="section-header"><h2 class="section-title">${cat}</h2></div>
                <div class="game-grid">${filtered.length ? filtered.map(createCard).join('') : '<p style="color:#94a3b8; padding-top:20px;">Coming soon to this category.</p>'}</div>
            `;
        }
        window.scrollTo(0,0);
    }

    function playGame(id) {
        const frame = document.getElementById('game-frame');
        frame.src = `https://codepen.io/spedgames/full/${id}`;
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('game-frame').src = '';
        document.body.style.overflow = 'auto';
    }

    init();
</script>
</body>
</html>
