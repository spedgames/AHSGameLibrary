<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  :root { --tile-size: 38px; }

  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #2ecc71;
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    touch-action: none;
  }

  /* ── Rotate-to-landscape overlay (portrait phones only) ── */
  #rotate-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #1a1a2e;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    padding: 24px;
  }
  #rotate-screen .rotate-icon {
    font-size: 72px;
    animation: spin90 1.5s ease-in-out infinite alternate;
    display: block;
    margin-bottom: 20px;
  }
  #rotate-screen h2 { margin: 0 0 10px; font-size: 1.4em; }
  #rotate-screen p  { margin: 0; color: #aaa; font-size: 0.95em; }
  @keyframes spin90 {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-90deg); }
  }

  /* ── Side-by-side main layout ── */
  #main-layout {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 24px;
    width: 100vw;
    height: 100vh;
    padding: 12px;
  }

  /* ── Game board ── */
  #game-container { position: relative; flex-shrink: 0; }

  #game-board {
    display: grid;
    grid-template-columns: repeat(15, var(--tile-size));
    grid-template-rows: repeat(12, var(--tile-size));
    background: #34495e;
    border: 4px solid #2c3e50;
    position: relative;
    width:  calc(15 * var(--tile-size));
    height: calc(12 * var(--tile-size));
  }

  .tile { width: var(--tile-size); height: var(--tile-size); display: flex; align-items: center; justify-content: center; position: relative; }
  .pavement { background-color: #bdc3c7; border: 0.5px solid rgba(0,0,0,0.1); }
  .road-h   { background-color: #34495e; border-top: 1px dashed rgba(255,255,255,0.1); }
  .road-v   { background-color: #34495e; border-left: 1px dashed rgba(255,255,255,0.1); }
  .zebra-v  { background: repeating-linear-gradient(0deg,   #34495e, #34495e 4px, #fff 4px, #fff 8px); }
  .zebra-h  { background: repeating-linear-gradient(90deg,  #34495e, #34495e 4px, #fff 4px, #fff 8px); }
  .building { background-color: #ecf0f1; z-index: 2; font-size: 22px; }

  .target-goal {
    background-color: #f1c40f !important;
    box-shadow: 0 0 35px 5px #f1c40f !important;
    animation: pulse 1.2s infinite;
    z-index: 4 !important;
    border: 2px solid #fff !important;
  }

  #target-arrow {
    position: absolute;
    font-size: 36px;
    z-index: 20;
    pointer-events: none;
    animation: bounce 1s infinite;
    transform: translateX(-50%);
  }

  @keyframes pulse  { 0% { transform: scale(1); }   50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  @keyframes bounce { 0%, 100% { margin-top: -60px; } 50% { margin-top: -88px; } }

  #player {
    display: flex; align-items: center; justify-content: center;
    width: var(--tile-size); height: var(--tile-size);
    position: absolute; z-index: 10; font-size: 26px;
    transition: left 0.1s ease-out, top 0.1s ease-out;
  }

  .car {
    position: absolute; z-index: 5; width: 30px; height: 20px; border-radius: 4px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2px;
  }
  .car-window { width: 12px; height: 14px; background: rgba(255,255,255,0.5); border-radius: 2px; }
  .car-light  { width: 4px;  height: 6px;  background: #f1c40f; border-radius: 1px; }

  /* ── Overlays ── */
  .screen-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: white; text-align: center; padding: 20px;
  }
  .btn-main {
    padding: 14px 38px; font-size: 1.1em; cursor: pointer; border-radius: 50px;
    border: none; background: #3498db; color: white; margin-top: 20px; font-weight: bold;
  }

  /* ── D-pad (right side panel) ── */
  #dpad-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .controls {
    display: grid;
    grid-template-areas: ". up ." "left down right";
    gap: 12px;
    padding: 18px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .btn-control {
    width: 72px;
    height: 72px;
    background: rgba(255,255,255,0.3);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 32px;
    border: 1px solid rgba(255,255,255,0.4);
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-control:active { background: rgba(255,255,255,0.55); transform: scale(0.94); }

  /* ── Responsive: scale tile size so board fits in landscape ── */
  /* Tablet landscape & small desktop */
  @media (min-width: 700px) and (orientation: landscape) {
    :root { --tile-size: clamp(30px, 4.5vw, 50px); }
  }
  /* Large desktop */
  @media (min-width: 1100px) {
    :root { --tile-size: 50px; }
  }
</style>
</head>
<body>

<!-- Portrait phone guard -->
<div id="rotate-screen">
  <span class="rotate-icon">📱</span>
  <h2>Rotate your device</h2>
  <p>Please switch to landscape mode to play City Crossings.</p>
</div>

<!-- Start screen -->
<div id="start-screen" class="screen-overlay">
  <div style="max-width: 400px;">
    <h2>City Crossings 🧍</h2>
    <p>Use the zebra crossings to navigate safely to the target building.</p>
    <p>Avoid getting hit by the cars!</p>
    <button class="btn-main" onclick="initGame()">START GAME</button>
  </div>
</div>

<!-- End screen -->
<div id="end-screen" class="screen-overlay" style="display:none;">
  <div>
    <h1 id="end-message" style="font-size:2.5em;">🎉 You made it safely!</h1>
    <button id="restart-btn" class="btn-main" style="background:#3498db;" onclick="goToStart()">PLAY AGAIN</button>
  </div>
</div>

<!-- Main layout: board left, dpad right -->
<div id="main-layout">
  <div id="game-container">
    <div id="game-board"></div>
  </div>

  <div id="dpad-panel">
    <div class="controls">
      <div class="btn-control" style="grid-area:up"    id="up">↑</div>
      <div class="btn-control" style="grid-area:left"  id="left">←</div>
      <div class="btn-control" style="grid-area:down"  id="down">↓</div>
      <div class="btn-control" style="grid-area:right" id="right">→</div>
    </div>
  </div>
</div>

<script>
const map = [
  [3,3,1,4,1,3,3,1,4,1,3,3,1,4,1],
  [3,3,1,5,1,3,3,1,5,1,3,3,1,5,1],
  [1,1,1,4,1,1,1,1,4,1,1,1,1,4,1],
  [0,2,0,0,0,0,2,0,0,0,0,2,0,0,0],
  [1,1,1,4,1,1,1,1,4,1,1,1,1,4,1],
  [3,3,1,5,1,3,3,1,5,1,3,3,1,5,1],
  [3,3,1,4,1,3,3,1,4,1,3,3,1,4,1],
  [1,1,1,4,1,1,1,1,4,1,1,1,1,4,1],
  [0,2,0,0,0,0,2,0,0,0,0,2,0,0,0],
  [1,1,1,4,1,1,1,1,4,1,1,1,1,4,1],
  [3,3,1,5,1,3,3,1,5,1,3,3,1,5,1],
  [3,3,1,4,1,3,3,1,4,1,3,3,1,4,1]
];

const buildings = ["🏥","🍕","👮","🏫","🏢","🏠"];
let playerPos  = { x:2, y:2 };
let targetPos  = null;
let gameActive = false;
let animationId   = null;
let arrowTimeout  = null;

let cars = [
  { type:'h', lane:3,  pos:0,   speed:2,    color:'#e67e22' },
  { type:'h', lane:8,  pos:400, speed:-1.5, color:'#9b59b6' },
  { type:'v', lane:3,  pos:0,   speed:2.5,  color:'#3498db' },
  { type:'v', lane:8,  pos:300, speed:1.8,  color:'#f1c40f' },
  { type:'v', lane:13, pos:100, speed:-2,   color:'#ecf0f1' }
];

/* ── Portrait guard ── */
function checkOrientation() {
  const rotateScreen = document.getElementById('rotate-screen');
  const isPortrait   = window.matchMedia('(orientation: portrait)').matches;
  const isNarrow     = window.innerWidth < 600;        // phones; tablets are wide even in portrait
  rotateScreen.style.display = (isPortrait && isNarrow) ? 'flex' : 'none';
}
window.addEventListener('resize',          checkOrientation);
window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 200));
checkOrientation();

/* ── Game logic ── */
function initGame() {
  if (arrowTimeout) clearTimeout(arrowTimeout);
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('end-screen').style.display   = 'none';

  let reachableBuildings = [];
  map.forEach((row, y) => {
    row.forEach((tile, x) => {
      if (tile === 3) {
        const neighbors = [[y-1,x],[y+1,x],[y,x-1],[y,x+1]];
        const hasPath = neighbors.some(([ny,nx]) => {
          if (ny >= 0 && ny < 12 && nx >= 0 && nx < 15) {
            const t = map[ny][nx];
            return t === 1 || t === 2 || t === 5;
          }
          return false;
        });
        if (hasPath && (x !== 2 || y !== 2)) reachableBuildings.push({x, y});
      }
    });
  });
  targetPos  = reachableBuildings[Math.floor(Math.random() * reachableBuildings.length)];
  playerPos  = { x:2, y:2 };

  drawBoard();
  createArrow();

  gameActive = true;
  if (!animationId) updateCars();
}

function goToStart() {
  gameActive = false;
  document.getElementById('end-screen').style.display   = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}

function gameOver() {
  gameActive = false;
  const endMsg  = document.getElementById('end-message');
  const restBtn = document.getElementById('restart-btn');
  endMsg.innerText        = "💥 Game Over! You got hit!";
  restBtn.innerText       = "TRY AGAIN";
  restBtn.style.background = "#e74c3c";
  document.getElementById('end-screen').style.display = 'flex';
}

function showWin() {
  gameActive = false;
  const endMsg  = document.getElementById('end-message');
  const restBtn = document.getElementById('restart-btn');
  endMsg.innerText        = "🎉 You made it safely!";
  restBtn.innerText       = "PLAY AGAIN";
  restBtn.style.background = "#3498db";
  document.getElementById('end-screen').style.display = 'flex';
}

function createArrow() {
  const existing = document.getElementById('target-arrow');
  if (existing) existing.remove();
  const board = document.getElementById('game-board');
  const arrow = document.createElement('div');
  arrow.id         = 'target-arrow';
  arrow.innerText  = '⬇️';
  arrow.style.left = ((targetPos.x / 15) * 100 + (1/15/2)*100) + '%';
  arrow.style.top  = (targetPos.y / 12 * 100) + '%';
  board.appendChild(arrow);
  arrowTimeout = setTimeout(() => { if (arrow) arrow.remove(); }, 5000);
}

function drawBoard() {
  const board = document.getElementById('game-board');
  board.innerHTML = '';
  map.forEach((row, y) => {
    row.forEach((tileType, x) => {
      const tile = document.createElement('div');
      tile.classList.add('tile');
      if (tileType === 0) tile.classList.add('road-h');
      if (tileType === 1) tile.classList.add('pavement');
      if (tileType === 2) tile.classList.add('zebra-v');
      if (tileType === 4) tile.classList.add('road-v');
      if (tileType === 5) tile.classList.add('zebra-h');
      if (tileType === 3) {
        tile.classList.add('building');
        tile.innerText = buildings[(x + y) % buildings.length];
        if (targetPos && x === targetPos.x && y === targetPos.y)
          tile.classList.add('target-goal');
      }
      board.appendChild(tile);
    });
  });
  const p = document.createElement('div');
  p.id = 'player';
  p.innerText = '🧍';
  board.appendChild(p);
  updatePlayerUI();
}

function updatePlayerUI() {
  const p = document.getElementById('player');
  if (!p) return;
  p.style.left = `calc(${playerPos.x} * var(--tile-size))`;
  p.style.top  = `calc(${playerPos.y} * var(--tile-size))`;
}

function move(dx, dy) {
  if (!gameActive) return;
  const nX = playerPos.x + dx;
  const nY = playerPos.y + dy;
  if (targetPos && nX === targetPos.x && nY === targetPos.y) { showWin(); return; }
  if (nY >= 0 && nY < 12 && nX >= 0 && nX < 15) {
    const t = map[nY][nX];
    if (t === 1 || t === 2 || t === 5) {
      playerPos.x = nX;
      playerPos.y = nY;
      updatePlayerUI();
    }
  }
}

function updateCars() {
  if (!gameActive) { animationId = requestAnimationFrame(updateCars); return; }
  const board = document.getElementById('game-board');
  const bW    = board.clientWidth;
  const bH    = board.clientHeight;

  document.querySelectorAll('.car').forEach(c => c.remove());

  cars.forEach(car => {
    car.pos += car.speed;
    const limit = car.type === 'h' ? bW : bH;
    if (car.pos >  limit) car.pos = -30;
    if (car.pos < -30)   car.pos =  limit;

    const tilePx = bW / 15;
    let cX = Math.floor((car.pos + 15) / tilePx);
    let cY = car.lane;
    if (car.type === 'v') { cX = car.lane; cY = Math.floor((car.pos + 15) / tilePx); }
    if (cX === playerPos.x && cY === playerPos.y) { gameOver(); return; }

    const carEl = document.createElement('div');
    carEl.className = 'car';
    carEl.style.backgroundColor = car.color;
    const win   = document.createElement('div'); win.className   = 'car-window';
    const light = document.createElement('div'); light.className = 'car-light';
    if (car.speed > 0) { carEl.append(win, light); } else { carEl.append(light, win); }

    if (car.type === 'h') {
      carEl.style.left = car.pos + 'px';
      carEl.style.top  = `calc(${car.lane} * var(--tile-size) + (var(--tile-size) - 20px) / 2)`;
    } else {
      carEl.style.width        = '20px';
      carEl.style.height       = '30px';
      carEl.style.flexDirection = 'column';
      carEl.style.left = `calc(${car.lane} * var(--tile-size) + (var(--tile-size) - 20px) / 2)`;
      carEl.style.top  = car.pos + 'px';
      win.style.width  = '14px';
      win.style.height = '12px';
    }
    board.appendChild(carEl);
  });

  animationId = requestAnimationFrame(updateCars);
}

/* ── Controls ── */
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp')    move(0, -1);
  if (e.key === 'ArrowDown')  move(0,  1);
  if (e.key === 'ArrowLeft')  move(-1, 0);
  if (e.key === 'ArrowRight') move(1,  0);
});

['up','down','left','right'].forEach(id => {
  document.getElementById(id).addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (id === 'up')    move(0, -1);
    if (id === 'down')  move(0,  1);
    if (id === 'left')  move(-1, 0);
    if (id === 'right') move(1,  0);
  });
});
</script>
</body>
</html>
