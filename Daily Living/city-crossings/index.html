<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2ecc71;
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    touch-action: none;
  }

  #rotate-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #1a1a2e;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-align: center;
    padding: 24px;
  }
  #rotate-screen .rotate-icon { font-size: 72px; display: block; margin-bottom: 20px; animation: spin90 1.5s ease-in-out infinite alternate; }
  #rotate-screen h2 { margin: 0 0 10px; font-size: 1.4em; }
  #rotate-screen p  { margin: 0; color: #aaa; font-size: 0.95em; }
  @keyframes spin90 { from { transform: rotate(0deg); } to { transform: rotate(-90deg); } }

  #main-layout {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 20px;
    width: 100vw;
    height: 100vh;
    padding: 12px;
  }

  #game-container { position: relative; flex-shrink: 0; line-height: 0; }

  #game-board {
    display: grid;
    grid-template-columns: repeat(15, var(--tile-size, 32px));
    grid-template-rows:    repeat(12, var(--tile-size, 32px));
    background: #34495e;
    border: 4px solid #2c3e50;
    position: relative;
    overflow: hidden;
  }

  .tile     { width: var(--tile-size, 32px); height: var(--tile-size, 32px); display: flex; align-items: center; justify-content: center; position: relative; }
  .pavement { background-color: #bdc3c7; border: 0.5px solid rgba(0,0,0,0.1); }
  .road-h   { background-color: #34495e; border-top:  1px dashed rgba(255,255,255,0.1); }
  .road-v   { background-color: #34495e; border-left: 1px dashed rgba(255,255,255,0.1); }
  .zebra-v  { background: repeating-linear-gradient(0deg,  #34495e, #34495e 4px, #fff 4px, #fff 8px); }
  .zebra-h  { background: repeating-linear-gradient(90deg, #34495e, #34495e 4px, #fff 4px, #fff 8px); }
  .building { background-color: #ecf0f1; z-index: 2; font-size: 1.4em; }

  .target-goal {
    background-color: #f1c40f !important;
    box-shadow: 0 0 35px 5px #f1c40f !important;
    animation: pulse 1.2s infinite;
    z-index: 4 !important;
    border: 2px solid #fff !important;
  }

  #target-arrow {
    position: absolute; font-size: 32px; z-index: 20;
    pointer-events: none; animation: bounce 1s infinite; transform: translateX(-50%);
  }

  @keyframes pulse  { 0%,100% { transform: scale(1); }  50% { transform: scale(1.1); } }
  @keyframes bounce { 0%,100% { margin-top: -55px; }    50% { margin-top: -80px; } }

  #player {
    display: flex; align-items: center; justify-content: center;
    width: var(--tile-size, 32px); height: var(--tile-size, 32px);
    position: absolute; z-index: 10; font-size: 1.3em;
    transition: left 0.1s ease-out, top 0.1s ease-out;
  }

  .car { position: absolute; z-index: 5; width: 30px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
  .car-window { width: 12px; height: 14px; background: rgba(255,255,255,0.5); border-radius: 2px; }
  .car-light  { width: 4px;  height: 6px;  background: #f1c40f; border-radius: 1px; }

  .screen-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: white; text-align: center; padding: 20px;
  }
  .btn-main {
    padding: 14px 38px; font-size: 1.1em; cursor: pointer; border-radius: 50px;
    border: none; background: #3498db; color: white; margin-top: 20px; font-weight: bold;
  }

  #dpad-panel { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .controls {
    display: grid;
    grid-template-areas: ". up ." "left down right";
    gap: 10px; padding: 14px;
    background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
    border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-control {
    width: 64px; height: 64px;
    background: rgba(255,255,255,0.3); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 28px; border: 1px solid rgba(255,255,255,0.4);
    cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .btn-control:active { background: rgba(255,255,255,0.55); transform: scale(0.94); }
</style>
</head>
<body>

<div id="rotate-screen">
  <span class="rotate-icon">📱</span>
  <h2>Rotate your device</h2>
  <p>Please switch to landscape mode to play City Crossings.</p>
</div>

<div id="start-screen" class="screen-overlay">
  <div style="max-width:400px;">
    <h2>City Crossings 🧍</h2>
    <p>Use the zebra crossings to navigate safely to the target building.</p>
    <p>Avoid getting hit by the cars!</p>
    <button class="btn-main" onclick="initGame()">START GAME</button>
  </div>
</div>

<div id="end-screen" class="screen-overlay" style="display:none;">
  <div>
    <h1 id="end-message" style="font-size:2.5em;">You made it!</h1>
    <button id="restart-btn" class="btn-main" style="background:#3498db;" onclick="goToStart()">PLAY AGAIN</button>
  </div>
</div>

<div id="main-layout">
  <div id="game-container">
    <div id="game-board"></div>
  </div>
  <div id="dpad-panel">
    <div class="controls">
      <div class="btn-control" style="grid-area:up"    id="up">↑</div>
      <div class="btn-control" style="grid-area:left"  id="left">←</div>
      <div class="btn-control" style="grid-area:down"  id="down">↓</div>
      <div class="btn-control" style="grid-area:right" id="right">→</div>
    </div>
  </div>
</div>

<script>
window.addEventListener('focus', () => {
    window.dispatchEvent(new Event('resize'));
});
const COLS = 15, ROWS = 12;
const BOARD_BORDER = 8;   // 4px * 2 sides
const LAYOUT_PAD   = 24;  // 12px * 2 sides
const LAYOUT_GAP   = 20;
// D-pad width: 3 button cols (64px each) + 2 gaps (10px each) + 2 padding sides (14px each)
const DPAD_W       = 64 * 3 + 10 * 2 + 14 * 2;
const MIN_TILE     = 18;
const MAX_TILE     = 52;

const map = [
  [3,3,1,4,1,3,3,1,4,1,3,3,1,4,1],
  [3,3,1,5,1,3,3,1,5,1,3,3,1,5,1],
  [1,1,1,4,1,1,1,1,4,1,1,1,1,4,1],
  [0,2,0,0,0,0,2,0,0,0,0,2,0,0,0],
  [1,1,1,4,1,1,1,1,4,1,1,1,1,4,1],
  [3,3,1,5,1,3,3,1,5,1,3,3,1,5,1],
  [3,3,1,4,1,3,3,1,4,1,3,3,1,4,1],
  [1,1,1,4,1,1,1,1,4,1,1,1,1,4,1],
  [0,2,0,0,0,0,2,0,0,0,0,2,0,0,0],
  [1,1,1,4,1,1,1,1,4,1,1,1,1,4,1],
  [3,3,1,5,1,3,3,1,5,1,3,3,1,5,1],
  [3,3,1,4,1,3,3,1,4,1,3,3,1,4,1]
];

const buildings = ["🏥","🍕","👮","🏫","🏢","🏠"];
let playerPos = { x:2, y:2 };
let targetPos = null;
let gameActive = false;
let animationId = null;
let arrowTimeout = null;
let tileSize = 32;

let cars = [
  { type:'h', lane:3,  pos:0,   speed:2,    color:'#e67e22' },
  { type:'h', lane:8,  pos:400, speed:-1.5, color:'#9b59b6' },
  { type:'v', lane:3,  pos:0,   speed:2.5,  color:'#3498db' },
  { type:'v', lane:8,  pos:300, speed:1.8,  color:'#f1c40f' },
  { type:'v', lane:13, pos:100, speed:-2,   color:'#ecf0f1' }
];

function computeTileSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const boardMaxW = vw - LAYOUT_PAD - LAYOUT_GAP - DPAD_W - BOARD_BORDER;
  const boardMaxH = vh - LAYOUT_PAD - BOARD_BORDER;
  const byW = Math.floor(boardMaxW / COLS);
  const byH = Math.floor(boardMaxH / ROWS);
  return Math.min(Math.max(Math.min(byW, byH), MIN_TILE), MAX_TILE);
}

function applyTileSize() {
  tileSize = computeTileSize();
  document.getElementById('game-board').style.setProperty('--tile-size', tileSize + 'px');
}

function checkOrientation() {
  const isPortrait = window.matchMedia('(orientation: portrait)').matches;
  const isNarrow   = window.innerWidth < 600;
  document.getElementById('rotate-screen').style.display = (isPortrait && isNarrow) ? 'flex' : 'none';
}

function onResize() {
  checkOrientation();
  applyTileSize();
  if (gameActive) { drawBoard(); updatePlayerUI(); }
}

window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 200));
applyTileSize();
checkOrientation();

function initGame() {
  if (arrowTimeout) clearTimeout(arrowTimeout);
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('end-screen').style.display   = 'none';

  let reach = [];
  map.forEach((row, y) => {
    row.forEach((tile, x) => {
      if (tile === 3) {
        const ok = [[y-1,x],[y+1,x],[y,x-1],[y,x+1]].some(([ny,nx]) => {
          if (ny>=0 && ny<ROWS && nx>=0 && nx<COLS) { const t=map[ny][nx]; return t===1||t===2||t===5; }
        });
        if (ok && (x!==2||y!==2)) reach.push({x,y});
      }
    });
  });
  targetPos = reach[Math.floor(Math.random()*reach.length)];
  playerPos = { x:2, y:2 };
  applyTileSize();
  drawBoard();
  createArrow();
  gameActive = true;
  if (!animationId) updateCars();
}

function goToStart() {
  gameActive = false;
  document.getElementById('end-screen').style.display   = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}

function gameOver() {
  gameActive = false;
  document.getElementById('end-message').innerText        = "💥 Game Over! You got hit!";
  document.getElementById('restart-btn').innerText        = "TRY AGAIN";
  document.getElementById('restart-btn').style.background = "#e74c3c";
  document.getElementById('end-screen').style.display    = 'flex';
}

function showWin() {
  gameActive = false;
  document.getElementById('end-message').innerText        = "🎉 You made it safely!";
  document.getElementById('restart-btn').innerText        = "PLAY AGAIN";
  document.getElementById('restart-btn').style.background = "#3498db";
  document.getElementById('end-screen').style.display    = 'flex';
}

function createArrow() {
  const existing = document.getElementById('target-arrow');
  if (existing) existing.remove();
  const board = document.getElementById('game-board');
  const arrow = document.createElement('div');
  arrow.id        = 'target-arrow';
  arrow.innerText = '⬇️';
  arrow.style.left = ((targetPos.x / COLS) * 100 + (1/COLS/2)*100) + '%';
  arrow.style.top  = (targetPos.y / ROWS * 100) + '%';
  board.appendChild(arrow);
  arrowTimeout = setTimeout(() => { if (arrow.parentNode) arrow.remove(); }, 5000);
}

function drawBoard() {
  const board = document.getElementById('game-board');
  board.innerHTML = '';
  board.style.setProperty('--tile-size', tileSize + 'px');
  map.forEach((row, y) => {
    row.forEach((tileType, x) => {
      const tile = document.createElement('div');
      tile.classList.add('tile');
      if (tileType===0) tile.classList.add('road-h');
      if (tileType===1) tile.classList.add('pavement');
      if (tileType===2) tile.classList.add('zebra-v');
      if (tileType===4) tile.classList.add('road-v');
      if (tileType===5) tile.classList.add('zebra-h');
      if (tileType===3) {
        tile.classList.add('building');
        tile.innerText = buildings[(x+y)%buildings.length];
        if (targetPos && x===targetPos.x && y===targetPos.y) tile.classList.add('target-goal');
      }
      board.appendChild(tile);
    });
  });
  const p = document.createElement('div');
  p.id = 'player'; p.innerText = '🧍';
  board.appendChild(p);
  updatePlayerUI();
  if (targetPos) createArrow();
}

function updatePlayerUI() {
  const p = document.getElementById('player');
  if (!p) return;
  p.style.left = (playerPos.x * tileSize) + 'px';
  p.style.top  = (playerPos.y * tileSize) + 'px';
}

function move(dx, dy) {
  if (!gameActive) return;
  const nX = playerPos.x+dx, nY = playerPos.y+dy;
  if (targetPos && nX===targetPos.x && nY===targetPos.y) { showWin(); return; }
  if (nY>=0 && nY<ROWS && nX>=0 && nX<COLS) {
    const t = map[nY][nX];
    if (t===1||t===2||t===5) { playerPos.x=nX; playerPos.y=nY; updatePlayerUI(); }
  }
}

function updateCars() {
  if (!gameActive) { animationId = requestAnimationFrame(updateCars); return; }
  const board = document.getElementById('game-board');
  const bW = board.clientWidth, bH = board.clientHeight;
  document.querySelectorAll('.car').forEach(c => c.remove());
  cars.forEach(car => {
    car.pos += car.speed;
    const limit = car.type==='h' ? bW : bH;
    if (car.pos > limit) car.pos = -30;
    if (car.pos < -30)   car.pos =  limit;
    let cX = Math.floor((car.pos+15)/tileSize), cY = car.lane;
    if (car.type==='v') { cX=car.lane; cY=Math.floor((car.pos+15)/tileSize); }
    if (cX===playerPos.x && cY===playerPos.y) { gameOver(); return; }
    const carEl = document.createElement('div');
    carEl.className = 'car';
    carEl.style.backgroundColor = car.color;
    const win = document.createElement('div'); win.className = 'car-window';
    const lgt = document.createElement('div'); lgt.className = 'car-light';
    if (car.speed>0) { carEl.append(win,lgt); } else { carEl.append(lgt,win); }
    if (car.type==='h') {
      carEl.style.left = car.pos + 'px';
      carEl.style.top  = (car.lane*tileSize + (tileSize-20)/2) + 'px';
    } else {
      carEl.style.width='20px'; carEl.style.height='30px'; carEl.style.flexDirection='column';
      carEl.style.left = (car.lane*tileSize + (tileSize-20)/2) + 'px';
      carEl.style.top  = car.pos + 'px';
      win.style.width='14px'; win.style.height='12px';
    }
    board.appendChild(carEl);
  });
  animationId = requestAnimationFrame(updateCars);
}

window.addEventListener('keydown', e => {
  if (e.key==='ArrowUp')    move(0,-1);
  if (e.key==='ArrowDown')  move(0, 1);
  if (e.key==='ArrowLeft')  move(-1,0);
  if (e.key==='ArrowRight') move(1, 0);
});
['up','down','left','right'].forEach(id => {
  document.getElementById(id).addEventListener('pointerdown', e => {
    e.preventDefault();
    if (id==='up')    move(0,-1);
    if (id==='down')  move(0, 1);
    if (id==='left')  move(-1,0);
    if (id==='right') move(1, 0);
  });
});
</script>
</body>
</html>
