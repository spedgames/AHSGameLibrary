<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supermarket Run - Sound Update</title>
    <style>
        :root {
            --paper: #fffde7;
            --shelf: #cfd8dc;
            --fridge: #e3f2fd;
            --fridge-border: #bbdefb;
            --success-green: #43a047;
            --ui-blue: #2196f3;
            --highlight: #ffd700;
            --char-skin: #ffdbac;
            --char-shirt: #ff5722;
            --char-pants: #3f51b5;
            --trolley-metal: #9e9e9e;
            --trolley-basket: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #333; overflow: hidden; touch-action: none; }

        #game-container { display: flex; height: 100vh; width: 100vw; background: white; position: relative; }
        @media (max-width: 768px) { #game-container { flex-direction: column; } }

        .overlay-screen {
            position: absolute; inset: 0; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: white; padding: 20px;
        }
        #start-screen { background: var(--ui-blue); }
        #win-screen { background: var(--success-green); display: none; }

        .btn-main {
            background: white; color: #333; border: none; padding: 15px 40px;
            font-size: 1.5rem; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2); margin-top: 15px;
        }

        #world {
            flex: 2; position: relative; background: #fafafa;
            background-image: radial-gradient(#e0e0e0 1.5px, transparent 1.5px);
            background-size: 30px 30px; overflow: hidden;
        }

        #fridge-row {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            display: flex; gap: 5px; padding: 5px; background: #eee;
            border-bottom: 4px solid #ccc; z-index: 10;
        }
        .fridge { flex: 1; background: var(--fridge); border: 2px solid var(--fridge-border); border-radius: 4px; position: relative; }
        .fridge::after { content: ''; position: absolute; top: 15%; right: 10%; width: 4px; height: 15px; background: #9e9e9e; border-radius: 2px; }

        #player {
            position: absolute; width: 60px; height: 50px; z-index: 100;
            pointer-events: none; transform: translate(-50%, -50%);
            display: flex; align-items: flex-end;
            transition: transform 0.1s;
        }
        #player.facing-left { transform: translate(-50%, -50%) scaleX(-1); }

        .character { position: relative; width: 25px; height: 45px; margin-bottom: 5px; }
        .head { position: absolute; top: 0; left: 2px; width: 18px; height: 18px; background: var(--char-skin); border-radius: 50%; }
        .eye { position: absolute; top: 6px; width: 3px; height: 3px; background: #333; border-radius: 50%; animation: blink 4s infinite; }
        .eye.left { left: 4px; } .eye.right { left: 10px; }
        .body { position: absolute; top: 16px; left: 2px; width: 18px; height: 18px; background: var(--char-shirt); border-radius: 4px 4px 0 0; }
        .arm { position: absolute; top: 18px; width: 5px; height: 15px; background: var(--char-skin); border-radius: 3px; transform-origin: top center; }
        .arm.left { left: -3px; transform: rotate(20deg); } .arm.right { right: -3px; transform: rotate(-20deg); }
        .leg { position: absolute; top: 32px; width: 7px; height: 14px; background: var(--char-pants); border-radius: 0 0 3px 3px; transform-origin: top center; }
        .leg.left { left: 2px; } .leg.right { left: 13px; }

        .trolley { position: relative; width: 35px; height: 35px; margin-left: -2px; }
        .trolley-basket {
            position: absolute; top: 0; left: 0; width: 32px; height: 20px;
            background: var(--trolley-basket); border: 2px solid var(--trolley-metal); border-radius: 3px;
            background-image: linear-gradient(90deg, rgba(158,158,158,0.5) 1px, transparent 1px), linear-gradient(rgba(158,158,158,0.5) 1px, transparent 1px);
            background-size: 4px 4px;
        }
        .trolley-handle { position: absolute; top: 2px; left: -6px; width: 10px; height: 3px; background: #333; border-radius: 2px; transform: rotate(-15deg); }
        .trolley-frame { position: absolute; top: 18px; left: 4px; width: 24px; height: 12px; border-left: 2px solid var(--trolley-metal); border-bottom: 2px solid var(--trolley-metal); }
        .wheel { position: absolute; bottom: -2px; width: 6px; height: 6px; background: #333; border-radius: 50%; border: 1px solid var(--trolley-metal); }
        .wheel.left { left: 2px; } .wheel.right { left: 20px; }

        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        #player.walking .leg.left { animation: step 0.5s infinite alternate; }
        #player.walking .leg.right { animation: step 0.5s infinite alternate-reverse; }
        @keyframes step { 0% { transform: rotate(20deg); } 100% { transform: rotate(-20deg); } }

        .shelf { position: absolute; background: var(--shelf); border-bottom: 6px solid #78909c; display: flex; justify-content: space-around; align-items: center; border-radius: 4px; z-index: 50; }
        .world-item { font-size: 2.2rem; transition: 0.3s; user-select: none; }
        .collected { opacity: 0.1; filter: grayscale(1); transform: scale(0.7); }

        #ui { flex: 1; background: #fff; padding: 15px; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index: 200; }
        #shopping-list { background: var(--paper); padding: 10px; box-shadow: 4px 4px 0px #fbc02d; margin-bottom: 15px; border-radius: 4px; }
        .list-item { margin: 8px 0; font-weight: bold; font-size: 1rem; display: flex; align-items: center; }
        .checked { text-decoration: line-through; color: var(--success-green); opacity: 0.5; }

        #pay-trigger { display: none; background: var(--success-green); color: white; border: none; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 12px; margin-bottom: 15px; cursor: pointer; animation: pulse 2s infinite; }
        #controls { display: grid; grid-template-areas: ". up ." "left action right" ". down ."; gap: 8px; justify-content: center; margin-top: auto; }
        .ctrl { width: 60px; height: 60px; background: #eee; border: 2px solid #ddd; border-radius: 15px; font-size: 1.5rem; cursor: pointer; }
        .ctrl-action { grid-area: action; background: #ffd700; font-size: 2rem; display: flex; align-items: center; justify-content: center; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 25px; width: 95%; max-width: 420px; text-align: center; }
        .money-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .m-btn { border: 3px solid transparent; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; border-radius: 8px; padding: 4px; }
        .m-btn.active-selection { border-color: var(--highlight); background: rgba(255, 215, 0, 0.2); }
        .m-btn img { width: 100%; height: auto; border-radius: 4px; }
        .coin-img { border-radius: 50% !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="overlay-screen">
        <div style="font-size: 5rem;">🛒</div>
        <h1>Supermarket Run</h1>
        <p>Grab items in your list<br>Press <b>SPACE</b> or 🛒 to collect!</p>
        <button class="btn-main" onclick="startGame()">START</button>
    </div>

    <div id="win-screen" class="overlay-screen">
        <div style="font-size: 5rem;">🎉</div>
        <h1>Great Job!</h1>
        <button class="btn-main" onclick="restartGame()">PLAY AGAIN</button>
    </div>

    <div id="world">
        <div id="fridge-row">
            <div class="fridge"></div><div class="fridge"></div><div class="fridge"></div>
            <div class="fridge"></div><div class="fridge"></div><div class="fridge"></div>
        </div>

        <div id="player">
            <div class="character">
                <div class="head"><div class="eye left"></div><div class="eye right"></div></div>
                <div class="body"></div><div class="arm left"></div><div class="arm right"></div>
                <div class="leg left"></div><div class="leg right"></div>
            </div>
            <div class="trolley">
                <div class="trolley-handle"></div><div class="trolley-basket"></div>
                <div class="trolley-frame"></div><div class="wheel left"></div><div class="wheel right"></div>
            </div>
        </div>
    </div>

    <div id="ui">
        <div id="shopping-list">
            <h3 style="border-bottom: 2px solid #fbc02d; margin-bottom: 5px;">My List</h3>
            <div id="list-items"></div>
        </div>
        <button id="pay-trigger" onclick="togglePayment(true)">💵 PAY WITH CASH</button>
        <div id="controls">
            <button class="ctrl" style="grid-area: up" id="up-btn">▲</button>
            <button class="ctrl" style="grid-area: left" id="left-btn">◀</button>
            <button class="ctrl" style="grid-area: down" id="down-btn">▼</button>
            <button class="ctrl" style="grid-area: right" id="right-btn">▶</button>
            <button class="ctrl ctrl-action" id="space-btn">🛒</button>
        </div>
    </div>
</div>

<div id="pay-modal" class="modal">
    <div class="modal-content">
        <h3>Cashier</h3>
        <div style="font-size: 1.5rem; margin: 10px 0; background: #f1f8e9; padding: 10px; border-radius: 10px; border: 2px solid #4CAF50;">
            Total: <span id="target-amt">$0.00</span>
        </div>
        <div style="font-size: 1rem; margin-bottom: 10px;">Selection: <span id="inserted-amt" style="font-weight: bold; color: #1976d2;">$0.00</span></div>
        <div class="money-grid" id="money-selection"></div>
        <button onclick="confirmPayment()" style="width:100%; padding: 12px; background: var(--success-green); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">CONFIRM</button>
        <button onclick="togglePayment(false)" style="width:100%; padding: 10px; background: #ccc; color: #333; border: none; border-radius: 10px; margin-top: 5px; cursor: pointer;">GO BACK</button>
        <p id="pay-feedback" style="color: red; margin-top: 8px; font-weight: bold; min-height: 1.2em;"></p>
    </div>
</div>

<script>
    // --- SOUND ENGINE ---
    const SoundManager = {
        ctx: null,
        init() {
            if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (this.ctx.state === 'suspended') this.ctx.resume();
        },
        playCollect() {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.1);
        },
        playSuccess() {
            if (!this.ctx) return;
            const playNote = (freq, time, dur) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, time);
                gain.gain.setValueAtTime(0.2, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + dur);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(time);
                osc.stop(time + dur);
            };
            const now = this.ctx.currentTime;
            playNote(523.25, now, 0.15); // C5
            playNote(659.25, now + 0.1, 0.15); // E5
            playNote(783.99, now + 0.2, 0.3); // G5
        }
    };

    const ITEMS = [
        {e:'🍎', n:'Apple'}, {e:'🥛', n:'Milk'}, {e:'🍞', n:'Bread'}, {e:'🥚', n:'Eggs'},
        {e:'🍌', n:'Banana'}, {e:'🌽', n:'Corn'}, {e:'🍪', n:'Cookie'}, {e:'🍕', n:'Pizza'},
        {e:'🧀', n:'Cheese'}, {e:'🍇', n:'Grapes'}, {e:'🍩', n:'Donut'}, {e:'🧃', n:'Juice'},
        {e:'🍗', n:'Chicken'}, {e:'🍣', n:'Sushi'}, {e:'🍦', n:'IceCream'}, {e:'🍯', n:'Honey'},
        {e:'🍰', n:'Cake'}, {e:'🍉', n:'Melon'}
    ];
    const VALID_TOTALS = [1.05, 1.10, 1.20, 1.50, 2.05, 5.05, 10.05];

    let shoppingList = [], collectedCount = 0, targetTotal = 0;
    let selectedNote = 0, selectedCent = 0, keys = {};
    let player = { x: 100, y: 150, speed: 6 }; 
    let gameActive = false;
    let shelfRects = [];

    function startGame() {
        SoundManager.init(); // Initialize audio context on first click
        document.getElementById('start-screen').style.display = 'none';
        setupInput(); 
        init(); 
        gameActive = true;
        requestAnimationFrame(gameLoop);
    }

    function restartGame() {
        SoundManager.init();
        document.getElementById('win-screen').style.display = 'none';
        document.getElementById('pay-trigger').style.display = 'none';
        collectedCount = 0; player = { x: 100, y: 150, speed: 6 };
        clearSelections(); init(); gameActive = true;
    }

    function setupInput() {
        window.onkeydown = (e) => {
            const k = e.key.toLowerCase().replace('arrow', '');
            if(['up','down','left','right'].includes(k)) keys[k] = true;
            if(['w','a','s','d'].includes(k)) keys[{w:'up',a:'left',s:'down',d:'right'}[k]] = true;
            if(e.code === 'Space') { e.preventDefault(); keys['space'] = true; }
        };
        window.onkeyup = (e) => {
            const k = e.key.toLowerCase().replace('arrow', '');
            delete keys[k];
            if(['w','a','s','d'].includes(k)) delete keys[{w:'up',a:'left',s:'down',d:'right'}[k]];
            if(e.code === 'Space') keys['space'] = false;
        };

        ['up','down','left','right'].forEach(dir => {
            const btn = document.getElementById(dir + '-btn');
            btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); keys[dir] = true; };
            btn.onmouseup = btn.onmouseleave = btn.ontouchend = () => keys[dir] = false;
        });

        const spaceBtn = document.getElementById('space-btn');
        spaceBtn.onmousedown = spaceBtn.ontouchstart = (e) => { e.preventDefault(); keys['space'] = true; };
        spaceBtn.onmouseup = spaceBtn.onmouseleave = spaceBtn.ontouchend = () => keys['space'] = false;
        
        const grid = document.getElementById('money-selection');
        const notes = [
            {v:1, i:'https://www.leftovercurrency.com/app/uploads/2017/04/1-singapore-dollar-coin-third-series-obverse-1.jpg'},
            {v:2, i:'https://www.leftovercurrency.com/app/uploads/2016/11/2-singapore-dollars-banknote-president-encik-yusof-bin-ishak-obverse-1.jpg'},
            {v:5, i:'https://www.leftovercurrency.com/app/uploads/2016/11/5-singapore-dollars-banknote-president-encik-yusof-bin-ishak-obverse-1.jpg'},
            {v:10, i:'https://www.leftovercurrency.com/app/uploads/2016/11/10-singapore-dollars-banknote-president-encik-yusof-bin-ishak-obverse-1.jpg'}
        ];
        const coins = [
            {v:0.05, i:'https://www.leftovercurrency.com/app/uploads/2017/04/5-cents-coin-singapore-third-series-obverse-1.jpg', label:'5¢'},
            {v:0.1, i:'https://www.hobbyofkings.com/cdn/shop/files/Singapore-10-Cents-Coin-KM346-2013-2019-Nickel-plated-steel.jpg', label:'10¢'},
            {v:0.2, i:'https://www.hobbyofkings.com/cdn/shop/files/Singapore-20-Cents-Coin-KM347-2013-2019-Nickel-plated-steel-5_1024x.jpg', label:'20¢'},
            {v:0.5, i:'https://www.hobbyofkings.com/cdn/shop/files/Singapore-50-Cents-Coin-KM348-2013-2019-Nickel-plated-steel.jpg', label:'50¢'}
        ];
        notes.forEach(n => grid.innerHTML += `<button class="m-btn m-note" data-value="${n.v}" onclick="handleSelect(this, 'note')"><img src="${n.i}"><small>$${n.v}</small></button>`);
        coins.forEach(c => grid.innerHTML += `<button class="m-btn m-cent" data-value="${c.v}" onclick="handleSelect(this, 'cent')"><img src="${c.i}" class="coin-img"><small>${c.label}</small></button>`);
    }

    function init() {
        const world = document.getElementById('world'), listUI = document.getElementById('list-items');
        document.querySelectorAll('.shelf').forEach(s => s.remove());
        listUI.innerHTML = ''; shelfRects = [];
        
        targetTotal = VALID_TOTALS[Math.floor(Math.random() * VALID_TOTALS.length)];
        const shuffledPool = [...ITEMS].sort(() => 0.5 - Math.random());
        shoppingList = shuffledPool.slice(0, 5);
        shoppingList.forEach(item => listUI.innerHTML += `<div class="list-item" id="list-${item.n}"><span>${item.e}</span> ${item.n}</div>`);

        const shelfItems = [...shuffledPool].sort(() => 0.5 - Math.random());
        const shelfConfigs = [
            {t:15,l:10,w:35}, {t:15,l:55,w:35}, 
            {t:40,l:10,w:35}, {t:40,l:55,w:35}, 
            {t:65,l:10,w:35}, {t:65,l:55,w:35}
        ];

        const wRect = world.getBoundingClientRect();
        shelfConfigs.forEach((conf, idx) => {
            const div = document.createElement('div');
            div.className = 'shelf'; 
            div.style.top = conf.t + '%'; div.style.left = conf.l + '%';
            div.style.width = conf.w + '%'; div.style.height = '60px';
            for(let i=0; i<3; i++){
                const itm = shelfItems[(idx * 3 + i) % shelfItems.length];
                div.innerHTML += `<span class="world-item" id="world-${itm.n}">${itm.e}</span>`;
            }
            world.appendChild(div);
            shelfRects.push({ x: (conf.l / 100) * wRect.width, y: (conf.t / 100) * wRect.height, w: (conf.w / 100) * wRect.width, h: 60 });
        });
    }

    function isColliding(nx, ny) {
        const footY = ny + 10;
        for(let r of shelfRects) {
            if (nx + 10 > r.x && nx - 10 < r.x + r.w && footY + 10 > r.y && footY - 10 < r.y + r.h) return true;
        }
        return false;
    }

    function gameLoop() {
        if(gameActive) {
            let moving = false, nextX = player.x, nextY = player.y;
            const pEl = document.getElementById('player');
            if(keys['up']) nextY -= player.speed;
            if(keys['down']) nextY += player.speed;
            if(keys['left']) { nextX -= player.speed; pEl.classList.add('facing-left'); }
            if(keys['right']) { nextX += player.speed; pEl.classList.remove('facing-left'); }

            if (!isColliding(nextX, player.y)) { if(nextX !== player.x) moving = true; player.x = nextX; }
            if (!isColliding(player.x, nextY)) { if(nextY !== player.y) moving = true; player.y = nextY; }

            if(moving) pEl.classList.add('walking'); else pEl.classList.remove('walking');

            const worldRect = document.getElementById('world').getBoundingClientRect();
            player.x = Math.max(20, Math.min(worldRect.width - 20, player.x));
            player.y = Math.max(75, Math.min(worldRect.height - 20, player.y));
            
            pEl.style.left = player.x + 'px'; pEl.style.top = player.y + 'px';
            pEl.style.zIndex = Math.floor(player.y);
            checkPickup();
        }
        requestAnimationFrame(gameLoop);
    }

    function checkPickup() {
        if(!keys['space']) return;
        shoppingList.forEach(item => {
            const el = document.getElementById(`world-${item.n}`);
            if(!el || el.classList.contains('collected')) return;
            const iR = el.getBoundingClientRect(), wR = document.getElementById('world').getBoundingClientRect();
            if(Math.hypot(player.x - (iR.left - wR.left + iR.width/2), player.y - (iR.top - wR.top + iR.height/2)) < 65) {
                el.classList.add('collected');
                SoundManager.playCollect(); // --- PLAY SOUND ---
                const li = document.getElementById(`list-${item.n}`);
                li.classList.add('checked'); li.innerHTML = "✅ " + li.innerHTML;
                collectedCount++;
                if(collectedCount >= 5) document.getElementById('pay-trigger').style.display = 'block';
            }
        });
    }

    function togglePayment(show) { document.getElementById('pay-modal').style.display = show ? 'flex' : 'none'; document.getElementById('target-amt').innerText = `$${targetTotal.toFixed(2)}`; clearSelections(); }
    function handleSelect(btnEl, type) {
        const val = parseFloat(btnEl.dataset.value);
        document.querySelectorAll('.m-' + type).forEach(b => b.classList.remove('active-selection'));
        btnEl.classList.add('active-selection');
        if (type === 'note') selectedNote = val; else selectedCent = val;
        document.getElementById('inserted-amt').innerText = `$${(Math.round((selectedNote + selectedCent) * 100) / 100).toFixed(2)}`;
    }
    function clearSelections() { selectedNote = 0; selectedCent = 0; document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active-selection')); document.getElementById('inserted-amt').innerText = `$0.00`; document.getElementById('pay-feedback').innerText = ""; }
    
    function confirmPayment() { 
        if(Math.abs((selectedNote + selectedCent) - targetTotal) < 0.01) { 
            gameActive = false; 
            SoundManager.playSuccess(); // --- PLAY SOUND ---
            document.getElementById('pay-modal').style.display = 'none'; 
            document.getElementById('win-screen').style.display = 'flex'; 
        } else { 
            document.getElementById('pay-feedback').innerText = "Wrong amount!"; 
        } 
    }
</script>
</body>
</html>
