<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Safari Match: More & Less</title>
<style>
:root {
    --primary: #2D5A27;
    --secondary: #558B2F;
    --accent: #E58E26;
    --success: #78E08F;
    --bg: #7CB342;
    --panel-bg: #FFFFFF;
    --radius: 16px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
body {
    margin: 0; background-color: var(--bg);
    background-image: radial-gradient(circle at 10px 10px, #8BC34A 2px, transparent 0), radial-gradient(circle at 30px 30px, #689F38 2px, transparent 0);
    background-size: 40px 40px;
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
    overflow: hidden; padding: 10px;
}
#game-container {
    width: 100%; max-width: 860px;
    background: var(--panel-bg); border-radius: var(--radius);
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    display: flex; flex-direction: column;
    padding: clamp(14px, 3vw, 28px);
    border: 6px solid #C5E1A5;
    max-height: 98vh;
    overflow: hidden;
    position: relative;
}

/* Sound toggle — top right of container */
#sound-toggle {
    position: absolute;
    top: 12px; right: 14px;
    display: flex; align-items: center; gap: 5px;
    background: #F1F8E9; border: 2px solid #DCEDC8;
    border-radius: 20px; padding: 5px 10px 5px 8px;
    cursor: pointer; font-size: 0.75rem; font-weight: 700;
    color: var(--primary); transition: all 0.2s;
    user-select: none; touch-action: manipulation; z-index: 50;
    white-space: nowrap;
}
#sound-toggle:hover { background: #DCEDC8; }
#sound-toggle.muted { background: #FFF3E0; border-color: #FFCC80; color: #E65100; }
#sound-toggle .icon { font-size: 1rem; line-height: 1; }

.screen { display: none; flex-direction: column; animation: fadeIn 0.3s ease-out; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
h1 { font-size: clamp(1.4rem, 4vw, 1.9rem); color: var(--primary); margin: 0 0 14px 0; text-align: center; font-weight: 900; }

.settings-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
.setting-box { background: #F1F8E9; padding: 10px 12px; border-radius: 12px; border: 2px solid #DCEDC8; }
.label { font-size: 0.72rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; margin-bottom: 7px; display: block; }
.btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
button { padding: 7px 10px; border: 2px solid #D1D8E0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; touch-action: manipulation; }
button.selected { background: var(--accent); color: white; border-color: #C37920; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); }
.btn-main { background: var(--primary); color: white; border: none; padding: 15px; font-size: 1.1rem; font-weight: 800; border-radius: var(--radius); box-shadow: 0 4px 0 #1B3517; cursor: pointer; width: 100%; margin-top: 6px; touch-action: manipulation; }

.instruction-banner {
    background: #F1F8E9; color: var(--primary); padding: 10px 12px; border-radius: 12px;
    text-align: center; font-size: clamp(0.9rem, 2.5vw, 1.15rem); font-weight: 800; margin-bottom: 14px; flex-shrink: 0;
    border: 2px solid var(--primary);
}
.match-area { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(16px, 4vw, 50px); flex-shrink: 0; }
.drop-column { display: flex; flex-direction: column; align-items: center; gap: clamp(10px, 2vh, 18px); }

.number-card {
    background: #fff; border-radius: 20px; width: 100%;
    aspect-ratio: 1.1 / 1; max-height: 190px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 4px solid #DCEDC8;
}
.number-display { font-size: clamp(2rem, 7vw, 4rem); font-weight: 900; color: var(--primary); }
.picture-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; padding: 8px; }
.icon-item { font-size: clamp(1rem, 3vw, 1.5rem); }

.drop-zone {
    width: 100%; max-width: 180px;
    height: clamp(70px, 12vw, 100px);
    border: 3px solid #CBD5E0; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    background: #F9FBF7; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.08);
    transition: all 0.2s;
}
.drop-zone.hover { background: #F1F8E9; border-color: var(--primary); }
.drop-zone.filled { border-style: solid; border-color: var(--success); background: #F0FFF4; box-shadow: none; }

.draggables-container {
    display: flex; justify-content: center; align-items: center;
    gap: clamp(16px, 5vw, 40px); flex-shrink: 0;
    margin-top: clamp(6px, 1.5vh, 14px);
    height: clamp(65px, 11vw, 100px);
}
.draggable-item {
    width: clamp(120px, 22vw, 180px);
    height: clamp(65px, 11vw, 100px);
    background: white; border: 3px solid var(--accent);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    cursor: grab; font-weight: 800; color: var(--accent); font-size: clamp(1rem, 3vw, 1.4rem);
    box-shadow: 0 6px 0 #C37920; user-select: none; z-index: 100;
    touch-action: none;
}
.draggable-item img { height: 85%; width: 85%; object-fit: contain; pointer-events: none; }
.draggable-item:active { cursor: grabbing; }

.progress-container { height: 10px; background: #EDF2F7; border-radius: 10px; margin-top: 10px; overflow: hidden; flex-shrink: 0; }
#progress-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; }

.success-content { text-align: center; margin: auto; padding: 20px 0; }
.celebration-emoji { font-size: 5rem; display: block; }

/* Start screen needs top padding so title doesn't hide under sound button */
#start-screen { padding-top: 28px; }

@media (min-width: 640px) {
    body { align-items: center; }
    #game-container { height: auto; max-height: 92vh; }
    .number-card { max-height: 210px; }
}
@media (max-width: 480px) {
    body { padding: 6px; align-items: flex-start; overflow-y: auto; }
    #game-container { max-height: none; border-width: 4px; padding: 12px; }
    .settings-container { gap: 8px; }
    .match-area { gap: 12px; }
    .number-card { aspect-ratio: 1/1; max-height: 150px; }
    .drop-zone { max-width: none; width: 120px; height: 120px; border-radius: 14px; }
    .draggables-container { height: 120px; gap: 20px; margin-top: 10px; }
    .draggable-item { width: 120px; height: 120px; border-radius: 14px; font-size: 1.2rem; box-shadow: 0 5px 0 #C37920; }
    .draggable-item img { height: 90%; width: 90%; }
    #sound-toggle { top: 10px; right: 10px; font-size: 0.7rem; padding: 4px 8px 4px 6px; }
}
</style>
</head>
<body>

<!-- Preload images — hidden, loads as soon as page opens -->
<div style="display:none" aria-hidden="true">
    <img id="preload-more" src="https://iili.io/BWVP5o7.md.png" alt="">
    <img id="preload-less" src="https://iili.io/BWVPuN2.md.png" alt="">
</div>

<div id="game-container">

    <!-- Sound toggle button, always visible -->
    <div id="sound-toggle" onclick="toggleSound()">
        <span class="icon" id="sound-icon">🔊</span>
        <span id="sound-label">Sound On</span>
    </div>

    <div id="start-screen" class="screen active">
        <h1>🦁 Safari Match</h1>
        <div class="settings-container">
            <div class="setting-box">
                <span class="label">Range</span>
                <div class="btn-group" id="range-group">
                    <button onclick="setSetting('range', 5)" class="selected">1–5</button>
                    <button onclick="setSetting('range', 10)">1–10</button>
                    <button onclick="setSetting('range', 20)">1–20</button>
                </div>
            </div>
            <div class="setting-box">
                <span class="label">Representation</span>
                <div class="btn-group" id="rep-group">
                    <button onclick="setSetting('rep', 'visuals')" class="selected">Visuals</button>
                    <button onclick="setSetting('rep', 'words')">Words</button>
                </div>
            </div>
            <div class="setting-box">
                <span class="label">Show</span>
                <div class="btn-group" id="mode-group">
                    <button onclick="setSetting('mode', 'pics')">Icons</button>
                    <button onclick="setSetting('mode', 'nums')">Numbers</button>
                    <button onclick="setSetting('mode', 'both')" class="selected">Both</button>
                </div>
            </div>
            <div class="setting-box">
                <span class="label">Trials</span>
                <div class="btn-group" id="trials-group">
                    <button onclick="setSetting('trials', 5)" class="selected">5 Qs</button>
                    <button onclick="setSetting('trials', 10)">10 Qs</button>
                </div>
            </div>
        </div>
        <button class="btn-main" onclick="startGame()">START ADVENTURE 🌍</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="instruction-banner">Match MORE and LESS to the correct numbers!</div>
        <div class="match-area">
            <div class="drop-column">
                <div id="left-card" class="number-card"></div>
                <div id="left-drop" class="drop-zone" data-side="left"></div>
            </div>
            <div class="drop-column">
                <div id="right-card" class="number-card"></div>
                <div id="right-drop" class="drop-zone" data-side="right"></div>
            </div>
        </div>
        <div class="draggables-container" id="draggables-bin">
            <div id="drag-more" class="draggable-item" data-type="more"></div>
            <div id="drag-less" class="draggable-item" data-type="less"></div>
        </div>
        <div class="progress-container"><div id="progress-fill"></div></div>
    </div>

    <div id="success-screen" class="screen">
        <div class="success-content">
            <span class="celebration-emoji">🦒</span>
            <h1>Perfect Match!</h1>
            <p style="color:#555; font-size:1.1rem;">You sorted all the numbers!</p>
        </div>
        <button class="btn-main" onclick="resetGame()">PLAY AGAIN 🔄</button>
    </div>

</div>
<script>
let settings = { range: 5, rep: 'visuals', mode: 'both', trials: 5 };
let gameState = { currentTrial: 0, leftVal: 0, rightVal: 0, matches: 0 };
const icons = ['🦁','🐯','🦒','🐘','🦏','🦓','🐵','🦜'];
let audioCtx = null;
let soundEnabled = true;
let activeDragItem = null;
let initialX, initialY, startClientX, startClientY;

// Cache preloaded image src so draggables use the already-loaded version
const IMG_MORE = document.getElementById('preload-more').src;
const IMG_LESS = document.getElementById('preload-less').src;

function toggleSound() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('sound-toggle');
    document.getElementById('sound-icon').textContent = soundEnabled ? '🔊' : '🔇';
    document.getElementById('sound-label').textContent = soundEnabled ? 'Sound On' : 'Sound Off';
    btn.classList.toggle('muted', !soundEnabled);
}

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playCorrectSound() {
    if (!soundEnabled || !audioCtx) return;
    const now = audioCtx.currentTime;
    const masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0, now);
    masterGain.gain.linearRampToValueAtTime(0.1, now + 0.02);
    masterGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    masterGain.connect(audioCtx.destination);
    [523.25, 659.25, 783.99].forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        osc.frequency.setValueAtTime(f, now + i * 0.08);
        osc.connect(masterGain);
        osc.start(now + i * 0.08);
        osc.stop(now + 0.6);
    });
}
function setSetting(key, value) {
    settings[key] = value;
    const groupIds = { range: 'range-group', rep: 'rep-group', mode: 'mode-group', trials: 'trials-group' };
    document.querySelectorAll(`#${groupIds[key]} button`).forEach(btn => {
        btn.classList.remove('selected');
        const t = btn.innerText.toLowerCase(), v = value.toString().toLowerCase();
        if (t === v || (v === 'pics' && t === 'icons') || (v === 'nums' && t === 'numbers') ||
            (isNaN(value) && t.includes(v)) || (!isNaN(value) && t.includes(value)))
            btn.classList.add('selected');
    });
}
function startGame() {
    initAudio();
    gameState.currentTrial = 0;
    showScreen('game-screen');
    nextTrial();
}
function nextTrial() {
    if (gameState.currentTrial >= settings.trials) return showScreen('success-screen');
    gameState.matches = 0;
    const icon = icons[Math.floor(Math.random() * icons.length)];
    gameState.leftVal = Math.floor(Math.random() * settings.range) + 1;
    do { gameState.rightVal = Math.floor(Math.random() * settings.range) + 1; } while (gameState.rightVal === gameState.leftVal);
    renderCard('left-card', gameState.leftVal, icon);
    renderCard('right-card', gameState.rightVal, icon);
    resetDraggables();
    updateProgressBar();
}
function renderCard(id, val, icon) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    if (settings.mode !== 'pics') el.innerHTML += `<div class="number-display">${val}</div>`;
    if (settings.mode !== 'nums') {
        let grid = '<div class="picture-grid">';
        for (let i = 0; i < val; i++) grid += `<span class="icon-item">${icon}</span>`;
        el.innerHTML += grid + '</div>';
    }
}
function resetDraggables() {
    const more = document.getElementById('drag-more');
    const less = document.getElementById('drag-less');
    if (settings.rep === 'words') {
        more.innerHTML = 'MORE'; less.innerHTML = 'LESS';
    } else {
        // Use cached src from preloaded images — no network round-trip
        more.innerHTML = `<img src="${IMG_MORE}" alt="more">`;
        less.innerHTML = `<img src="${IMG_LESS}" alt="less">`;
    }
    [more, less].forEach(el => {
        el.style.position = ''; el.style.left = ''; el.style.top = '';
        el.style.width = ''; el.style.height = ''; el.style.zIndex = '';
        el.style.pointerEvents = ''; el.style.visibility = 'visible';
        document.getElementById('draggables-bin').appendChild(el);
    });
    document.querySelectorAll('.drop-zone').forEach(z => { z.innerHTML = ''; z.classList.remove('filled', 'hover'); });
}
function getClientXY(e) {
    if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    return { x: e.clientX, y: e.clientY };
}
document.querySelectorAll('.draggable-item').forEach(item => {
    item.addEventListener('mousedown', dragStart);
    item.addEventListener('touchstart', dragStart, { passive: false });
});
function dragStart(e) {
    e.preventDefault();
    const item = e.currentTarget;
    if (item.closest('.drop-zone.filled')) return;
    activeDragItem = item;
    const { x, y } = getClientXY(e);
    startClientX = x; startClientY = y;
    const rect = item.getBoundingClientRect();
    initialX = rect.left; initialY = rect.top;
    item.style.position = 'fixed';
    item.style.width = rect.width + 'px';
    item.style.height = rect.height + 'px';
    item.style.left = rect.left + 'px';
    item.style.top = rect.top + 'px';
    item.style.zIndex = '1000';
    item.style.transition = 'none';
    item.style.pointerEvents = 'none';
    window.addEventListener('mousemove', dragMove);
    window.addEventListener('touchmove', dragMove, { passive: false });
    window.addEventListener('mouseup', dragEnd);
    window.addEventListener('touchend', dragEnd);
}
function dragMove(e) {
    if (!activeDragItem) return;
    e.preventDefault();
    const { x, y } = getClientXY(e);
    activeDragItem.style.left = (initialX + x - startClientX) + 'px';
    activeDragItem.style.top  = (initialY + y - startClientY) + 'px';
    const rect = activeDragItem.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    document.querySelectorAll('.drop-zone').forEach(z => {
        const zr = z.getBoundingClientRect();
        if (!z.classList.contains('filled') && cx > zr.left && cx < zr.right && cy > zr.top && cy < zr.bottom)
            z.classList.add('hover');
        else z.classList.remove('hover');
    });
}
function dragEnd(e) {
    if (!activeDragItem) return;
    const rect = activeDragItem.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    let dropped = false;
    document.querySelectorAll('.drop-zone').forEach(zone => {
        const zr = zone.getBoundingClientRect();
        if (!dropped && cx > zr.left && cx < zr.right && cy > zr.top && cy < zr.bottom) {
            checkMatch(activeDragItem, zone); dropped = true;
        }
        zone.classList.remove('hover');
    });
    if (!dropped) snapBack(activeDragItem);
    window.removeEventListener('mousemove', dragMove);
    window.removeEventListener('touchmove', dragMove);
    window.removeEventListener('mouseup', dragEnd);
    window.removeEventListener('touchend', dragEnd);
    activeDragItem = null;
}
function checkMatch(item, zone) {
    if (zone.classList.contains('filled')) { snapBack(item); return; }
    const type = item.getAttribute('data-type');
    const side = zone.getAttribute('data-side');
    const val = side === 'left' ? gameState.leftVal : gameState.rightVal;
    const other = side === 'left' ? gameState.rightVal : gameState.leftVal;
    const isCorrect = (type === 'more' && val > other) || (type === 'less' && val < other);
    if (isCorrect) {
        item.style.position = ''; item.style.left = ''; item.style.top = '';
        item.style.width = ''; item.style.height = ''; item.style.zIndex = '';
        item.style.pointerEvents = '';
        zone.appendChild(item);
        zone.classList.add('filled');
        item.style.cursor = 'default';
        gameState.matches++;
        if (gameState.matches === 2) {
            playCorrectSound();
            setTimeout(() => { gameState.currentTrial++; nextTrial(); }, 800);
        }
    } else { snapBack(item); }
}
function snapBack(item) {
    item.style.transition = 'left 0.3s ease, top 0.3s ease';
    item.style.left = initialX + 'px'; item.style.top = initialY + 'px';
    setTimeout(() => {
        item.style.position = ''; item.style.left = ''; item.style.top = '';
        item.style.width = ''; item.style.height = ''; item.style.zIndex = '';
        item.style.pointerEvents = ''; item.style.transition = '';
        document.getElementById('draggables-bin').appendChild(item);
    }, 300);
}
function updateProgressBar() {
    document.getElementById('progress-fill').style.width = `${(gameState.currentTrial / settings.trials) * 100}%`;
}
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function resetGame() { showScreen('start-screen'); }
</script>
</body>
</html>
