<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Number Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --error: #EF4444;
            --neutral-dark: #1F2937;
            --neutral-light: #F3F4F6;
            --card-bg: #FFFFFF;
            --radius: 16px;
            --font-main: 'Inter', sans-serif;
            /* Dynamic height variable to combat mobile browser address bars */
            --app-height: 100vh;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, #EEF2F6 0%, #E2E8F0 100%);
            color: var(--neutral-dark);
            height: var(--app-height);
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* App Container: Compact layout to fit perfectly without scrolling */
        #app-container {
            width: 100%;
            max-width: 460px;
            height: var(--app-height);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @media (min-width: 768px) {
            #app-container {
                height: 90%;
                max-height: 800px;
            }
        }

        /* Screens Management */
        .screen {
            display: none;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.25rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .screen.active {
            display: flex;
        }

        /* Loading Preloader Screen */
        #screen-loading {
            justify-content: center;
            gap: 1.5rem;
        }

        .loader-ring {
            width: 50px;
            height: 50px;
            border: 4px solid var(--neutral-light);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Typography optimizations */
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
            margin-bottom: 0.25rem;
        }

        p {
            color: #6B7280;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Header Layout Fixes */
        .quiz-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            gap: 1rem;
        }

        .progress-container {
            flex-grow: 1;
            height: 8px;
            background-color: var(--neutral-light);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        .score-tracker {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--neutral-dark);
            white-space: nowrap;
        }

        /* Highly Scalable Asset Display Box */
        .image-container {
            width: 100%;
            flex-grow: 1;
            min-height: 140px;
            max-height: 340px;
            background-color: var(--neutral-light);
            border-radius: var(--radius);
            margin: 0.5rem 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 2px solid #E5E7EB;
        }

        .block-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .fallback-graphic {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9CA3AF;
        }

        /* Compact Quiz Options Grid */
        .options-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        /* Interactive Buttons */
        .btn {
            font-family: var(--font-main);
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 2rem;
            min-height: 48px;
        }

        .btn-primary:active {
            background-color: var(--primary-hover);
            transform: scale(0.98);
        }

        .btn-option {
            background-color: #F9FAFB;
            color: var(--neutral-dark);
            border: 2px solid #E5E7EB;
            min-height: 52px; /* Balanced hit target */
            padding: 0.5rem;
            font-size: 1.05rem;
        }

        .btn-option.correct {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
        }

        .btn-option.incorrect {
            background-color: var(--error);
            color: white;
            border-color: var(--error);
        }

        .btn-option:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        /* Result Screen Layout Elements */
        .result-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #EEF2F6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 1rem 0;
            border: 4px solid var(--primary);
        }

        .result-score {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--neutral-dark);
        }

        .flex-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="app-container">

        <div id="screen-loading" class="screen active">
            <div class="loader-ring"></div>
            <div>
                <h1 style="font-size: 1.5rem;">Loading Game Assets</h1>
                <p id="loading-text" style="margin-top: 0.25rem;">Preparing (0%)...</p>
            </div>
        </div>

        <div id="screen-start" class="screen">
            <div class="flex-center" style="justify-content: center; gap: 0.75rem; flex-grow: 1;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);">
                    <path d="m4 6 8-4 8 4v10l-8 4-8-4z"></path>
                    <path d="m12 22v-10"></path>
                    <path d="m12 12 8-4"></path>
                    <path d="M12 12 4 8"></path>
                </svg>
                <div>
                    <h1>Block Quiz</h1>
                    <p>Can you identify the correct block numbers?</p>
                </div>
            </div>
            <button class="btn btn-primary" onclick="Game.start()">Start Quiz</button>
        </div>

        <div id="screen-game" class="screen">
            <div class="quiz-header">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="score-tracker" class="score-tracker">Score: 0</div>
            </div>

            <div class="image-container">
                <img id="block-image" class="block-image" src="" alt="Block Image">
                <div id="fallback-graphic" class="fallback-graphic">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <span id="fallback-text" style="font-size: 0.8rem; margin-top: 0.5rem; font-weight: 600;"></span>
                </div>
            </div>

            <p style="font-weight: 600; font-size: 1rem; color: var(--neutral-dark);">Identify this block number:</p>

            <div class="options-grid" id="options-grid"></div>
        </div>

        <div id="screen-end" class="screen">
            <div class="flex-center" style="justify-content: center; flex-grow: 1;">
                <h1>Quiz Complete!</h1>
                <p id="result-message">Here is your final score:</p>
                
                <div class="result-circle">
                    <span id="final-score" class="result-score">0</span>
                    <span style="font-size: 0.85rem; color: #6B7280; font-weight: 600;">out of 5</span>
                </div>
            </div>
            <button class="btn btn-primary" onclick="Game.resetToStart()">Play Again</button>
        </div>

    </div>

    <script>
        /**
         * POOL OF DATA
         * Remember to modify this list to perfectly match your actual filenames!
         */
        const BLOCK_POOL = [
            "Blk 111", "Blk 313A", "Blk 467", "Blk 469", "Blk 477", 
            "Blk 476", "Blk 475", "Blk 507D", "Blk 483", "Blk 493"
        ];

        const Game = {
            currentRound: 0,
            score: 0,
            totalRounds: 5,
            activeBlocks: [],
            currentCorrectAnswer: "",
            preloadedImages: {},

            init() {
                this.setupViewportHeight();
                this.preloadElements();
                this.preloadAllAssets();
            },

            // Handles accurate cross-platform mobile viewport heights (safari/chrome browser toolbar fixes)
            setupViewportHeight() {
                const calculateHeight = () => {
                    let vh = window.innerHeight * 0.01;
                    document.documentElement.style.setProperty('--vh', `${vh}px`);
                    document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
                };
                
                calculateHeight();
                window.addEventListener('resize', calculateHeight);
                window.addEventListener('orientationchange', calculateHeight);
            },

            preloadElements() {
                this.imgElement = document.getElementById('block-image');
                this.fallbackGraphic = document.getElementById('fallback-graphic');
                this.fallbackText = document.getElementById('fallback-text');
                
                this.imgElement.onerror = () => {
                    this.fallbackGraphic.style.display = 'flex';
                    this.fallbackText.innerText = this.currentCorrectAnswer.replace(/\s+/g, '');
                };
                
                this.imgElement.onload = () => {
                    this.fallbackGraphic.style.display = 'none';
                };
            },

            // Preloads all images into memory before releasing the loading screen cover
            preloadAllAssets() {
                let loadedCount = 0;
                const totalAssets = BLOCK_POOL.length;
                const loadingText = document.getElementById('loading-text');

                BLOCK_POOL.forEach(blockName => {
                    const cleanName = blockName.replace(/\s+/g, '');
                    const img = new Image();
                    img.src = `assets/${cleanName}.png`;
                    
                    const onAssetLoaded = () => {
                        loadedCount++;
                        let percent = Math.floor((loadedCount / totalAssets) * 100);
                        loadingText.innerText = `Preparing (${percent}%)...`;

                        if (loadedCount === totalAssets) {
                            // Slight intentional delay for user experience transition smooth look
                            setTimeout(() => this.showScreen('screen-start'), 600);
                        }
                    };

                    img.onload = onAssetLoaded;
                    img.onerror = onAssetLoaded; // Proceed even if an asset is physically missing
                    this.preloadedImages[blockName] = img;
                });
            },

            showScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(screenId).classList.add('active');
            },

            start() {
                this.currentRound = 0;
                this.score = 0;
                
                this.activeBlocks = [...BLOCK_POOL]
                    .sort(() => 0.5 - Math.random())
                    .slice(0, this.totalRounds);

                this.updateScoreTracker();
                this.showScreen('screen-game');
                this.nextRound();
            },

            nextRound() {
                if (this.currentRound >= this.totalRounds) {
                    this.endGame();
                    return;
                }

                const progressPercent = (this.currentRound / this.totalRounds) * 100;
                document.getElementById('progress-bar').style.width = `${progressPercent}%`;

                this.currentCorrectAnswer = this.activeBlocks[this.currentRound];
                
                // Fetch already loaded image source pointer instantly
                const cleanFileName = this.currentCorrectAnswer.replace(/\s+/g, '');
                this.imgElement.src = `assets/${cleanFileName}.png`;
                
                this.generateOptions();
            },

            generateOptions() {
                const grid = document.getElementById('options-grid');
                grid.innerHTML = '';

                const distractors = BLOCK_POOL.filter(item => item !== this.currentCorrectAnswer);
                const chosenDistractors = distractors.sort(() => 0.5 - Math.random()).slice(0, 3);
                const choices = [this.currentCorrectAnswer, ...chosenDistractors].sort(() => 0.5 - Math.random());

                choices.forEach(choice => {
                    const button = document.createElement('button');
                    button.className = 'btn btn-option';
                    button.textContent = choice;
                    button.addEventListener('click', (e) => this.handleAnswer(e, choice));
                    grid.appendChild(button);
                });
            },

            handleAnswer(event, selectedAnswer) {
                const buttons = document.querySelectorAll('.btn-option');
                buttons.forEach(btn => btn.disabled = true);

                const isCorrect = selectedAnswer === this.currentCorrectAnswer;
                const clickedButton = event.currentTarget;

                if (isCorrect) {
                    clickedButton.classList.add('correct');
                    this.score++;
                    this.updateScoreTracker();
                } else {
                    clickedButton.classList.add('incorrect');
                    buttons.forEach(btn => {
                        if (btn.textContent === this.currentCorrectAnswer) {
                            btn.classList.add('correct');
                        }
                    });
                }

                setTimeout(() => {
                    this.currentRound++;
                    this.nextRound();
                }, 1200);
            },

            updateScoreTracker() {
                document.getElementById('score-tracker').textContent = `Score: ${this.score}`;
            },

            endGame() {
                document.getElementById('progress-bar').style.width = '100%';
                document.getElementById('final-score').textContent = this.score;
                
                const msgElement = document.getElementById('result-message');
                if (this.score === this.totalRounds) {
                    msgElement.textContent = "Perfect score! Exceptional recognition!";
                } else if (this.score >= 3) {
                    msgElement.textContent = "Nicely done! Great job.";
                } else {
                    msgElement.textContent = "Good try! Let's practice again.";
                }

                this.showScreen('screen-end');
            },

            resetToStart() {
                this.showScreen('screen-start');
            }
        };

        window.addEventListener('DOMContentLoaded', () => Game.init());
    </script>
</body>
</html>
