
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#87CEEB;overflow-x:hidden}
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
#gw{width:100%;max-width:700px;margin:0 auto;display:flex;flex-direction:column;align-items:center;padding-bottom:24px;min-height:100vh}
#top-bar{width:100%;background:#1A3A5C;display:flex;align-items:center;justify-content:space-between;padding:10px 18px;gap:12px}
#gtitle{font-size:22px;font-weight:900;color:#FFD54F;letter-spacing:1px}
#prog-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
#prog-label{font-size:12px;color:#90CAF9;font-weight:700}
#sdots{display:flex;gap:6px}
.sdot{width:18px;height:18px;border-radius:50%;background:#263F5A;border:2px solid #4A7FA5;transition:all .3s}
.sdot.done{background:#4CAF50;border-color:#4CAF50}
.sdot.active{background:#FFD54F;border-color:#FFD54F;box-shadow:0 0 6px #FFD54F}
#addr-card{width:calc(100% - 24px);background:#FFF9F0;border:3px solid #E8A020;border-radius:16px;margin:14px 12px 0;padding:14px 18px;display:flex;flex-direction:column;gap:6px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
#addr-header{font-size:12px;font-weight:800;color:#B07010;text-transform:uppercase;letter-spacing:1px}
#addr-text{font-size:20px;font-weight:900;color:#2C2C2C;line-height:1.4}
.addr-part{display:inline}
.ahi{background:#FFD54F;color:#5A3A00;border-radius:6px;padding:2px 8px;animation:phi 1.2s ease-in-out infinite;display:inline}
@keyframes phi{0%,100%{box-shadow:0 0 0 0 rgba(255,213,79,.6)}50%{box-shadow:0 0 0 6px rgba(255,213,79,0)}}
#instr{font-size:15px;font-weight:700;color:#C05000;margin-top:2px}
#scene-wrap{width:calc(100% - 24px);margin:14px 12px 0;border-radius:20px;overflow:hidden;border:3px solid #1A3A5C;box-shadow:0 6px 20px rgba(0,0,0,.25);position:relative}
#map-svg{display:block;width:100%}
#trans-wrap{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:40;overflow:hidden}
#trans-wrap.show{display:block}
#trans-svg{display:block;width:100%;height:100%}
#fb-wrap{position:absolute;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;z-index:30}
#fb-wrap.show{display:flex}
#fb-box{background:#FFF;border-radius:24px;padding:28px 36px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.3);animation:popin .4s cubic-bezier(.34,1.56,.64,1);max-width:300px}
@keyframes popin{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
#fb-emoji{font-size:56px;display:block;margin-bottom:10px}
#fb-title{font-size:24px;font-weight:900;margin-bottom:6px;color:#1A3A5C}
#fb-sub{font-size:14px;color:#666;margin-bottom:18px}
#fb-btn{background:#4CAF50;color:#FFF;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;padding:11px 28px;cursor:pointer}
#rc-wrap{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
#rc-box{background:#FFF;border-radius:28px;padding:32px 40px;text-align:center;animation:popin .4s cubic-bezier(.34,1.56,.64,1);max-width:340px;width:88%}
#rc-emoji{font-size:60px;display:block;margin-bottom:10px}
#rc-title{font-size:26px;font-weight:900;color:#1A3A5C;margin-bottom:6px}
#rc-sub{font-size:15px;color:#555;margin-bottom:22px}
#rc-btn{background:#1A3A5C;color:#FFD54F;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:19px;font-weight:900;padding:13px 34px;cursor:pointer}
#go-wrap{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,10,40,.85);display:none;align-items:center;justify-content:center;z-index:50}
#go-box{background:#FFF;border-radius:28px;padding:34px 42px;text-align:center;animation:popin .4s cubic-bezier(.34,1.56,.64,1);max-width:360px;width:90%}
#go-emoji{font-size:68px;display:block;margin-bottom:12px}
#go-title{font-size:30px;font-weight:900;color:#1A3A5C;margin-bottom:8px}
#go-sub{font-size:15px;color:#555;margin-bottom:26px;line-height:1.5}
#go-btn{background:#FFD54F;color:#1A3A5C;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:21px;font-weight:900;padding:13px 38px;cursor:pointer}
.confetti-p{position:fixed;border-radius:2px;animation:cfall linear forwards;pointer-events:none;z-index:999}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>

<div id="gw">
  <div id="top-bar">
    <div id="gtitle">🛵 Deliver It!</div>
    <div id="prog-wrap">
      <div id="prog-label">Round <span id="rnum">1</span> of 3 · Stage <span id="snum">1</span> of 4</div>

        <div class="sdot active" id="dot-1"></div>

      </div>

</div>

<script>
const fixedStreets=["Woodlands Avenue 4","Woodlands Street 82","Woodlands Street 83"];
const distractors=["Woodlands Drive 16","Woodlands Crescent","Woodlands Link","Woodlands Loop","Woodlands Place","Woodlands Rise","Woodlands Terrace","Woodlands Circle"];
const blockRanges={"Woodlands Avenue 4":[301,418,522,601],"Woodlands Street 82":[101,213,327,440],"Woodlands Street 83":[501,618,742,801]};
const unitUnits=['01','02','03','04','05','06','07','08'];
let state={round:1,stage:1,totalRounds:3,address:null,wrongAttempts:0,liftBusy:false};
let liftAnimating=false;

function generateAddress(){
  const street=fixedStreets[Math.floor(Math.random()*fixedStreets.length)];
  const block=blockRanges[street][Math.floor(Math.random()*4)];
  const floor=3+Math.floor(Math.random()*4);
  const unit=unitUnits[Math.floor(Math.random()*unitUnits.length)];
  const unitFull=`#${String(floor).padStart(2,'0')}-${unit}`;
  const postal=`Singapore ${Math.floor(730000+Math.random()*9999)}`;
  return{street,block,floor,unit,unitFull,postal};
}

const stageInstrs=['Which street should I go to? Tap the sign! 🗺️','Which block number is it? Tap the block! 🏢','Which floor? Press the lift button! 🔼','Which unit is it? Tap the correct door! 🚪'];

function renderAddressCard(){
  const a=state.address,h=state.stage;
  function sp(hi,t){return`<span class="${hi?'addr-part ahi':'addr-part'}">${t}</span>`;}
  document.getElementById('addr-text').innerHTML=sp(h===2,`Blk ${a.block}`)+', '+sp(h===1,a.street)+', '+sp(h===3||h===4,a.unitFull)+', '+sp(false,a.postal);
  document.getElementById('instr').textContent=stageInstrs[h-1];
}
function updateProgress(){
  document.getElementById('rnum').textContent=state.round;
  document.getElementById('snum').textContent=state.stage;
  for(let i=1;i<=4;i++){const d=document.getElementById(`dot-${i}`);d.className='sdot';if(i<state.stage)d.classList.add('done');else if(i===state.stage)d.classList.add('active');}
}

const NS='http://www.w3.org/2000/svg';
function mk(tag,attrs){const el=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;}
function mktxt(str,attrs){const el=mk('text',attrs);el.textContent=str;return el;}

// ── Animation helpers ──────────────────────────────────
function easeOutCubic(t){return 1-Math.pow(1-t,3);}
function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function easeOutBack(t){const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}
function lerp(a,b,t){return a+(b-a)*t;}

function animate(durationMs,fn,onDone){
  const start=performance.now();
  function frame(now){
    const p=Math.min((now-start)/durationMs,1);
    fn(p);
    if(p<1)requestAnimationFrame(frame);
    else if(onDone)onDone();
  }
  requestAnimationFrame(frame);
}

// ── Scooter drawing ────────────────────────────────────
function drawScooter(g,x,y,scale=1,flip=1){
  const t=mk('g',{transform:`translate(${x},${y}) scale(${flip*scale},${scale})`});
  t.appendChild(mk('ellipse',{cx:0,cy:14,rx:28,ry:5,fill:'rgba(0,0,0,.15)'}));
  t.appendChild(mk('rect',{x:-22,y:-8,width:44,height:16,rx:8,fill:'#E84020'}));
  t.appendChild(mk('rect',{x:-10,y:-14,width:24,height:10,rx:5,fill:'#F06040'}));
  t.appendChild(mk('rect',{x:14,y:-18,width:4,height:12,rx:2,fill:'#2A2A2A'}));
  t.appendChild(mk('rect',{x:10,y:-20,width:12,height:4,rx:2,fill:'#2A2A2A'}));
  t.appendChild(mk('circle',{cx:-16,cy:12,r:8,fill:'#222'}));
  t.appendChild(mk('circle',{cx:-16,cy:12,r:4,fill:'#555'}));
  t.appendChild(mk('circle',{cx:16,cy:12,r:8,fill:'#222'}));
  t.appendChild(mk('circle',{cx:16,cy:12,r:4,fill:'#555'}));
  t.appendChild(mk('circle',{cx:22,cy:-2,r:3,fill:'#FFD54F'}));
  t.appendChild(mk('circle',{cx:-22,cy:-2,r:3,fill:'#FF4444',opacity:'.8'}));
  t.appendChild(mk('circle',{cx:8,cy:-20,r:7,fill:'#F4A460'}));
  t.appendChild(mk('rect',{x:2,y:-16,width:14,height:10,rx:3,fill:'#2A5A8C'}));
  t.appendChild(mk('ellipse',{cx:8,cy:-24,rx:7,ry:5,fill:'#FFD54F'}));
  t.appendChild(mk('rect',{x:-20,y:-14,width:20,height:14,rx:2,fill:'#FF8C00'}));
  t.appendChild(mk('line',{x1:-20,y1:-7,x2:0,y2:-7,stroke:'#CC6A00','stroke-width':'1'}));
  t.appendChild(mk('line',{x1:-10,y1:-14,x2:-10,y2:-1,stroke:'#CC6A00','stroke-width':'1'}));
  g.appendChild(t);return t;
}

function drawRoad(g,roadY,w=680){
  g.appendChild(mk('rect',{x:0,y:roadY-20,width:w,height:40,fill:'#8B9BAF'}));
  g.appendChild(mk('rect',{x:0,y:roadY-22,width:w,height:4,fill:'#B4A882'}));
  g.appendChild(mk('rect',{x:0,y:roadY+18,width:w,height:4,fill:'#B4A882'}));
  for(let x=0;x<w;x+=60)g.appendChild(mk('rect',{x,y:roadY-2,width:36,height:4,fill:'#F5E642'}));
}

// ══════════════════════════════════════════════════════
// TRANSITIONS
// ══════════════════════════════════════════════════════

function showTrans(){document.getElementById('trans-wrap').classList.add('show');}
function hideTrans(){document.getElementById('trans-wrap').classList.remove('show');document.getElementById('trans-layer').innerHTML='';}

// 1→2: Scooter rides along street
function transStreetToBlock(onDone){
  const tl=document.getElementById('trans-layer');tl.innerHTML='';showTrans();
  tl.appendChild(mk('rect',{x:0,y:0,width:680,height:430,fill:'#87CEEB'}));
  [[80,50,50,20],[240,38,36,16],[480,55,44,18]].forEach(([cx,cy,rx,ry])=>{
    tl.appendChild(mk('ellipse',{cx,cy,rx,ry,fill:'#FFF',opacity:'.9'}));
    tl.appendChild(mk('ellipse',{cx:cx+20,cy:cy-8,rx:rx*.7,ry:ry*.8,fill:'#FFF',opacity:'.9'}));
  });
  tl.appendChild(mk('rect',{x:0,y:280,width:680,height:150,fill:'#6BBF59'}));
  drawRoad(tl,310);
  // Distant buildings
  [[20,180,65,100,'#C8B898'],[560,175,75,105,'#C8B898'],[110,205,50,75,'#D0C0A0']].forEach(([x,y,w,h,f])=>{
    tl.appendChild(mk('rect',{x,y,width:w,height:h,rx:2,fill:f}));
    for(let r=0;r<3;r++)for(let c=0;c<2;c++)tl.appendChild(mk('rect',{x:x+6+c*18,y:y+10+r*20,width:12,height:14,rx:1,fill:'#A8C8E0',opacity:'.6'}));
  });
  const cap=mktxt('Heading to the block! 🏢',{x:340,y:52,'font-family':'Nunito,sans-serif','font-size':'22','font-weight':'900',fill:'#1A3A5C','text-anchor':'middle',opacity:'0',id:'trans-cap'});
  tl.appendChild(cap);
  const sg=mk('g',{id:'ts',transform:'translate(-80,302)'});tl.appendChild(sg);
  drawScooter(sg,0,0);
  // Slow: 3.5s
  animate(3500,p=>{
    const ease=easeInOutCubic(p);
    const sx=lerp(-80,780,ease);
    const bob=Math.sin(p*Math.PI*8)*2.5;
    document.getElementById('ts')?.setAttribute('transform',`translate(${sx},${302+bob})`);
    document.getElementById('trans-cap')?.setAttribute('opacity',p<0.15?p/0.15:1);
  },()=>{setTimeout(()=>{hideTrans();onDone();},200);});
}

// 2→3: Scooter parks, walker goes to void deck
function transBlockToLift(onDone){
  const tl=document.getElementById('trans-layer');tl.innerHTML='';showTrans();
  tl.appendChild(mk('rect',{x:0,y:0,width:680,height:430,fill:'#87CEEB'}));
  [[100,44,40,16],[350,36,30,14],[580,48,38,15]].forEach(([cx,cy,rx,ry])=>{tl.appendChild(mk('ellipse',{cx,cy,rx,ry,fill:'#FFF',opacity:'.9'}));tl.appendChild(mk('ellipse',{cx:cx+16,cy:cy-6,rx:rx*.65,ry:ry*.75,fill:'#FFF',opacity:'.9'}));});
  tl.appendChild(mk('rect',{x:0,y:300,width:680,height:130,fill:'#6BBF59'}));
  tl.appendChild(mk('rect',{x:0,y:348,width:680,height:20,fill:'#C8B88A'}));
  // Big block
  tl.appendChild(mk('rect',{x:200,y:72,width:280,height:276,rx:2,fill:'#E0CFA8'}));
  tl.appendChild(mk('rect',{x:200,y:72,width:280,height:14,rx:2,fill:'#C8A870'}));
  for(let r=0;r<5;r++)for(let c=0;c<5;c++)tl.appendChild(mk('rect',{x:208+c*50,y:92+r*40,width:32,height:26,rx:2,fill:'#A8C8E4',opacity:'.7'}));
  // Void deck
  tl.appendChild(mk('rect',{x:200,y:308,width:280,height:40,fill:'#C8B080',opacity:'.85'}));
  [216,290,364,432].forEach(px=>tl.appendChild(mk('rect',{x:px,y:298,width:12,height:50,rx:2,fill:'#B09060'})));
  // Block sign
  tl.appendChild(mk('rect',{x:208,y:80,width:140,height:36,rx:5,fill:'#1A3A5C'}));
  tl.appendChild(mktxt(`Blk ${state.address.block}`,{x:278,y:104,'font-family':'Nunito,sans-serif','font-size':'18','font-weight':'900',fill:'#FFD54F','text-anchor':'middle'}));
  tl.appendChild(mktxt('Found it! Taking the lift! 🛗',{x:340,y:50,'font-family':'Nunito,sans-serif','font-size':'21','font-weight':'900',fill:'#1A3A5C','text-anchor':'middle'}));
  // Scooter (starts off right, rides in)
  const sg=mk('g',{id:'ts2',transform:'translate(820,342)'});tl.appendChild(sg);drawScooter(sg,0,0,1,-1);
  // Walker
  const wg=mk('g',{id:'ts-w',opacity:'0'});tl.appendChild(wg);
  wg.appendChild(mk('circle',{cx:0,cy:-18,r:8,fill:'#F4A460'}));
  wg.appendChild(mk('ellipse',{cx:0,cy:-23,rx:8,ry:5,fill:'#FFD54F'}));
  wg.appendChild(mk('rect',{x:-6,y:-10,width:12,height:14,rx:3,fill:'#2A5A8C'}));
  wg.appendChild(mk('rect',{x:-5,y:4,width:5,height:14,rx:2,fill:'#333',id:'wll'}));
  wg.appendChild(mk('rect',{x:1,y:4,width:5,height:14,rx:2,fill:'#333',id:'wrl'}));
  wg.appendChild(mk('rect',{x:-14,y:-8,width:12,height:10,rx:2,fill:'#FF8C00'}));
  // Slow: 3.8s total
  animate(3800,p=>{
    if(p<0.45){
      // Scooter rides in from right
      const ep=easeOutCubic(p/0.45);
      const sx=lerp(820,510,ep);
      const bob=Math.sin(p*Math.PI*6)*2;
      document.getElementById('ts2')?.setAttribute('transform',`translate(${sx},${342+bob})`);
      document.getElementById('ts-w')?.setAttribute('opacity','0');
    } else {
      document.getElementById('ts2')?.setAttribute('transform','translate(510,342)');
      const wp=easeInOutCubic((p-0.45)/0.55);
      const wx=lerp(500,316,wp);
      const wg2=document.getElementById('ts-w');
      if(wg2){
        wg2.setAttribute('opacity','1');
        wg2.setAttribute('transform',`translate(${wx},338)`);
        const legS=Math.sin(p*Math.PI*14)*9;
        document.getElementById('wll')?.setAttribute('transform',`rotate(${legS},0,4)`);
        document.getElementById('wrl')?.setAttribute('transform',`rotate(${-legS},0,4)`);
        // Fade out near void deck
        if(wx<340)wg2.setAttribute('opacity',Math.max(0,(wx-300)/40).toString());
      }
    }
  },()=>{setTimeout(()=>{hideTrans();onDone();},200);});
}

// 3→4: brief pause (doors already animated open)
function transLiftToCorridor(onDone){setTimeout(onDone,500);}

// After Stage 4 correct: "Delivered!" full illustrated scene
function transDelivered(onDone){
  const tl=document.getElementById('trans-layer');tl.innerHTML='';showTrans();

  // Warm evening sky background
  tl.appendChild(mk('rect',{x:0,y:0,width:680,height:430,fill:'#1C3A5E'}));
  // Stars
  const starPositions=[[60,30],[140,18],[220,42],[310,22],[440,36],[530,14],[620,28],[80,80],[380,70],[580,55],[160,60],[490,82]];
  starPositions.forEach(([sx,sy])=>{
    tl.appendChild(mk('circle',{cx:sx,cy:sy,r:1.5+Math.random(),fill:'#FFF',opacity:(0.4+Math.random()*0.5).toFixed(2)}));
  });
  // Moon
  tl.appendChild(mk('circle',{cx:600,cy:55,r:28,fill:'#FFFDE0'}));
  tl.appendChild(mk('circle',{cx:614,cy:45,r:22,fill:'#1C3A5E'})); // crescent cutout

  // Ground / pavement
  tl.appendChild(mk('rect',{x:0,y:340,width:680,height:90,fill:'#2A2A3A'}));
  tl.appendChild(mk('rect',{x:0,y:340,width:680,height:6,fill:'#3A3A4A'}));
  // Pavement markings
  for(let x=0;x<680;x+=80)tl.appendChild(mk('rect',{x,y:345,width:44,height:4,fill:'#F5E642',opacity:'.5'}));

  // HDB block silhouette (night, lit windows)
  tl.appendChild(mk('rect',{x:200,y:50,width:280,height:295,rx:2,fill:'#1A2A3A'}));
  // Lit windows (warm yellow = light on, dark = off)
  const litPattern=[[1,0],[0,1],[1,1],[0,0],[1,2],[0,2],[1,3],[1,4],[0,4]];
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    const isLit=litPattern.some(([lc,lr])=>lc===c&&lr===r);
    tl.appendChild(mk('rect',{x:210+c*50,y:68+r*44,width:32,height:28,rx:2,fill:isLit?'#FFE88A':'#0A1828',opacity:isLit?'.9':'.8'}));
    if(isLit)tl.appendChild(mk('rect',{x:210+c*50,y:68+r*44,width:32,height:6,rx:1,fill:'#FFF3A0',opacity:'.4'}));
  }
  // Target unit window glowing (one window stands out)
  tl.appendChild(mk('rect',{x:260,y:112,width:32,height:28,rx:2,fill:'#FFD54F'}));
  tl.appendChild(mk('rect',{x:260,y:112,width:32,height:28,rx:2,fill:'#FFEE80',opacity:'.5'}));

  // Void deck + entrance light
  tl.appendChild(mk('rect',{x:200,y:308,width:280,height:37,fill:'#141E2E'}));
  tl.appendChild(mk('ellipse',{cx:340,cy:322,rx:60,ry:18,fill:'#FFE88A',opacity:'.12'}));
  [220,294,368,436].forEach(px=>tl.appendChild(mk('rect',{x:px,y:300,width:10,height:45,rx:2,fill:'#111820'})));

  // Block number
  tl.appendChild(mk('rect',{x:208,y:58,width:140,height:34,rx:4,fill:'#0A1828'}));
  tl.appendChild(mktxt(`Blk ${state.address.block}`,{x:278,y:80,'font-family':'Nunito,sans-serif','font-size':'17','font-weight':'900',fill:'#FFD54F','text-anchor':'middle'}));

  // Scooter parked in front of block
  const parkG=mk('g',{transform:'translate(140,335)',id:'park-scoot'});tl.appendChild(parkG);

  tl.appendChild(titleTxt);tl.appendChild(subTxt);

  const stripG=mk('g',{opacity:'0',id:'recap-strip'});
  stripG.appendChild(mk('rect',{x:60,y:380,width:560,height:42,rx:10,fill:'rgba(255,255,255,.1)'}));
  stripG.appendChild(mk('rect',{x:60,y:380,width:560,height:42,rx:10,fill:'none',stroke:'rgba(255,255,255,.2)','stroke-width':'1.5'}));
  const a=state.address;
  stripG.appendChild(mktxt(`${a.street}  ·  Blk ${a.block}  ·  ${a.unitFull}`,{x:340,y:407,'font-family':'Nunito,sans-serif','font-size':'13','font-weight':'800',fill:'#FFF','text-anchor':'middle',opacity:'.9'}));
  tl.appendChild(stripG);

  // 3-phase animation:
  // 0→0.25: scooter rides in from left
  // 0.25→0.55: box drops/appears, unit window pulses
  // 0.55→1.0: checkmark pops in, title slides up, address strip fades in
  // Total: 4.5s — nice and slow
  animate(4500,p=>{
    // Phase 1: scooter enters
    if(p<0.3){
      const ep=easeOutCubic(p/0.3);
      const sx=lerp(-120,140,ep);
      document.getElementById('park-scoot')?.setAttribute('transform',`translate(${sx},335)`);
    } else {
      document.getElementById('park-scoot')?.setAttribute('transform','translate(140,335)');
    }
    // Phase 2: box appears with a drop
    if(p>0.28 && p<0.55){
      const bp=easeOutBack((p-0.28)/0.27);
      const boxOp=Math.min((p-0.28)/0.08,1);
      ['del-box','del-box-line','del-box-line2','del-emoji'].forEach(id=>{

      document.getElementById('del-box-line')?.setAttribute('y2',(329+dropY).toFixed(1));
      document.getElementById('del-box-line2')?.setAttribute('y1',(312+dropY).toFixed(1));
      document.getElementById('del-box-line2')?.setAttribute('y2',(346+dropY).toFixed(1));
      document.getElementById('del-emoji')?.setAttribute('y',(336+dropY).toFixed(1));
    }
    // Phase 3: checkmark, title, strip
    if(p>0.52){
      const cp=easeOutBack(Math.min((p-0.52)/0.22,1));
      const checkEl=document.getElementById('check-g');
      if(checkEl){checkEl.setAttribute('opacity',Math.min((p-0.52)/0.1,1).toFixed(2));checkEl.setAttribute('transform',`translate(500,190) scale(${cp})`);if(cp>0.01)checkEl.setAttribute('transform',`translate(500,190) scale(${cp})`);}
    }
    if(p>0.62){
      const tp=easeOutCubic(Math.min((p-0.62)/0.25,1));
      const titleY=lerp(420,400,tp);
      const titleEl=document.getElementById('del-title');
      if(titleEl){titleEl.setAttribute('y',titleY.toFixed(1));titleEl.setAttribute('opacity',tp.toFixed(2));}
    }
    if(p>0.72){
      const sp2=easeOutCubic(Math.min((p-0.72)/0.2,1));
      const subEl=document.getElementById('del-sub');
      if(subEl){subEl.setAttribute('y',(415+lerp(10,0,sp2)).toFixed(1));subEl.setAttribute('opacity',sp2.toFixed(2));}
    }
    if(p>0.78){
      const rp=Math.min((p-0.78)/0.2,1);
      document.getElementById('recap-strip')?.setAttribute('opacity',rp.toFixed(2));
    }
  },()=>{
    showConfetti(50);
    setTimeout(()=>{hideTrans();onDone();},900);
  });
}

function runTransition(fromStage,toStage,onDone){
  if(fromStage===1&&toStage===2)transStreetToBlock(onDone);
  else if(fromStage===2&&toStage===3)transBlockToLift(onDone);
  else if(fromStage===3&&toStage===4)transLiftToCorridor(onDone);
  else onDone();
}

  beh.appendChild(mk('rect',{x:290,y:46,width:100,height:18,rx:4,fill:'#FFFEF0',opacity:'.95'}));
  ov.appendChild(beh);
  ov.appendChild(mk('polygon',{points:'0,0 130,0 130,430 0,430',fill:'#B0A485'}));
  ov.appendChild(mk('polygon',{points:'680,0 550,0 550,430 680,430',fill:'#B0A485'}));
  ov.appendChild(mk('rect',{x:0,y:0,width:680,height:38,fill:'#A09278'}));
  ov.appendChild(mk('rect',{x:180,y:7,width:320,height:18,rx:4,fill:'#FFFEF0',opacity:'.96'}));
  ov.appendChild(mk('rect',{x:0,y:400,width:680,height:30,fill:'#7A6A50'}));
  ov.appendChild(mk('rect',{x:126,y:34,width:428,height:360,rx:4,fill:'none',stroke:'#7A6A58','stroke-width':'8'}));
  const dL=mk('rect',{x:133,y:38,width:207,height:352,rx:1,fill:'#A8B8C4',id:'door-left'});
  const dR=mk('rect',{x:340,y:38,width:207,height:352,rx:1,fill:'#A8B8C4',id:'door-right'});
  const dlg=mk('g',{id:'door-lines'});
  for(let y=90;y<385;y+=44){dlg.appendChild(mk('line',{x1:136,y1:y,x2:338,y2:y,stroke:'#8898A6','stroke-width':'0.7',opacity:'.5',id:`dll-${y}`}));dlg.appendChild(mk('line',{x1:342,y1:y,x2:544,y2:y,stroke:'#8898A6','stroke-width':'0.7',opacity:'.5',id:`dlr-${y}`}));}
  ov.appendChild(dL);ov.appendChild(dR);ov.appendChild(dlg);
  ov.appendChild(mk('rect',{x:334,y:38,width:12,height:352,fill:'#5A6A76',id:'door-gap'}));
  ov.appendChild(mk('rect',{x:338,y:38,width:4,height:352,fill:'#3A4A56',id:'door-seal'}));
  ov.appendChild(mk('rect',{x:306,y:200,width:24,height:6,rx:3,fill:'#CDD5DB',id:'handle-l'}));
  ov.appendChild(mk('rect',{x:350,y:200,width:24,height:6,rx:3,fill:'#CDD5DB',id:'handle-r'}));
  const px=558,py=44,pw=108,ph=340;
  ov.appendChild(mk('rect',{x:px,y:py,width:pw,height:ph,rx:8,fill:'#ADA086',stroke:'#857862','stroke-width':'2.5'}));
  ov.appendChild(mk('rect',{x:px+5,y:py+5,width:pw-10,height:ph-10,rx:5,fill:'#A09478'}));
  const ddx=px+10,ddy=py+12,ddw=pw-20,ddh=50;
  ov.appendChild(mk('rect',{x:ddx,y:ddy,width:ddw,height:ddh,rx:5,fill:'#080808'}));
  const dispTxt=mktxt('',{x:ddx+ddw/2,y:ddy+ddh-9,'font-family':'Courier New,monospace','font-size':'28','font-weight':'900',fill:'#00FF88','text-anchor':'middle',id:'lift-disp'});
  ov.appendChild(dispTxt);
  const gridTop=py+76,gridH=180,rowSpacing=gridH/3,colX=[px+30,px+79],btnR=18;
  [[1,0,0],[2,1,0],[3,0,1],[4,1,1],[5,0,2],[6,1,2]].forEach(([f,col,row])=>{
    const cx=colX[col],cy=gridTop+gridH-btnR-row*rowSpacing;
    const g=mk('g',{style:'cursor:pointer'});
    g.appendChild(mk('circle',{cx,cy,r:btnR+3,fill:'#8A7A62'}));
    g.appendChild(mk('circle',{cx,cy,r:btnR,fill:'#D8CEB8',stroke:'#9A8A70','stroke-width':'1.5',id:`lft-btn-${f}`}));
    g.appendChild(mktxt(String(f),{x:cx,y:cy+6,'font-family':'Nunito,sans-serif','font-size':'16','font-weight':'900',fill:'#2A2A2A','text-anchor':'middle',style:'pointer-events:none',id:`lft-txt-${f}`}));
    g.addEventListener('click',()=>handleLiftClick(f,targetFloor,dispTxt));
    ov.appendChild(g);
  });
  const ctrlY=py+ph-52;
  [[px+22,'◄►','#6A8A6A'],[px+pw/2,'🔔','#C62828'],[px+pw-22,'►◄','#8A6A6A']].forEach(([cx,lbl,fill])=>{
    ov.appendChild(mk('circle',{cx,cy:ctrlY,r:16,fill}));
    ov.appendChild(mktxt(lbl,{x:cx,y:ctrlY+5,'font-family':'Nunito,sans-serif','font-size':'10','text-anchor':'middle',style:'pointer-events:none',fill:'#DDD'}));

}

function handleLiftClick(f,targetFloor,dispTxt){
  if(state.liftBusy)return;
  const circle=document.getElementById(`lft-btn-${f}`),label=document.getElementById(`lft-txt-${f}`);
  if(f===targetFloor){
    circle.setAttribute('fill','#FFD54F');circle.setAttribute('stroke','#C8A000');
    state.liftBusy=true;liftAnimating=true;
    animateLiftRide(1,targetFloor,dispTxt,()=>{animateDoorsOpen(()=>{liftAnimating=false;showConfetti();setTimeout(()=>showStageFeedback(),700);});});
  } else {
    state.wrongAttempts++;circle.setAttribute('fill','#F44336');circle.setAttribute('stroke','#C62828');
    if(label)label.setAttribute('fill','#FFF');
    setTimeout(()=>{circle.setAttribute('fill','#D8CEB8');circle.setAttribute('stroke','#9A8A70');if(label)label.setAttribute('fill','#2A2A2A');},500);
    if(state.wrongAttempts>=1){const hc=document.getElementById(`lft-btn-${targetFloor}`);if(hc){hc.setAttribute('stroke','#FF9800');hc.setAttribute('stroke-width','3');hc.setAttribute('fill','#FFF3E0');}}
  }
}
function animateLiftRide(from,to,dispEl,onDone){
  // Slow: 600ms per floor
  let cur=from;
  function step(){if(!liftAnimating)return;dispEl.textContent=String(cur);if(cur>=to){setTimeout(()=>{dispEl.setAttribute('fill','#FFD54F');onDone();},500);return;}cur++;setTimeout(step,600);}
  step();
}
function animateDoorsOpen(onDone){
  const dL=document.getElementById('door-left'),dR=document.getElementById('door-right');
  const gap=document.getElementById('door-gap'),seal=document.getElementById('door-seal');
  const hl=document.getElementById('handle-l'),hr=document.getElementById('handle-r');
  if(!dL||!dR){onDone();return;}
  // Slow: 1.8s to open
  animate(1800,p=>{
    const ease=easeInOutCubic(p);
    const slide=207*ease;
    dL.setAttribute('x',(133-slide).toFixed(1));
    dR.setAttribute('x',(340+slide).toFixed(1));
    if(p>0.2){
      const op=Math.max(0,1-(p-0.2)/0.3);
      gap.setAttribute('opacity',op.toFixed(2));seal.setAttribute('opacity',op.toFixed(2));
      if(hl)hl.setAttribute('opacity',op.toFixed(2));if(hr)hr.setAttribute('opacity',op.toFixed(2));
    }
    for(let y=90;y<385;y+=44){
      const ll=document.getElementById(`dll-${y}`),lr=document.getElementById(`dlr-${y}`);
      if(ll){ll.setAttribute('x1',(136-slide).toFixed(1));ll.setAttribute('x2',(338-slide).toFixed(1));}
      if(lr){lr.setAttribute('x1',(342+slide).toFixed(1));lr.setAttribute('x2',(544+slide).toFixed(1));}
    }
  },onDone);
}

// ══════════════════════════════════════════════════════
// STAGE 4: CORRIDOR
// ══════════════════════════════════════════════════════
const GATE_W=96,GATE_H=192,FLOOR_Y=355,DOOR_CENTRES=[170,340,510];
function drawGate(ov,cx,floorY,gateW,gateH,u){
  const gx=cx-gateW/2,gy=floorY-gateH,gC='#D4C09A';
  ov.appendChild(mk('rect',{x:gx,y:gy,width:gateW,height:gateH,fill:'#7A4A20'}));
  for(let y2=gy+4;y2<floorY;y2+=5)ov.appendChild(mk('line',{x1:gx+2,y1:y2,x2:gx+gateW-2,y2:y2,stroke:'#8A5528','stroke-width':'0.5',opacity:'.3'}));
  ov.appendChild(mk('rect',{x:gx+8,y:gy+10,width:gateW-16,height:gateH*0.34,rx:2,fill:'#622808',opacity:'.55'}));
  ov.appendChild(mk('rect',{x:gx+8,y:gy+gateH*0.4,width:gateW-16,height:gateH*0.48,rx:2,fill:'#622808',opacity:'.55'}));
  ov.appendChild(mk('rect',{x:gx,y:gy,width:gateW,height:gateH,rx:3,fill:'none',stroke:gC,'stroke-width':'5.5',id:`gate-frame-${u}`}));
  ov.appendChild(mk('rect',{x:gx,y:gy,width:18,height:gateH,rx:2,fill:gC}));
  ov.appendChild(mk('rect',{x:gx,y:gy,width:gateW,height:8,rx:2,fill:gC}));
  ov.appendChild(mk('rect',{x:gx,y:floorY-12,width:gateW,height:12,rx:2,fill:gC}));
  const bs=gy+10,be=floorY-12,ba=be-bs;
  for(let b=0;b<15;b++){const by2=bs+4+(b*(ba-8)/15);ov.appendChild(mk('rect',{x:gx+18,y:by2,width:gateW-18,height:3.5,rx:1.5,fill:gC}));}
  const lkX=gx+3,lkY=gy+gateH*0.42;
  ov.appendChild(mk('rect',{x:lkX,y:lkY,width:13,height:22,rx:3,fill:'#181818'}));
  ov.appendChild(mk('rect',{x:lkX+2,y:lkY+2,width:9,height:11,rx:1,fill:'#252525'}));
  for(let r=0;r<2;r++)for(let c=0;c<3;c++)ov.appendChild(mk('circle',{cx:lkX+4+c*3,cy:lkY+16+r*3,r:1,fill:'#666'}));
}
function drawMat(ov,cx,floorY,gateW){
  const mW=gateW+8,mH=22,mX=cx-mW/2,mY=floorY-8;
  ov.appendChild(mk('rect',{x:mX,y:mY,width:mW,height:mH,rx:4,fill:'#1E2D4A'}));
  ov.appendChild(mk('rect',{x:mX+3,y:mY+3,width:mW-6,height:mH-6,rx:2,fill:'none',stroke:'#C8A840','stroke-width':'1.5'}));
  for(let mx=mX+9;mx<mX+mW-6;mx+=7)ov.appendChild(mk('rect',{x:mx,y:mY+7,width:3,height:mH-14,rx:1,fill:'#B89030',opacity:'.35'}));
}
function drawShoeCabinet(ov,rx,floorY){
  const cW=38,cH=72,cX=rx-cW,cY=floorY-cH;
  ov.appendChild(mk('rect',{x:cX,y:cY,width:cW,height:cH,rx:3,fill:'#C0A880',stroke:'#A08860','stroke-width':'1.5'}));
  ov.appendChild(mk('rect',{x:cX-2,y:cY-5,width:cW+4,height:6,rx:2,fill:'#B09870'}));
  ov.appendChild(mk('line',{x1:cX,y1:cY+cH/2,x2:cX+cW,y2:cY+cH/2,stroke:'#A08860','stroke-width':'1'}));
  ov.appendChild(mk('circle',{cx:cX+cW-7,cy:cY+cH/4,r:3,fill:'#807060'}));
  ov.appendChild(mk('circle',{cx:cX+cW-7,cy:cY+cH*3/4,r:3,fill:'#807060'}));
  ov.appendChild(mk('rect',{x:cX+6,y:cY-16,width:10,height:11,rx:2,fill:'#90B890',opacity:'.85'}));
  ov.appendChild(mk('rect',{x:cX+20,y:cY-14,width:8,height:9,rx:1,fill:'#C8A0A0',opacity:'.85'}));
}
function drawPlant(ov,lx,floorY){
  const pCx=lx+16,potTop=floorY-8;
  ov.appendChild(mk('rect',{x:pCx-15,y:potTop-26,width:30,height:26,rx:4,fill:'#D0C4B0',stroke:'#B0A898','stroke-width':'1.5'}));

  ov.appendChild(mk('line',{x1:pCx,y1:potTop-26,x2:pCx+5,y2:potTop-54,stroke:'#3A6818','stroke-width':'2.5'}));
  ov.appendChild(mk('line',{x1:pCx,y1:potTop-32,x2:pCx,y2:potTop-62,stroke:'#488020','stroke-width':'2'}));
  ov.appendChild(mk('ellipse',{cx:pCx-13,cy:potTop-57,rx:16,ry:10,fill:'#286018',transform:`rotate(-25,${pCx-13},${potTop-57})`}));
  ov.appendChild(mk('ellipse',{cx:pCx+12,cy:potTop-60,rx:15,ry:10,fill:'#347820',transform:`rotate(25,${pCx+12},${potTop-60})`}));
  ov.appendChild(mk('ellipse',{cx:pCx,cy:potTop-68,rx:14,ry:9,fill:'#2A7018'}));
}
function buildCorridorScene(){
  const a=state.address,cu=a.unit;
  const wrongs=unitUnits.filter(u=>u!==cu).sort(()=>Math.random()-.5).slice(0,2);
  const picks=[cu,...wrongs].sort(()=>Math.random()-.5);
  const layer=document.getElementById('signs-layer');layer.innerHTML='';
  const ov=mk('g',{});
  ov.appendChild(mk('rect',{x:0,y:0,width:680,height:430,fill:'#E0D8C8'}));
  ov.appendChild(mk('rect',{x:0,y:0,width:680,height:18,fill:'#C8C0B0'}));
  ov.appendChild(mk('line',{x1:0,y1:18,x2:680,y2:18,stroke:'#B0A898','stroke-width':'1.5'}));
  DOOR_CENTRES.forEach(cx=>{ov.appendChild(mk('rect',{x:cx-30,y:3,width:60,height:12,rx:3,fill:'#FFFEF0',opacity:'.95'}));});
  ov.appendChild(mk('rect',{x:0,y:FLOOR_Y,width:680,height:430-FLOOR_Y,fill:'#9A9288'}));
  for(let tx=0;tx<680;tx+=34)for(let ty=FLOOR_Y;ty<430;ty+=34)ov.appendChild(mk('rect',{x:tx,y:ty,width:33,height:33,fill:'#928880',stroke:'#857D75','stroke-width':'0.6'}));
  ov.appendChild(mk('line',{x1:0,y1:FLOOR_Y,x2:680,y2:FLOOR_Y,stroke:'#7A7068','stroke-width':'2'}));
  [255,425].forEach(x=>ov.appendChild(mk('line',{x1:x,y1:18,x2:x,y2:FLOOR_Y,stroke:'#C8C0B0','stroke-width':'1.5'})));
  picks.forEach((u,i)=>{
    const cx=DOOR_CENTRES[i],gx=cx-GATE_W/2;
    const unitLabel=`#${String(a.floor).padStart(2,'0')}-${u}`;
    const badgeW=GATE_W+10,badgeH=36,badgeX=cx-badgeW/2,badgeY=FLOOR_Y-GATE_H-badgeH-10;
    ov.appendChild(mk('rect',{x:badgeX,y:badgeY,width:badgeW,height:badgeH,rx:7,fill:'#1A3A5C',id:`num-badge-${u}`}));
    ov.appendChild(mktxt(unitLabel,{x:cx,y:badgeY+25,'font-family':'Nunito,sans-serif','font-size':'18','font-weight':'900',fill:'#FFD54F','text-anchor':'middle',style:'pointer-events:none'}));
    drawGate(ov,cx,FLOOR_Y,GATE_W,GATE_H,u);
    drawMat(ov,cx,FLOOR_Y,GATE_W);
    if(i===0)drawShoeCabinet(ov,gx-6,FLOOR_Y);
    if(i===2)drawPlant(ov,gx+GATE_W+6,FLOOR_Y);
    const hit=mk('rect',{x:badgeX,y:badgeY,width:badgeW,height:430-badgeY,fill:'transparent',style:'cursor:pointer'});
    hit.addEventListener('click',()=>handleDoorClick(u,cu));
    ov.appendChild(hit);
  });
  layer.appendChild(ov);
}
function handleDoorClick(u,cu){
  const frame=document.getElementById(`gate-frame-${u}`),badge=document.getElementById(`num-badge-${u}`);
  if(u===cu){
    if(frame){frame.setAttribute('stroke','#4CAF50');frame.setAttribute('stroke-width','7');}
    if(badge)badge.setAttribute('fill','#2E7D32');
    showConfetti();setTimeout(()=>showStageFeedback(),500);
  } else {
    state.wrongAttempts++;
    if(frame){frame.setAttribute('stroke','#F44336');frame.setAttribute('stroke-width','7');}
    setTimeout(()=>{if(frame){frame.setAttribute('stroke','#D4C09A');frame.setAttribute('stroke-width','5.5');}},500);
    if(state.wrongAttempts>=1){
      const cf=document.getElementById(`gate-frame-${cu}`),cb=document.getElementById(`num-badge-${cu}`);
      if(cf){cf.setAttribute('stroke','#FF9800');cf.setAttribute('stroke-width','7');}
      if(cb)cb.setAttribute('fill','#E65100');
    }
  }
}

// ══════════════════════════════════════════════════════
// FEEDBACK & FLOW
// ══════════════════════════════════════════════════════
function showStageFeedback(){
  const msgs=[
    ['🗺️','Right street!','Great job! Hop on — heading to the block!'],
    ['🏢','Correct block!','Let\'s go in and take the lift!'],
    ['🛗','Right floor!','The doors are opening...'],
    ['🚪','Delivered!','You found the right unit! Food delivered! 🎉']
  ];
  const m=msgs[state.stage-1];
  document.getElementById('fb-emoji').textContent=m[0];
  document.getElementById('fb-title').textContent=m[1];
  document.getElementById('fb-sub').textContent=m[2];
  document.getElementById('fb-btn').textContent=state.stage===4?'Woohoo! 🎉':'Next stop! 🛵';
  document.getElementById('fb-wrap').classList.add('show');
}

function closeFeedback(){
  document.getElementById('fb-wrap').classList.remove('show');
  const fromStage=state.stage;
  state.stage++;state.wrongAttempts=0;
  if(fromStage===4){transDelivered(()=>showRoundComplete());return;}
  updateProgress();renderAddressCard();
  runTransition(fromStage,state.stage,()=>loadStage());
}

function showRoundComplete(){
  const i=state.round-1;
  document.getElementById('rc-emoji').textContent=['⭐','🌟','✨'][i]||'⭐';
  document.getElementById('rc-title').textContent=['Round complete!','Awesome!','Well done!'][i]||'Round complete!';
  document.getElementById('rc-sub').textContent=[
    `You delivered the food! Round ${state.round} of ${state.totalRounds} done!`,
    'Perfect delivery! Keep it up!',
    'You know your Singapore addresses!'
  ][i]||'';
  document.getElementById('rc-wrap').style.display='flex';
  showConfetti(60);
}

function nextRound(){
  document.getElementById('rc-wrap').style.display='none';
  state.round++;
  if(state.round>state.totalRounds){showGameOver();return;}
  state.stage=1;state.wrongAttempts=0;state.address=generateAddress();
  updateProgress();renderAddressCard();
  transNewRound(()=>loadStage());
}

function showGameOver(){
  document.getElementById('go-sub').textContent=`You completed all ${state.totalRounds} rounds! You are a delivery expert and know all the parts of a Singapore address! 🎖️`;
  document.getElementById('go-wrap').style.display='flex';showConfetti(100);
}
function restartGame(){
  document.getElementById('go-wrap').style.display='none';
  state={round:1,stage:1,totalRounds:3,address:null,wrongAttempts:0,liftBusy:false};startGame();
}
function loadStage(){
  if(state.stage===1)buildStreetScene();
  else if(state.stage===2)buildBlockScene();
  else if(state.stage===3)buildLiftScene();
  else if(state.stage===4)buildCorridorScene();
}
function showConfetti(n=44){
  const cols=['#FFD54F','#4CAF50','#2196F3','#E91E63','#FF5722','#9C27B0','#00BCD4'];
  for(let i=0;i<n;i++){setTimeout(()=>{const el=document.createElement('div');el.className='confetti-p';const s=6+Math.random()*10;el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${s}px;height:${s}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.8+Math.random()*2.5}s;animation-delay:${Math.random()*.5}s;`;document.body.appendChild(el);setTimeout(()=>el.remove(),4000);},i*20);}
}
function startGame(){state.address=generateAddress();updateProgress();renderAddressCard();loadStage();}
startGame();
</script>
