<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toy Sale</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --shelf-wood: #8d6e63;
            --bg-color: #f7f9fc;
            --text-dark: #2d3436;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.5s ease;
        }

        .hidden { display: none !important; }

        /* --- Start Screen --- */
        #start-screen {
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
            text-align: center;
        }

        h1 { font-size: 3.5rem; color: #ff6b6b; margin-bottom: 1rem; text-shadow: 3px 3px 0px white; }

        .menu-card {
            background: white;
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }

        .option-group { margin-bottom: 1.5rem; }
        .option-group p { font-weight: 600; margin-bottom: 0.5rem; }

        .toggle-btns { display: flex; gap: 10px; justify-content: center; }

        .btn-choice {
            padding: 10px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-choice.active {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        #start-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 4px 0 #ee5253;
            transition: transform 0.1s;
            margin-top: 10px;
        }

        /* --- Main Game Layout --- */
        #game-screen {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr auto;
            gap: 20px;
            padding: 20px;
            background: #e0f7fa;
        }

        .toy-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
        }

        #current-toy-emoji { font-size: 8rem; margin: 0; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* ICONIC PRICE TAG SHAPE */
        .price-tag {
            background: #ff4757;
            color: white;
            padding: 15px 25px 15px 45px;
            font-weight: 800;
            font-size: 2.2rem;
            position: relative;
            /* Creates the pointed left side */
            clip-path: polygon(20% 0%, 100% 0%, 100% 100%, 20% 100%, 0% 50%);
            border-radius: 0 8px 8px 0;
            margin-top: 20px;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1));
        }

        /* The hole in the price tag */
        .price-tag::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #e0f7fa; /* Matches display background */
            border-radius: 50%;
        }

        /* Right side: The Shelf */
        .shelf-container {
            background: var(--shelf-wood);
            border: 10px solid #5d4037;
            border-radius: 10px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            align-content: start;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.3);
        }

        .shelf-slot {
            aspect-ratio: 1;
            background: rgba(0,0,0,0.2);
            border-bottom: 4px solid rgba(255,255,255,0.1);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        /* Bottom: Money options */
        .money-bar {
            grid-column: 1 / span 2;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .money-option {
            height: 100px;
            cursor: pointer;
            transition: transform 0.2s;
            object-fit: contain;
            border-radius: 10px;
            padding: 5px;
        }

        .money-option:hover { transform: scale(1.05); }
        .money-option:active { transform: scale(0.95); filter: brightness(0.8); }

        /* --- End Screen --- */
        #end-screen { background: var(--accent); }
        .celebration-emoji { font-size: 5rem; animation: bounce 1s infinite; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        @media (max-width: 768px) {
            #game-screen { grid-template-columns: 1fr; grid-template-rows: 1.5fr 1fr 1fr; }
            .shelf-container { grid-column: 1; }
            .money-bar { grid-column: 1; height: 120px; }
            .money-option { height: 80px; }
            #current-toy-emoji { font-size: 5rem; }
        }

        #preloader {
            position: fixed; z-index: 9999; background: white;
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .loader-bar { width: 200px; height: 10px; background: #eee; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="preloader">
        <p>Stocking the shelves...</p>
        <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
    </div>

    <div id="start-screen" class="screen">
        <h1>Toy Sale</h1>
        <div class="menu-card">
            <div class="option-group">
                <p>How many toys to buy?</p>
                <div class="toggle-btns" id="question-count-btns">
                    <button class="btn-choice active" data-val="5">5</button>
                    <button class="btn-choice" data-val="10">10</button>
                    <button class="btn-choice" data-val="15">15</button>
                </div>
            </div>
            <div class="option-group">
                <p>Difficulty</p>
                <div class="toggle-btns" id="difficulty-btns">
                    <button class="btn-choice active" data-val="easy">Easy</button>
                    <button class="btn-choice" data-val="hard">Hard</button>
                </div>
            </div>
            <button id="start-btn">PLAY</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="toy-display">
            <div id="current-toy-emoji">🧸</div>
            <div class="price-tag" id="price-display">$1</div>
        </div>

        <div class="shelf-container" id="toy-shelf"></div>

        <div class="money-bar" id="money-options"></div>
    </div>

    <div id="end-screen" class="screen hidden">
        <div class="celebration-emoji">🎉🧸🎈</div>
        <h2 style="font-size: 3rem;">Awesome Job!</h2>
        <p>You filled the whole shelf!</p>
        <button id="restart-btn" class="btn-choice active" style="padding: 15px 40px; font-size: 1.2rem; margin-top: 20px;">Play Again</button>
    </div>

    <script>
        const currency = [
            { id: '1d', label: '$1', val: 100, img: 'https://i.postimg.cc/Jnj2qxhL/1-dollar.png', num: 1 },
            { id: '2d', label: '$2', val: 200, img: 'https://i.postimg.cc/MT1FD5Gk/2-dollars.png', num: 2 },
            { id: '5d', label: '$5', val: 500, img: 'https://i.postimg.cc/XJ9z8Lv0/5-dollars.png', num: 5 },
            { id: '10d', label: '$10', val: 1000, img: 'https://i.postimg.cc/bJ1BTgvp/10-dollars.png', num: 10 },
            { id: '5c', label: '5¢', val: 5, img: 'https://i.postimg.cc/k4Wpcs5P/5-cents.png', num: 5 },
            { id: '10c', label: '10¢', val: 10, img: 'https://i.postimg.cc/tTFM5kgy/10-cents.png', num: 10 },
            { id: '20c', label: '20¢', val: 20, img: 'https://i.postimg.cc/bJ1BTgvq/20-cents.png', num: 20 },
            { id: '50c', label: '50¢', val: 50, img: 'https://i.postimg.cc/FR0BZpK9/50-cents.png', num: 50 }
        ];

        const toys = ['🧸', '🚀', '🎨', '🧩', '🦖', '🤖', '🚲', '⚽', '🎸', '🛹', '🍦', '🏎️', '🦄', '🎮', '🪁'];
        let config = { questions: 5, difficulty: 'easy' };
        let currentQuestionIndex = 0;
        let correctAnswer = null;

        const preloadAssets = () => {
            let loaded = 0;
            currency.forEach(c => {
                const img = new Image();
                img.src = c.img;
                img.onload = () => {
                    loaded++;
                    document.getElementById('progress').style.width = (loaded / currency.length * 100) + '%';
                    if(loaded === currency.length) setTimeout(() => document.getElementById('preloader').classList.add('hidden'), 500);
                };
            });
        };

        const playSuccessSound = () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.2);
        };

        const initGame = () => {
            currentQuestionIndex = 0;
            const shelf = document.getElementById('toy-shelf');
            shelf.innerHTML = '';
            for(let i=0; i < config.questions; i++) {
                const slot = document.createElement('div');
                slot.className = 'shelf-slot';
                slot.id = `slot-${i}`;
                shelf.appendChild(slot);
            }
            nextQuestion();
        };

        const nextQuestion = () => {
            if(currentQuestionIndex >= config.questions) {
                showScreen('end-screen');
                return;
            }
            const toy = toys[Math.floor(Math.random() * toys.length)];
            correctAnswer = currency[Math.floor(Math.random() * currency.length)];
            document.getElementById('current-toy-emoji').innerText = toy;
            document.getElementById('current-toy-emoji').style.transform = "scale(1)";
            document.getElementById('price-display').innerText = correctAnswer.label;
            generateOptions();
        };

        const generateOptions = () => {
            let options = [correctAnswer];
            if (config.difficulty === 'hard' && Math.random() < 0.8) {
                const distractor = currency.find(c => c.num === correctAnswer.num && c.id !== correctAnswer.id);
                if (distractor) options.push(distractor);
            }
            while(options.length < 4) {
                const rand = currency[Math.floor(Math.random() * currency.length)];
                if(!options.find(o => o.id === rand.id)) options.push(rand);
            }
            options.sort(() => Math.random() - 0.5);

            const container = document.getElementById('money-options');
            container.innerHTML = '';
            options.forEach(opt => {
                const img = document.createElement('img');
                img.src = opt.img;
                img.className = 'money-option';
                img.onclick = () => {
                    if(opt.id === correctAnswer.id) {
                        playSuccessSound();
                        moveToShelf();
                    } else {
                        const toy = document.getElementById('current-toy-emoji');
                        toy.style.animation = 'shake 0.3s';
                        setTimeout(() => toy.style.animation = '', 300);
                    }
                };
                container.appendChild(img);
            });
        };

        const moveToShelf = () => {
            const toyEmoji = document.getElementById('current-toy-emoji').innerText;
            const slot = document.getElementById(`slot-${currentQuestionIndex}`);
            document.getElementById('current-toy-emoji').style.transform = "scale(0) translateY(-200px)";
            setTimeout(() => {
                slot.innerText = toyEmoji;
                currentQuestionIndex++;
                nextQuestion();
            }, 500);
        };

        const showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        document.getElementById('start-btn').addEventListener('click', () => { showScreen('game-screen'); initGame(); });
        document.getElementById('restart-btn').addEventListener('click', () => showScreen('start-screen'));
        document.querySelectorAll('.toggle-btns').forEach(group => {
            group.addEventListener('click', (e) => {
                if(e.target.tagName === 'BUTTON') {
                    group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    if(group.id === 'question-count-btns') config.questions = parseInt(e.target.dataset.val);
                    if(group.id === 'difficulty-btns') config.difficulty = e.target.dataset.val;
                }
            });
        });

        preloadAssets();
    </script>
</body>
</html>
