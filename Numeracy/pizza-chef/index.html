<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pizza Chef</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{
  height:100%;height:-webkit-fill-available;
}
body{
  margin:0;padding:0;
  min-height:100%;min-height:-webkit-fill-available;
  font-family:Nunito,sans-serif;
  background:linear-gradient(160deg,#fdf6ec 0%,#ede0cc 100%);
  overscroll-behavior:none;touch-action:none;
  display:flex;flex-direction:column;
}

/* ═══════════════════════════════════════
   START SCREEN
═══════════════════════════════════════ */
#startScreen{
  position:fixed;inset:0;
  background:linear-gradient(160deg,#fdf6ec 0%,#ede0cc 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:200;padding:24px;text-align:center;
}
#startScreen h1{font-size:clamp(2rem,6vw,3.2rem);color:#7b3f00;margin:0;line-height:1.1}
#startScreen .subtitle{font-size:clamp(14px,3vw,18px);color:#a0632a;font-weight:700;margin:0}
.pizza-icon{font-size:clamp(3rem,8vw,5rem);line-height:1}
#startScreen label{font-size:clamp(13px,2.5vw,17px);font-weight:800;color:#7b3f00;margin-bottom:4px;display:block}
.qty-btns{display:flex;gap:12px;justify-content:center}
.qty-btn{
  width:clamp(64px,14vw,90px);height:clamp(64px,14vw,90px);
  border-radius:20px;border:3px solid #e0c88a;
  background:linear-gradient(145deg,#fff8ef,#fff3e0);
  font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:#7b3f00;
  cursor:pointer;font-family:Nunito,sans-serif;transition:.2s;
  box-shadow:0 4px 12px rgba(180,120,0,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.qty-btn span{font-size:clamp(9px,2vw,12px);color:#a07030;font-weight:700}
.qty-btn:hover{transform:translateY(-4px) scale(1.06);box-shadow:0 8px 20px rgba(180,120,0,.25);border-color:#f59e0b}
.qty-btn:active{transform:scale(.97)}

/* divider between recipe mode and free play */
.mode-divider{
  display:flex;align-items:center;gap:10px;width:100%;max-width:340px;
  color:#b07d3a;font-size:12px;font-weight:800;letter-spacing:1.5px;opacity:.7;
}
.mode-divider::before,.mode-divider::after{content:"";flex:1;border-top:2px dashed #d4a96a}

/* free play button */
#freePlayBtn{
  padding:0 24px;
  width:clamp(160px,40vw,220px);height:clamp(64px,14vw,90px);
  border-radius:20px;border:3px solid #e0c88a;
  background:linear-gradient(145deg,#fff8ef,#fff3e0);
  font-size:clamp(1rem,3vw,1.3rem);font-weight:800;color:#7b3f00;
  cursor:pointer;font-family:Nunito,sans-serif;transition:.2s;
  box-shadow:0 4px 12px rgba(180,120,0,.15);
  display:flex;align-items:center;justify-content:center;gap:6px;
}
#freePlayBtn:hover{transform:translateY(-4px) scale(1.06);box-shadow:0 8px 20px rgba(180,120,0,.25);border-color:#f59e0b}
#freePlayBtn:active{transform:scale(.97)}

#startScreen .note{font-size:clamp(11px,2vw,13px);color:#b07d3a;opacity:.75;max-width:320px}

/* ═══════════════════════════════════════
   END SCREEN
═══════════════════════════════════════ */
#endScreen{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  display:none;align-items:center;justify-content:center;z-index:200;padding:16px;
}
#endBox{
  background:linear-gradient(145deg,#fff8ef,#fff3e0);
  border:4px solid #f59e0b;padding:clamp(24px,4vw,44px) clamp(24px,5vw,52px);
  border-radius:28px;text-align:center;max-width:420px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  animation: calmSlideUp 0.45s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}
#endBox .trophy{font-size:clamp(2.5rem,8vw,4rem)}
#endBox h1{margin:8px 0 6px;font-size:clamp(1.5rem,5vw,2.2rem);color:#7b3f00}
#endBox p{color:#a0632a;font-weight:700;margin:0 0 8px;font-size:clamp(13px,2.5vw,16px)}
#endBox .order-list{margin:0 0 20px;font-size:clamp(12px,2.2vw,14px);color:#7b3f00;font-weight:700;line-height:1.7}
#endBox button{
  padding:12px 28px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff;
  font-weight:800;font-size:clamp(14px,2.5vw,17px);cursor:pointer;
  font-family:Nunito,sans-serif;box-shadow:0 4px 14px rgba(245,124,0,.4);transition:.2s;
}
#endBox button:hover{transform:scale(1.05)}

/* ═══════════════════════════════════════
   GAME LAYOUT
═══════════════════════════════════════ */
#game{
  /* Fill the viewport reliably across all mobile browsers */
  flex:1 0 auto;
  height:100vh;height:-webkit-fill-available;
  display:grid;grid-template-rows:auto 1fr auto;
  overflow:hidden;
  /* Clamp to actual visible area so nothing is pushed off-screen */
  max-height:100vh;max-height:-webkit-fill-available;
}

/* ── RECIPE PANEL (top) ── */
#recipePanel{
  background:linear-gradient(135deg,#fff8f0,#ffecd6);
  border-bottom:3px dashed #e8c99a;
  padding:10px 14px 6px;position:relative;
}
/* label changes per mode */
#recipePanel::before{
  content:"📋 RECIPE CARD";
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  font-size:10px;font-weight:800;letter-spacing:2px;color:#b07d3a;opacity:.7;
}
#recipePanel.freeplay::before{content:"🎨 FREE PLAY"}
#orderBadge{
  position:absolute;top:8px;right:12px;
  font-size:11px;font-weight:800;color:#7b3f00;
  background:#fde68a;border-radius:20px;padding:2px 10px;border:2px solid #f59e0b;
}
#recipeName{margin:14px 0 6px;text-align:center;font-size:clamp(13px,3vw,21px);color:#7b3f00}
#recipeSteps{
  display:flex;justify-content:center;align-items:center;
  gap:4px;flex-wrap:nowrap;overflow-x:auto;
  padding-top:6px;padding-bottom:2px;scrollbar-width:none;
}
#recipeSteps::-webkit-scrollbar{display:none}
.step{
  background:#fffdf8;border:2.5px solid #e0c88a;border-radius:14px;
  padding:5px 6px;min-width:clamp(60px,13vw,105px);max-width:105px;
  flex-shrink:0;text-align:center;transition:.35s;
  font-size:clamp(10px,2.5vw,12px);color:#5a3a00;position:relative;
}
.step.done{border-color:#c8c8c8;background:#eee;opacity:.45;pointer-events:none}
.step.done::after{
  content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:900;color:#43a047;opacity:.9;
  background:rgba(255,255,255,.35);border-radius:12px;
}
.step.current{
  border-color:#f59e0b;background:#fffbeb;
  box-shadow:0 0 0 3px #fde68a,0 3px 12px rgba(245,158,11,.25);
  transform:translateY(-2px);
}
.step.future{opacity:.55}
.step img{display:block;margin:2px auto 0}
.arrow{font-size:16px;flex-shrink:0;color:#c8a060}
#msg{text-align:center;color:#c62828;font-weight:800;height:16px;font-size:12px;margin-top:3px}

/* ── PIZZA WORK AREA (middle) ── */
#workArea{
  display:flex;justify-content:center;align-items:center;
  min-height:0;background:linear-gradient(160deg,#f5ede0 0%,#e8d9c4 100%);position:relative;
}
#workArea::before{
  content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(180,140,80,.06) 18px,rgba(180,140,80,.06) 19px);
  pointer-events:none;
}
#pizzaZone{
  position:relative;width:min(500px,80vw);max-width:calc(100% - 20px);
  aspect-ratio:500/320;max-height:100%;flex-shrink:0;overflow:visible;touch-action:none;
}
#peel{position:absolute;width:100%;height:100%;object-fit:contain}
#pizza{position:absolute;left:25%;top:5%;width:50%;height:75%;object-fit:contain;transition:transform .15s}
.topping{position:absolute;width:min(36px,6vw);height:min(36px,6vw)}

/* ── HINT NOTE ── */
#hintNote{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:clamp(220px,60%,340px);
  background:linear-gradient(145deg,#fffdf4,#fff8e1);
  border:2.5px dashed #f59e0b;border-radius:18px;
  padding:14px 16px 12px;box-shadow:0 6px 24px rgba(0,0,0,.18);
  text-align:center;z-index:50;animation:noteIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes noteIn{
  from{transform:translate(-50%,-50%) scale(.7);opacity:0}
  to{transform:translate(-50%,-50%) scale(1);opacity:1}
}
#hintNote.hiding{animation:noteOut .25s ease-in forwards}
@keyframes noteOut{to{transform:translate(-50%,-50%) scale(.8);opacity:0}}
#hintNote p{margin:0 0 6px;font-size:clamp(11px,2.2vw,13px);color:#5a3a00;font-weight:700;line-height:1.5}
#hintNote .hint-arrow{font-size:1.1em}
#hintNote hr{border:none;border-top:1.5px dashed #f0d090;margin:8px 0}
#hintNote .close-hint{
  position:absolute;top:6px;right:8px;background:none;border:none;
  font-size:16px;cursor:pointer;color:#b07d3a;line-height:1;padding:2px 4px;font-family:Nunito,sans-serif;
}
#hintNote .close-hint:hover{color:#7b3f00}

/* ── INGREDIENTS BAR (bottom) ── */
#ingredientsBar{
  background:linear-gradient(135deg,#3d2000,#5c3200);
  border-top:3px solid #2a1500;
  padding:8px 10px 10px;
  /* Respect iPhone home indicator, ignored by browsers that don't support it */
  padding-bottom:max(10px,env(safe-area-inset-bottom,10px));
  display:flex;justify-content:center;align-items:center;
  gap:clamp(8px,2vw,28px);flex-shrink:0;position:relative;
}
#ingredientsBar::before{
  content:"INGREDIENTS";position:absolute;top:3px;left:50%;transform:translateX(-50%);
  font-size:9px;font-weight:800;letter-spacing:2.5px;color:rgba(255,220,150,.45);
}
.ing{
  width:clamp(52px,10vw,108px);cursor:grab;transition:.2s;user-select:none;
  margin-top:6px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));
  touch-action:none;-webkit-user-drag:none;
}
.ing:hover{transform:translateY(-6px) scale(1.08);filter:drop-shadow(0 8px 14px rgba(0,0,0,.5))}
.ing:active{cursor:grabbing}

/* ── DRAG GHOST ── */
.drag{
  position:fixed;width:72px;height:72px;pointer-events:none;
  transform:translate(-50%,-90%) scale(1.15);
  filter:drop-shadow(0 10px 12px rgba(0,0,0,.35));
  animation:pickup .12s ease-out;z-index:999;touch-action:none;
}
@keyframes pickup{
  from{transform:translate(-50%,-90%) scale(0.75);opacity:0}
  to{transform:translate(-50%,-90%) scale(1.15);opacity:1}
}

/* ── RECIPE MODE SUCCESS MODAL ── */
#modal{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;z-index:100;padding:16px;
}
#box{
  background:linear-gradient(145deg,#fff8ef,#fff3e0);
  border:4px solid #f59e0b;padding:36px 44px;border-radius:28px;
  text-align:center;min-width:280px;max-width:90vw;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  animation: calmSlideUp 0.45s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}
#box h1{margin:0 0 8px;font-size:clamp(1.6rem,5vw,2.4rem);color:#7b3f00}
#box p{color:#a0632a;font-weight:700;margin:0 0 20px}
#box .checklist{list-style:none;margin:0 0 20px;padding:0;text-align:left;display:inline-block}
#box .checklist li{font-size:clamp(13px,2.5vw,15px);font-weight:700;padding:3px 0;color:#7b3f00}
#box .checklist li.done{color:#aaa;text-decoration:line-through}
#box .checklist li.done .ck{color:#43a047}
#box .checklist .ck{margin-right:6px;font-size:1.1em}
#box button{
  padding:12px 28px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff;
  font-weight:800;font-size:17px;cursor:pointer;font-family:Nunito,sans-serif;
  box-shadow:0 4px 14px rgba(245,124,0,.4);transition:.2s;
}
#box button:hover{transform:scale(1.05)}

/* ── FREE PLAY MODAL ── */
#fpModal{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  display:none;align-items:center;justify-content:center;z-index:100;padding:16px;
  overflow-y:auto;
}
#fpBox{
  background:linear-gradient(145deg,#fff8ef,#fff3e0);
  border:4px solid #f59e0b;border-radius:28px;
  text-align:center;width:min(480px,94vw);
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  animation: calmSlideUp 0.45s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  position:relative;overflow:hidden;
  padding:24px 28px 28px;
}
#fpBox h1{margin:0 0 4px;font-size:clamp(1.4rem,4.5vw,2rem);color:#7b3f00}
#fpBox .fp-comment{
  font-size:clamp(13px,2.8vw,16px);color:#a0632a;font-weight:800;
  margin:0 0 14px;font-style:italic;
}
/* pizza snapshot */
#fpPizzaSnap{
  position:relative;
  width:min(220px,55vw);
  aspect-ratio:1;
  margin:0 auto 14px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid #f59e0b;
  box-shadow:0 6px 20px rgba(0,0,0,.2);
  background:#f5ede0;
}
#fpPizzaSnap img.snap-base{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
}
#fpPizzaSnap img.snap-top{
  position:absolute;width:28%;height:28%;object-fit:contain;
}
/* ingredient list in fp modal */
#fpIngList{
  font-size:clamp(11px,2.2vw,13px);color:#7b3f00;font-weight:700;
  margin:0 0 18px;line-height:1.8;
}
#fpBox .fp-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
#fpBox button{
  padding:11px 22px;border:none;border-radius:14px;
  font-weight:800;font-size:clamp(13px,2.5vw,16px);cursor:pointer;
  font-family:Nunito,sans-serif;transition:.2s;
}
#fpBox .btn-again{background:linear-gradient(135deg,#ff9800,#f57c00);color:#fff;box-shadow:0 4px 14px rgba(245,124,0,.4)}
#fpBox .btn-home{background:linear-gradient(135deg,#fff8ef,#ffe0b2);color:#7b3f00;border:2px solid #f59e0b}
#fpBox button:hover{transform:scale(1.05)}

/* ── CALMER MODAL ARRIVAL (Gentle Slide Up & Fade) ── */
@keyframes calmSlideUp {
  from {
    transform: translateY(30px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* ── FINISHED BUTTON ── */
#finishBtn{
  position:absolute;right:clamp(-60px,-8vw,-30px);top:15%;
  transform:translateY(-50%) scale(0);opacity:0;
  padding:12px 16px;border:none;border-radius:18px;
  background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;
  font-weight:800;font-size:clamp(13px,2vw,18px);font-family:Nunito,sans-serif;
  cursor:pointer;box-shadow:0 6px 20px rgba(46,125,50,.45);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  white-space:nowrap;z-index:10;
}
@media(max-width:600px){
  #finishBtn{right:auto;top:auto;bottom:-48px;left:50%;transform:translateX(-50%) scale(0);opacity:0}
  #finishBtn.visible{transform:translateX(-50%) scale(1);opacity:1}
}
#finishBtn.visible{transform:translateY(-50%) scale(1);opacity:1}
#finishBtn:hover{background:linear-gradient(135deg,#4caf50,#388e3c);box-shadow:0 8px 24px rgba(46,125,50,.55)}
@keyframes btnPulse{50%{box-shadow:0 6px 28px rgba(46,125,50,.7)}}
#finishBtn.visible{animation:btnPulse 1.4s ease-in-out infinite}

/* ── CALMER PIZZA CELEBRATION (Gentle Radiance Glow) ── */
/* ── LIGHT EMISSION GLOW (No Scale Change) ── */
@keyframes pizzaBacklight {
  0% {
    /* Multi-layered sharp to soft gold shadows for a dense, convincing light source */
    filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0))
            drop-shadow(0 0 12px rgba(245, 158, 11, 0))
            drop-shadow(0 0 30px rgba(245, 158, 11, 0));
  }
  50% {
    /* Intense but soft light emission at the peak */
    filter: drop-shadow(0 0 6px rgba(251, 191, 36, 0.9))
            drop-shadow(0 0 20px rgba(245, 158, 11, 0.7))
            drop-shadow(0 0 45px rgba(245, 158, 11, 0.4));
  }
  100% {
    /* Smooth fade back to standard state */
    filter: drop-shadow(0 0 4px rgba(251, 191, 36, 0))
            drop-shadow(0 0 12px rgba(245, 158, 11, 0))
            drop-shadow(0 0 30px rgba(245, 158, 11, 0));
  }
}

.pizza-celebrate {
  /* Keeps the pizza perfectly still (no transform/scale changes) */
  transform: none !important;
  animation: pizzaBacklight 1.4s ease-in-out;
}
  
@keyframes shake{25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-8px)}}
.shake{animation:shake .35s}
img{-webkit-user-drag:none;user-select:none}
</style>
</head>
<body>

<!-- ════════ START SCREEN ════════ -->
<div id="startScreen">
  <div class="pizza-icon">🍕</div>
  <h1>Pizza Chef</h1>
  <p class="subtitle">How many pizzas will you make today?</p>
  <div>
    <label>Recipe Mode — choose your order</label>
    <div class="qty-btns">
      <button class="qty-btn" onclick="startGame(1)">1<span>pizza</span></button>
      <button class="qty-btn" onclick="startGame(2)">2<span>pizzas</span></button>
      <button class="qty-btn" onclick="startGame(3)">3<span>pizzas</span></button>
    </div>
  </div>
  <div class="mode-divider">OR</div>
  <button id="freePlayBtn" onclick="startFreePlay()">🎨 Free Play</button>
  <p class="note">In Free Play, drag any ingredients you like — no rules!</p>
</div>

<!-- ════════ GAME ════════ -->
<div id="game" style="display:none">
  <div id="recipePanel">
    <div id="orderBadge"></div>
    <h2 id="recipeName"></h2>
    <div id="recipeSteps"></div>
    <div id="msg"></div>
  </div>
  <div id="workArea">
    <div id="pizzaZone">
      <img id="peel" src="assets/peel.png">
      <img id="pizza" src="assets/pizza_base.png">
      <button id="finishBtn" onclick="handleFinish()">🍕 Done!</button>
    </div>
  </div>
  <div id="ingredientsBar">
    <img class="ing" data-ing="sauce"     src="assets/container_sauce.png">
    <img class="ing" data-ing="cheese"    src="assets/container_cheese.png">
    <img class="ing" data-ing="pepperoni" src="assets/container_pepperoni.png">
    <img class="ing" data-ing="mushroom"  src="assets/container_mushroom.png">
    <img class="ing" data-ing="spinach"   src="assets/container_spinach.png">
  </div>
</div>

<!-- ════════ RECIPE MODE: PER-PIZZA MODAL ════════ -->
<div id="modal">
  <div id="box">
    <h1 id="modalTitle">🍕 Pizza Done!</h1>
    <p id="modalMsg"></p>
    <button id="modalBtn" onclick="nextPizza()">Next Pizza →</button>
  </div>
</div>

<!-- ════════ FREE PLAY: FINISH MODAL ════════ -->
<div id="fpModal">
  <div id="fpBox">
    <h1>🍕 Pizza Done!</h1>
    <p class="fp-comment" id="fpComment"></p>
    <div id="fpPizzaSnap"></div>
    <div id="fpIngList"></div>
    <div class="fp-btns">
      <button class="btn-again" onclick="startFreePlay()">Make Another</button>
      <button class="btn-home"  onclick="goToStart()">🏠 Home</button>
    </div>
  </div>
</div>

<!-- ════════ END SCREEN (recipe mode) ════════ -->
<div id="endScreen">
  <div id="endBox">
    <div class="trophy">🏆</div>
    <h1>All Done!</h1>
    <p id="endMsg"></p>
    <div class="order-list" id="endList"></div>
    <button onclick="goToStart()">🍕 Play Again</button>
  </div>
</div>

<script>
const recipes=[
  {name:"Pepperoni Classic",  steps:["sauce","cheese","pepperoni"]},
  {name:"Garden Pizza",        steps:["sauce","cheese","mushroom","spinach"]},
  {name:"Supreme Lite",        steps:["sauce","cheese","pepperoni","mushroom"]},
  {name:"Veggie Delight",      steps:["sauce","cheese","mushroom","spinach"]},
  {name:"House Special",       steps:["sauce","cheese","pepperoni","mushroom","spinach"]}
];
const dragSrc={
  sauce:"assets/container_sauce_drag.png",
  cheese:"assets/container_cheese_drag.png",
  pepperoni:"assets/pizza_topping_pepperoni.png",
  mushroom:"assets/pizza_topping_mushroom.png",
  spinach:"assets/pizza_topping_spinach.png"
};
const ingLabel={sauce:"Sauce",cheese:"Cheese",pepperoni:"Pepperoni",mushroom:"Mushroom",spinach:"Spinach"};

// Preload all game images so there is no fetch delay mid-game
[
  "assets/pizza_base.png","assets/pizza_base_sauce.png","assets/pizza_base_sauce_cheese.png",
  "assets/peel.png","assets/container_sauce_drag.png","assets/container_cheese_drag.png",
  "assets/pizza_topping_pepperoni.png","assets/pizza_topping_mushroom.png","assets/pizza_topping_spinach.png"
].forEach(src=>{const i=new Image();i.src=src;});

/* ── state ── */
let orderList=[],orderIndex=0;
let recipe,stepIndex,counts,drag=null;
let freeMode=false;
// free play ingredient tracking
let fpCounts={sauce:0,cheese:0,pepperoni:0,mushroom:0,spinach:0};
// store topping positions for snapshot
let fpToppingData=[];

const q=()=>Math.floor(Math.random()*4)+3;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)];}

/* ══════════════════════════════════════════
   START SCREEN
══════════════════════════════════════════ */
function startGame(n){
  freeMode=false;
  const pool=shuffle(recipes);
  orderList=pool.slice(0,n).map(r=>({
    ...JSON.parse(JSON.stringify(r)),qty:{pepperoni:q(),mushroom:q(),spinach:q()}
  }));
  orderIndex=0;
  document.getElementById("startScreen").style.display="none";
  document.getElementById("game").style.display="grid";
  document.getElementById("recipePanel").classList.remove("freeplay");
  loadOrder(true);
}

function startFreePlay(){
  freeMode=true;
  fpCounts={sauce:0,cheese:0,pepperoni:0,mushroom:0,spinach:0};
  fpToppingData=[];
  document.getElementById("startScreen").style.display="none";
  document.getElementById("fpModal").style.display="none";
  document.getElementById("game").style.display="grid";
  document.getElementById("recipePanel").classList.add("freeplay");
  document.getElementById("orderBadge").textContent="";
  document.getElementById("recipeName").textContent="Your Pizza";
  document.getElementById("recipeSteps").innerHTML="";
  document.getElementById("msg").textContent="";
  pizza.src="assets/pizza_base.png";
  pizza.classList.remove("pizza-celebrate");
  document.querySelectorAll(".topping").forEach(x=>x.remove());
  // Done button always visible in free play
  const fb=document.getElementById("finishBtn");
  fb.classList.add("visible");
  dismissHint();
  // Show free play hint
  showFreePlayHint();
}

/* ══════════════════════════════════════════
   RECIPE MODE
══════════════════════════════════════════ */
function loadOrder(firstLoad){
  recipe=orderList[orderIndex];
  stepIndex=0;counts={pepperoni:0,mushroom:0,spinach:0};
  pizza.src="assets/pizza_base.png";
  pizza.classList.remove("pizza-celebrate");
  document.getElementById("finishBtn").classList.remove("visible");
  document.querySelectorAll(".topping").forEach(x=>x.remove());
  updateBadge();render();
  if(firstLoad)showHint();
}
function updateBadge(){
  document.getElementById("orderBadge").textContent=`Order ${orderIndex+1} of ${orderList.length}`;
}
function render(){
  recipeSteps.innerHTML="";
  recipe.steps.forEach((s,i)=>{
    const box=document.createElement("div");
    const qty=(s==="sauce"||s==="cheese")?1:recipe.qty[s];
    let cls="step";
    if(i<stepIndex)cls+=" done";
    else if(i===stepIndex)cls+=" current";
    else cls+=" future";
    box.className=cls;box.id="s"+i;
    box.innerHTML=`<div><b>${qty}×</b></div><img src="${dragSrc[s]}" height="32">`;
    recipeSteps.append(box);
    if(i<recipe.steps.length-1){const a=document.createElement("div");a.className="arrow";a.textContent="›";recipeSteps.append(a);}
  });
  recipeName.textContent=recipe.name;
}
function current(){return recipe.steps[stepIndex]}
function errorStep(){
  msg.textContent="Follow the recipe!";
  const el=document.getElementById("s"+stepIndex);
  el.classList.add("shake");
  setTimeout(()=>el.classList.remove("shake"),350);
  setTimeout(()=>msg.textContent="",1000);
}

/* ══════════════════════════════════════════
   HINT NOTES
══════════════════════════════════════════ */
function showHint(){
  document.getElementById("hintNote")?.remove();
  const names=orderList.map((r,i)=>`${i+1}. ${r.name}`).join("<br>");
  const note=document.createElement("div");
  note.id="hintNote";
  note.innerHTML=`
    <button class="close-hint" onclick="dismissHint()" aria-label="Close">✕</button>
    <p>You will prepare:<br><b>${names}</b></p>
    <hr>
    <p><span class="hint-arrow">☝️</span> Follow the recipe above.<br>
       <span class="hint-arrow">👇</span> Drag ingredients from the panel below onto the pizza.</p>`;
  document.getElementById("pizzaZone").appendChild(note);
}
function showFreePlayHint(){
  document.getElementById("hintNote")?.remove();
  const note=document.createElement("div");
  note.id="hintNote";
  note.innerHTML=`
    <button class="close-hint" onclick="dismissHint()" aria-label="Close">✕</button>
    <p>🎨 <b>Free Play!</b><br>No rules — make any pizza you like.</p>
    <hr>
    <p><span class="hint-arrow">👇</span> Drag ingredients from the panel below.<br>
       Press <b>🍕 Done!</b> when you're happy.</p>`;
  document.getElementById("pizzaZone").appendChild(note);
}
function dismissHint(){
  const note=document.getElementById("hintNote");
  if(!note)return;
  note.classList.add("hiding");
  setTimeout(()=>note.remove(),260);
}
  
/* ══════════════════════════════════════════
   RECIPE MODE: PER-PIZZA SUCCESS
══════════════════════════════════════════ */
function showPizzaSuccess(){
  pizza.classList.add("pizza-celebrate");
  const isLast=(orderIndex===orderList.length-1);
  document.getElementById("modalTitle").textContent="🍕 Pizza Done!";
  const items=orderList.map((r,i)=>{
    const done=i<=orderIndex;
    return `<li class="${done?'done':''}"><span class="ck">${done?'✅':'⬜'}</span>${r.name}</li>`;
  }).join("");
  document.getElementById("modalMsg").innerHTML=`<ul class="checklist">${items}</ul>`;
  document.getElementById("modalBtn").textContent=isLast?"🏁 See Results":"Next Pizza →";
  setTimeout(()=>{
    modal.style.display="flex";
  },700);
}
function nextPizza(){
  modal.style.display="none";
  orderIndex++;
  if(orderIndex>=orderList.length)showEndScreen();
  else loadOrder(false);
}
function showEndScreen(){
  const n=orderList.length;
  document.getElementById("endMsg").textContent=`You made ${n} pizza${n>1?"s":""}! Great job, chef! 👨‍🍳`;
  document.getElementById("endList").innerHTML=orderList.map((r,i)=>`🍕 ${i+1}. ${r.name}`).join("<br>");
  document.getElementById("endScreen").style.display="flex";
}

/* ══════════════════════════════════════════
   FREE PLAY: COMMENT LOGIC
══════════════════════════════════════════ */
function getFreePlayComment(c){
  const total=Object.values(c).reduce((a,b)=>a+b,0);
  const hasSauce=c.sauce>0,hasCheese=c.cheese>0;
  const hasMeat=c.pepperoni>0;
  const hasVeg=c.mushroom>0||c.spinach>0;
  const onlySauce=c.sauce>0&&c.cheese===0&&c.pepperoni===0&&c.mushroom===0&&c.spinach===0;

  // Collect all matching rules
  const matches=[];
  if(onlySauce)                                   matches.push("Yum. I love pizza sauce. 🍅");
  if(!hasSauce&&!onlySauce)                        matches.push("This pizza is a bit dry... 🏜️");
  if(total>=50)                                    matches.push("That's a lot of toppings! Having a party? 🎉");
  if(total>20&&total<50)                           matches.push("Wow, this is a luxury pizza! 🤌");
  if(!hasCheese&&!onlySauce)                       matches.push("This pizza is dairy-free! 🌿");
  if(hasSauce&&hasCheese&&hasVeg&&!hasMeat)        matches.push("This is a healthy pizza! 🥗");
  if(total<5&&total>0)                             matches.push("This is a budget pizza! 💸");
  if(total===0)                                    matches.push("An empty pizza? Bold choice. 🫙");

  if(matches.length===0){
    // neutral affirmations
    const neutrals=[
      "Looking delicious! 😋","A classic creation! 👨‍🍳","That smells amazing! 🤤",
      "Now that's a pizza! 🍕","Perfectly crafted! ⭐","Absolutely wonderful! 🌟"
    ];
    return pickRandom(neutrals);
  }
  return pickRandom(matches);
}

/* ══════════════════════════════════════════
   FREE PLAY: PIZZA SNAPSHOT
══════════════════════════════════════════ */
function buildSnapshot(){
  const snap=document.getElementById("fpPizzaSnap");
  snap.innerHTML="";

  // Base image
  const base=document.createElement("img");
  base.className="snap-base";
  // mirror the current pizza state image
  base.src=pizza.src;
  snap.appendChild(base);

  // Place toppings proportionally
  const snapSize=snap.offsetWidth||220;
  fpToppingData.forEach(td=>{
    const img=document.createElement("img");
    img.className="snap-top";
    img.src=td.src;
    // td.rx/ry are fractions of pizzaZone dimensions
    const sz=snapSize*0.15;
    img.style.width=img.style.height=sz+"px";
    img.style.left=(td.rx*snapSize-sz/2)+"px";
    img.style.top=(td.ry*snapSize-sz/2)+"px";
    img.style.transform=`rotate(${td.rot}deg)`;
    snap.appendChild(img);
  });
}

/* ══════════════════════════════════════════
   FREE PLAY: SHOW FINISH MODAL
══════════════════════════════════════════ */
function showFreePlayModal(){
  pizza.classList.add("pizza-celebrate");

  // Comment
  document.getElementById("fpComment").textContent=getFreePlayComment(fpCounts);

  // Ingredient list
  const lines=Object.entries(fpCounts)
    .filter(([,n])=>n>0)
    .map(([k,n])=>`${n}× ${ingLabel[k]}`);
  document.getElementById("fpIngList").innerHTML=
    lines.length ? lines.join(" &nbsp;·&nbsp; ") : "No ingredients — a brave choice!";

  setTimeout(()=>{
    buildSnapshot();
    document.getElementById("fpModal").style.display="flex";
  },700);
}

/* ══════════════════════════════════════════
   FINISH BUTTON
══════════════════════════════════════════ */
function handleFinish(){
  if(freeMode){
    document.getElementById("finishBtn").classList.remove("visible");
    showFreePlayModal();
    return;
  }
  if(stepIndex<recipe.steps.length)return;
  document.getElementById("finishBtn").classList.remove("visible");
  showPizzaSuccess();
}

/* ══════════════════════════════════════════
   GO HOME
══════════════════════════════════════════ */
function goToStart(){
  document.getElementById("endScreen").style.display="none";
  document.getElementById("fpModal").style.display="none";
  document.getElementById("game").style.display="none";
  document.getElementById("startScreen").style.display="flex";
  modal.style.display="none";
}

/* ══════════════════════════════════════════
   DRAG & DROP (pointer events)
══════════════════════════════════════════ */
function startDrag(ingType,clientX,clientY){
  dismissHint();
  drag={type:ingType};
  const di=document.createElement("img");
  di.src=dragSrc[drag.type];di.className="drag";di.id="drag";
  document.body.appendChild(di);
  di.style.left=clientX+"px";di.style.top=clientY+"px";
}
function moveDrag(clientX,clientY){
  const d=document.getElementById("drag");
  if(d){d.style.left=clientX+"px";d.style.top=clientY+"px";}
}
function endDrag(clientX,clientY){
  if(!drag)return;
  document.getElementById("drag")?.remove();
  const r=pizza.getBoundingClientRect();
  const inside=clientX>r.left&&clientX<r.right&&clientY>r.top&&clientY<r.bottom;

  if(inside){
    if(freeMode){
      // ── FREE PLAY DROP ──
      const type=drag.type;
      fpCounts[type]++;
      if(type==="sauce"&&fpCounts.sauce===1){
        pizza.src="assets/pizza_base_sauce.png";
      } else if(type==="cheese"&&fpCounts.cheese===1){
        pizza.src=(fpCounts.sauce>0)?"assets/pizza_base_sauce_cheese.png":"assets/pizza_base_sauce_cheese.png";
      } else if(type!=="sauce"&&type!=="cheese"){
        const t=document.createElement("img");
        t.src=dragSrc[type];t.className="topping";
        const pRect=pizzaZone.getBoundingClientRect();
        const lx=clientX-pRect.left-18, ty=clientY-pRect.top-18;
        const rot=Math.random()*40-20;
        t.style.left=lx+"px";t.style.top=ty+"px";t.style.transform=`rotate(${rot}deg)`;
        pizzaZone.append(t);
        // store for snapshot (as fraction of pizzaZone size)
        fpToppingData.push({src:dragSrc[type],rx:(lx+18)/pRect.width,ry:(ty+18)/pRect.height,rot});
      }
    } else {
      // ── RECIPE MODE DROP ──
      if(drag.type!==current()){errorStep();drag=null;return;}
      if(drag.type==="sauce"){pizza.src="assets/pizza_base_sauce.png";stepIndex++;}
      else if(drag.type==="cheese"){pizza.src="assets/pizza_base_sauce_cheese.png";stepIndex++;}
      else{
        counts[drag.type]++;
        const t=document.createElement("img");
        t.src=dragSrc[drag.type];t.className="topping";
        const pRect=pizzaZone.getBoundingClientRect();
        t.style.left=(clientX-pRect.left-18)+"px";
        t.style.top=(clientY-pRect.top-18)+"px";
        t.style.transform=`rotate(${Math.random()*40-20}deg)`;
        pizzaZone.append(t);
        if(counts[drag.type]>=recipe.qty[drag.type])stepIndex++;
      }
      render();
      if(stepIndex>=recipe.steps.length){
        document.getElementById("finishBtn").classList.add("visible");
      }
    }
  }
  drag=null;
}

document.querySelectorAll("img").forEach(el=>{el.draggable=false;});
document.querySelectorAll(".ing").forEach(el=>{
  el.addEventListener("pointerdown",e=>{
    e.preventDefault();el.setPointerCapture(e.pointerId);
    startDrag(el.dataset.ing,e.clientX,e.clientY);
  });
});
document.addEventListener("pointermove",e=>{if(drag)moveDrag(e.clientX,e.clientY);});
document.addEventListener("pointerup",e=>{if(drag)endDrag(e.clientX,e.clientY);});
document.addEventListener("pointercancel",()=>{document.getElementById("drag")?.remove();drag=null;});
</script>
</body>
</html>
