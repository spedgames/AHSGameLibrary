<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Recipe Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:Nunito,sans-serif;background:linear-gradient(160deg,#fdf6ec 0%,#ede0cc 100%)}

/* ── LAYOUT ── */
#game{
  height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:0;
  overflow:hidden;
}

/* ── RECIPE PANEL (top) ── */
#recipePanel{
  background:linear-gradient(135deg,#fff8f0,#ffecd6);
  border-bottom:3px dashed #e8c99a;
  padding:10px 14px 6px;
  position:relative;
  height:130px;
}
#recipePanel::before{
  content:"📋 RECIPE CARD";
  position:absolute;
  top:6px; left:50%;
  transform:translateX(-50%);
  font-size:10px;
  font-weight:800;
  letter-spacing:2px;
  color:#b07d3a;
  opacity:.7;
}
#recipeName{
  margin:14px 0 6px;
  text-align:center;
  font-size:clamp(15px,2vw,21px);
  color:#7b3f00;
}
#recipeSteps{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:5px;
  flex-wrap:nowrap;
}
.step{
  background:#fffdf8;
  border:2.5px solid #e0c88a;
  border-radius:14px;
  padding:5px 8px;
  min-width:80px;
  max-width:105px;
  text-align:center;
  transition:.35s;
  font-size:12px;
  color:#5a3a00;
  position:relative;
}
/* Done: heavily greyed out with strikethrough overlay */
.step.done{
  border-color:#c8c8c8;
  background:#eee;
  opacity:.45;
  pointer-events:none;
}
.step.done::after{
  content:"✓";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  color:#43a047;
  opacity:.9;
  background:rgba(255,255,255,.35);
  border-radius:12px;
}
/* Current: warm golden highlight */
.step.current{
  border-color:#f59e0b;
  background:#fffbeb;
  box-shadow:0 0 0 3px #fde68a, 0 3px 12px rgba(245,158,11,.25);
  transform:translateY(-2px);
}
.step.future{
  opacity:.55;
}
.step img{display:block;margin:2px auto 0}
.arrow{font-size:16px;flex-shrink:0;color:#c8a060}
#msg{text-align:center;color:#c62828;font-weight:800;height:16px;font-size:12px;margin-top:3px}

/* ── PIZZA WORK AREA (middle) ── */
#workArea{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:0;
  background:linear-gradient(160deg,#f5ede0 0%,#e8d9c4 100%);
  position:relative;
}
/* Subtle texture lines to distinguish from recipe panel */
#workArea::before{
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 18px,
    rgba(180,140,80,.06) 18px,
    rgba(180,140,80,.06) 19px
  );
  pointer-events:none;
}
#pizzaZone {
  position: relative;
  width: min(500px, 55vw, calc((100vh - 240px) * 500 / 320));
  aspect-ratio: 500 / 320;
  flex-shrink: 0;
  overflow: visible;
}
#peel{position:absolute;width:100%;height:100%;object-fit:contain}
#pizza{
  position:absolute;
  left:25%;top:5%;
  width:50%;height:75%;
  object-fit:contain;
  transition:transform .15s;
}
.topping{position:absolute;width:min(36px,5vw);height:min(36px,5vw)}

/* ── INGREDIENTS BAR (bottom) ── */
#ingredientsBar{
  background:linear-gradient(135deg,#3d2000,#5c3200);
  border-top:3px solid #2a1500;
  padding:8px 14px 10px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:clamp(10px,2.5vw,28px);
  flex-shrink:0;
  position:relative;
  height:110px;
}
#ingredientsBar::before{
  content:"INGREDIENTS";
  position:absolute;
  top:3px; left:50%;
  transform:translateX(-50%);
  font-size:9px;
  font-weight:800;
  letter-spacing:2.5px;
  color:rgba(255,220,150,.45);
}
.ing{
  width:clamp(68px,8.5vw,108px);
  cursor:grab;
  transition:.2s;
  -webkit-user-drag:none;
  user-select:none;
  margin-top:6px;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));
}
.ing:hover{transform:translateY(-6px) scale(1.08);filter:drop-shadow(0 8px 14px rgba(0,0,0,.5))}
.ing:active{cursor:grabbing}

/* ── DRAG GHOST ── */
.drag{
  position:fixed;
  width:72px;height:72px;
  pointer-events:none;
  transform:translate(-50%,-90%) scale(1.15);
  filter:drop-shadow(0 10px 12px rgba(0,0,0,.35));
  animation:pickup .12s ease-out;
  z-index:999;
}
@keyframes pickup{
  from{transform:translate(-50%,-90%) scale(0.75);opacity:0}
  to{transform:translate(-50%,-90%) scale(1.15);opacity:1}
}

/* ── SUCCESS MODAL ── */
#modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}
#box{
  background:linear-gradient(145deg,#fff8ef,#fff3e0);
  border:4px solid #f59e0b;
  padding:36px 44px;
  border-radius:28px;
  text-align:center;
  min-width:300px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}
#box h1{margin:0 0 8px;font-size:2.4rem;color:#7b3f00}
#box p{color:#a0632a;font-weight:700;margin:0 0 20px}
#box button{
  padding:12px 28px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ff9800,#f57c00);
  color:#fff;
  font-weight:800;
  font-size:17px;
  cursor:pointer;
  font-family:Nunito,sans-serif;
  box-shadow:0 4px 14px rgba(245,124,0,.4);
  transition:.2s;
}
#box button:hover{transform:scale(1.05)}
@keyframes popIn{
  from{transform:scale(.4) rotate(-8deg);opacity:0}
  to{transform:scale(1) rotate(0deg);opacity:1}
}

/* confetti pieces */
.confetti{
  position:absolute;
  width:10px;height:14px;
  border-radius:3px;
  animation:confettiFall 1.2s ease-in forwards;
  pointer-events:none;
}
@keyframes confettiFall{
  0%{transform:translateY(-40px) rotate(0deg);opacity:1}
  100%{transform:translateY(320px) rotate(720deg);opacity:0}
}

/* ── FINISHED BUTTON ── */
#finishBtn{
  position:absolute;
  right:-50px;
  top:15%;
  transform:translateY(-50%) scale(0);
  opacity:0;
  padding:14px 20px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#43a047,#2e7d32);
  color:#fff;
  font-weight:800;
  font-size:clamp(14px,1.8vw,18px);
  font-family:Nunito,sans-serif;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(46,125,50,.45);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  white-space:nowrap;
  z-index:10;
}
#finishBtn.visible{
  transform:translateY(-50%) scale(1);
  opacity:1;
}
#finishBtn:hover{
  background:linear-gradient(135deg,#4caf50,#388e3c);
  box-shadow:0 8px 24px rgba(46,125,50,.55);
}
@keyframes btnPulse{50%{box-shadow:0 6px 28px rgba(46,125,50,.7)}}
#finishBtn.visible{animation:btnPulse 1.4s ease-in-out infinite}

/* pizza bounce on completion */
@keyframes pizzaBounce{
  0%{transform:scale(1)}
  30%{transform:scale(1.18) rotate(5deg)}
  60%{transform:scale(0.93) rotate(-3deg)}
  80%{transform:scale(1.07) rotate(2deg)}
  100%{transform:scale(1) rotate(0)}
}
.pizza-celebrate{animation:pizzaBounce .7s ease-in-out}

@keyframes shake{25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-8px)}}
.shake{animation:shake .35s}

button{cursor:pointer}
img{-webkit-user-drag:none}

/* ── SMALL SCREEN (tablet/mobile) ── */
@media (max-height: 600px) {
  #recipePanel { height: 100px; }
  #ingredientsBar { height: 90px; }
  .ing { width: clamp(50px, 7vw, 80px); }
  #pizzaZone {
    width: min(500px, 55vw, calc((100vh - 190px) * 500 / 320));
  }
}
</style>
</head>
<body>
<div id="game">

  <!-- TOP: RECIPE CARD PANEL -->
  <div id="recipePanel">
    <h2 id="recipeName"></h2>
    <div id="recipeSteps"></div>
    <div id="msg"></div>
  </div>

  <!-- MIDDLE: PIZZA WORK AREA -->
  <div id="workArea">
    <div id="pizzaZone">
      <img id="peel" src="assets/peel.png">
      <img id="pizza" src="assets/pizza_base.png">
      <button id="finishBtn" onclick="handleFinish()">🍕 Done!</button>
    </div>
  </div>

  <!-- BOTTOM: INGREDIENTS BAR -->
  <div id="ingredientsBar">
    <img class="ing" data-ing="sauce"     src="assets/container_sauce.png">
    <img class="ing" data-ing="cheese"    src="assets/container_cheese.png">
    <img class="ing" data-ing="pepperoni" src="assets/container_pepperoni.png">
    <img class="ing" data-ing="mushroom"  src="assets/container_mushroom.png">
    <img class="ing" data-ing="spinach"   src="assets/container_spinach.png">
  </div>

</div>

<!-- SUCCESS MODAL -->
<div id="modal">
  <div id="box">
    <h1>🍕 Pizza Done!</h1>
    <p>You followed the recipe perfectly!</p>
    <button onclick="newGame()">Make Another Pizza</button>
  </div>
</div>

<script>
const recipes=[
  {name:"Pepperoni Classic",  steps:["sauce","cheese","pepperoni"]},
  {name:"Garden Pizza",        steps:["sauce","cheese","mushroom","spinach"]},
  {name:"Supreme Lite",        steps:["sauce","cheese","pepperoni","mushroom"]},
  {name:"Veggie Delight",      steps:["sauce","cheese","mushroom","spinach"]},
  {name:"House Special",       steps:["sauce","cheese","pepperoni","mushroom","spinach"]}
];
const dragSrc={
  sauce:"assets/container_sauce_drag.png",
  cheese:"assets/container_cheese_drag.png",
  pepperoni:"assets/pizza_topping_pepperoni.png",
  mushroom:"assets/pizza_topping_mushroom.png",
  spinach:"assets/pizza_topping_spinach.png"
};
let recipe,stepIndex,counts,drag=null;
const q=()=>Math.floor(Math.random()*4)+3;

function render(){
  recipeSteps.innerHTML="";
  recipe.steps.forEach((s,i)=>{
    const box=document.createElement("div");
    let qty=(s==="sauce"||s==="cheese")?1:recipe.qty[s];
    let cls="step";
    if(i<stepIndex) cls+=" done";
    else if(i===stepIndex) cls+=" current";
    else cls+=" future";
    box.className=cls;
    box.id="s"+i;
    box.innerHTML=`<div><b>${qty}×</b></div><img src="${dragSrc[s]}" height="32">`;
    recipeSteps.append(box);
    if(i<recipe.steps.length-1){
      let a=document.createElement("div");
      a.className="arrow";a.textContent="›";recipeSteps.append(a);
    }
  });
  recipeName.textContent=recipe.name;
}

function newGame(){
  modal.style.display="none";
  pizza.src="assets/pizza_base.png";
  pizza.classList.remove("pizza-celebrate");
  document.getElementById("finishBtn").classList.remove("visible");
  document.querySelectorAll(".topping").forEach(x=>x.remove());
  recipe=JSON.parse(JSON.stringify(recipes[Math.floor(Math.random()*recipes.length)]));
  recipe.qty={pepperoni:q(),mushroom:q(),spinach:q()};
  stepIndex=0;
  counts={pepperoni:0,mushroom:0,spinach:0};
  render();
}

function current(){return recipe.steps[stepIndex]}

function errorStep(){
  msg.textContent="Follow the recipe!";
  let el=document.getElementById("s"+stepIndex);
  el.classList.add("shake");
  setTimeout(()=>el.classList.remove("shake"),350);
  setTimeout(()=>msg.textContent="",1000);
}

function launchConfetti(){
  const colors=["#ff9800","#f44336","#4caf50","#2196f3","#ffeb3b","#e91e63","#ff5722"];
  const box=document.getElementById("box");
  for(let i=0;i<28;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.left=Math.random()*100+"%";
    c.style.top="0px";
    c.style.animationDelay=Math.random()*0.6+"s";
    c.style.animationDuration=(0.9+Math.random()*0.6)+"s";
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    box.appendChild(c);
    setTimeout(()=>c.remove(),1800);
  }
}

function showSuccess(){
  pizza.classList.add("pizza-celebrate");
  setTimeout(()=>{
    modal.style.display="flex";
    setTimeout(launchConfetti,100);
  },700);
}

function handleFinish(){
  if(stepIndex<recipe.steps.length)return;
  document.getElementById("finishBtn").classList.remove("visible");
  showSuccess();
}

document.querySelectorAll("img").forEach(el=>{el.draggable=false;});

document.querySelectorAll(".ing").forEach(el=>{
  el.addEventListener("mousedown",e=>{
    e.preventDefault();
    drag={type:el.dataset.ing};
    const di=document.createElement("img");
    di.src=dragSrc[drag.type];
    di.className="drag"; di.id="drag";
    document.body.appendChild(di);
    di.style.left=e.clientX+"px"; di.style.top=e.clientY+"px";
  });
});

document.addEventListener("mousemove",e=>{
  let d=document.getElementById("drag");
  if(d){d.style.left=e.clientX+"px";d.style.top=e.clientY+"px";}
});

document.addEventListener("mouseup",e=>{
  if(!drag)return;
  document.getElementById("drag")?.remove();

  const r=pizza.getBoundingClientRect();
  const inside=e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom;

  if(inside){
    if(drag.type!==current()){errorStep();drag=null;return;}
    if(drag.type==="sauce"){pizza.src="assets/pizza_base_sauce.png";stepIndex++;}
    else if(drag.type==="cheese"){pizza.src="assets/pizza_base_sauce_cheese.png";stepIndex++;}
    else{
      counts[drag.type]++;
      const t=document.createElement("img");
      t.src=dragSrc[drag.type]; t.className="topping";
      const pRect=pizzaZone.getBoundingClientRect();
      t.style.left=(e.clientX-pRect.left-18)+"px";
      t.style.top=(e.clientY-pRect.top-18)+"px";
      t.style.transform=`rotate(${Math.random()*40-20}deg)`;
      pizzaZone.append(t);
      if(counts[drag.type]>=recipe.qty[drag.type]) stepIndex++;
    }
    render();
    if(stepIndex>=recipe.steps.length){
      document.getElementById("finishBtn").classList.add("visible");
    }
  }
  drag=null;
});

newGame();
</script>
</body>
</html>
