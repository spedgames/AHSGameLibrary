<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Game Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF4757;
            --secondary: #3742fa;
            --success: #2ed573;
            --surface: #f1f2f6;
            --text: #2f3542;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; background: #e0e4e8; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: 'Poppins', sans-serif;
        }

        #game-viewport {
            width: 95vw; height: 95vh; max-width: 850px; max-height: 850px;
            background: #ffffff; border-radius: 40px; display: flex; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1); overflow: hidden;
            padding: 15px 20px; position: relative; /* Added relative for absolute button positioning */
        }

        /* Sound Toggle Button Styling */
        #sound-toggle {
            position: absolute; top: 20px; right: 20px;
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--surface); border: 2px solid #ddd;
            cursor: pointer; font-size: 1.2rem; display: flex;
            align-items: center; justify-content: center; z-index: 200;
        }
        #sound-toggle.off { opacity: 0.5; filter: grayscale(1); }

        /* ... (rest of previous styles remain the same) ... */
        #game-viewport.mobile { border-radius: 0; padding: 10px; }
        .progress-track { height: 12px; background: #eaeff2; border-radius: 10px; margin: 5px 20px 15px; display: flex; overflow: hidden; flex-shrink: 0; }
        .prog-seg { flex: 1; border-right: 2px solid white; transition: background 0.4s ease; }
        .prog-seg.active { background: var(--success); }
        #stage-container { flex: 1; position: relative; background: var(--surface); border-radius: 30px; box-shadow: inset 0 4px 15px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 15px; min-height: 0; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; }
        .modal { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.98); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: var(--text); padding: 15px; }
        .settings-group { margin: 4px 0; width: 100%; }
        .settings-row { display: flex; gap: 6px; margin: 4px 0; justify-content: center; flex-wrap: wrap; }
        .chip { padding: 6px 14px; border-radius: 10px; border: 2px solid #ddd; background: white; cursor: pointer; font-weight: 600; font-family: 'Poppins'; font-size: 0.8rem; }
        .chip.active { background: var(--secondary); color: white; border-color: var(--secondary); }
        .main-btn { padding: 12px 35px; font-size: 1.3rem; font-weight: 800; background: var(--primary); color: white; border: none; border-radius: 18px; cursor: pointer; box-shadow: 0 5px 0 #cf3a48; margin-top: 10px; }
        #controls { display: flex; justify-content: center; align-items: center; padding: 5px 0; width: 100%; height: 75px; flex-shrink: 0; }
        .button-row { display: flex; gap: 10px; justify-content: center; width: 100%; }
        .ans-btn { width: 95px; height: 58px; border-radius: 15px; border: none; background: var(--secondary); color: white; font-size: 1.8rem; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #2730c7; }
        .ans-btn.correct-highlight { background: var(--success) !important; transform: scale(1.1); box-shadow: 0 0 15px var(--success); }
        @keyframes buttonShake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
        .shake { animation: buttonShake 0.3s ease-in-out; }
        #next-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; background: var(--success); box-shadow: 0 5px 0 #1ca358; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-viewport">
    <button id="sound-toggle">🔊</button>
    <div id="progress-bar" class="progress-track hidden"></div>
    <div id="stage-container">
        <canvas id="gameCanvas"></canvas>
        <div id="start-screen" class="modal">
            <h1 style="color: var(--primary);">Counting Fun!</h1>
            <button id="start-btn" class="main-btn">GO!</button>
        </div>
        <div id="end-screen" class="modal hidden">
            <h2>Perfect!</h2>
            <button id="restart-btn" class="main-btn">PLAY AGAIN</button>
        </div>
        <button id="next-btn" class="main-btn hidden">Next Question →</button>
    </div>
    <div id="controls" class="hidden">
        <div id="button-row" class="button-row"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    let soundEnabled = true;
    const soundToggle = document.getElementById('sound-toggle');
    
    soundToggle.onclick = () => {
        soundEnabled = !soundEnabled;
        soundToggle.innerText = soundEnabled ? '🔊' : '🔇';
        soundToggle.classList.toggle('off', !soundEnabled);
    };

    // Modified playNote to respect soundEnabled state
    const playNote = (freq, type, dur) => {
        if (!soundEnabled) return; 
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    };

    // ... (rest of your logic) ...
    // Note: Simply keep your existing logic for generateRound, handleGuess, etc.
    // They will automatically work with the updated playNote function.
});
</script>
</body>
</html>
